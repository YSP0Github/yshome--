<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>关注云凇学术公众号</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            color-scheme: light dark;
        }
        body {
            font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #f3f9ff 0%, #e8efff 100%);
            min-height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        .card {
            width: min(420px, 100%);
            background: #fff;
            border-radius: 24px;
            box-shadow: 0 30px 80px rgba(15, 69, 189, 0.12);
            padding: 32px 28px 36px;
            text-align: center;
        }
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            border-radius: 999px;
            background: rgba(45, 149, 104, 0.12);
            color: #2d9668;
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 18px;
        }
        h1 {
            margin: 0 0 12px;
            font-size: 1.6rem;
            color: #1f2937;
        }
        p {
            margin: 0;
            color: #6b7280;
            line-height: 1.6;
        }
        .qrcode-wrapper {
            margin: 28px auto;
            width: 240px;
            aspect-ratio: 1/1;
            border-radius: 20px;
            padding: 18px;
            background: #f5f8ff;
            box-shadow: inset 0 0 0 1px rgba(99, 102, 241, 0.08);
        }
        .qrcode-wrapper img {
            width: 100%;
            height: 100%;
            border-radius: 14px;
            object-fit: cover;
        }
        .tips {
            margin-top: 20px;
            text-align: left;
            background: #f9fafb;
            border-radius: 16px;
            padding: 16px;
            border: 1px solid #eef2ff;
        }
        .tips li {
            margin-bottom: 6px;
            color: #4b5563;
        }
        .tips li:last-child {
            margin-bottom: 0;
        }
        .cta {
            margin-top: 22px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 12px 20px;
            border-radius: 999px;
            border: none;
            background: linear-gradient(120deg, #2563eb, #7c3aed);
            color: #fff;
            font-size: 1rem;
            cursor: pointer;
            box-shadow: 0 15px 30px rgba(37, 99, 235, 0.25);
        }
    </style>
</head>
<body>
    <div class="card">
        <span class="badge"><i class="fa-brands fa-weixin"></i> 云凇学术 · 官方公众号</span>
        <h1>扫码关注最新动态</h1>
        <p>获取云凇学术最新功能、科研技巧和升级公告，抢先体验内测能力。</p>
        <div class="qrcode-wrapper">
            <img src="../static/images/GZH_YSZJ_15x15.jpg" alt="云凇学术公众号二维码">
        </div>
        <div class="tips">
            <ul>
                <li>长按识别二维码或保存图片后在微信扫码。</li>
                <li>回复 “文献” 获取批量导入模板，回复 “帮助” 查看使用指南。</li>
            </ul>
        </div>
        <button class="cta" onclick="window.open('../static/images/GZH_YSZJ_15x15.jpg', '_blank')">
            <i class="fa-solid fa-qrcode"></i> 打开高清二维码
        </button>
    </div>
</body>
</html>
