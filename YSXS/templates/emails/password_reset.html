<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; color:#1f2937; }
        .btn { display:inline-block; padding:10px 18px; background:#059669; color:#fff; border-radius:6px; text-decoration:none; }
    </style>
</head>
<body>
    <p>{{ user.username }}，您好：</p>
    <p>我们收到您重置密码的请求。请点击下方按钮设置新的登录密码（{{ expires_minutes }} 分钟内有效）。</p>
    <p style="margin:24px 0;">
        <a class="btn" href="{{ reset_link }}" target="_blank" rel="noopener">设置新密码</a>
    </p>
    <p>如果按钮无法点击，请复制以下链接到浏览器访问：</p>
    <p style="word-break: break-all;">{{ reset_link }}</p>
    <p>若非本人操作，请忽略本邮件，无需做任何处理。</p>
    <p>—— 云凇学术团队</p>
</body>
</html>
