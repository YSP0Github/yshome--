<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; color:#1f2937; }
        .btn { display:inline-block; padding:10px 18px; background:#2563eb; color:#fff; border-radius:6px; text-decoration:none; }
    </style>
</head>
<body>
    <p>{{ user.username }}，您好：</p>
    <p>感谢注册云凇学术，为了保障账户安全，请点击下方按钮完成邮箱验证（{{ expires_hours }} 小时内有效）。</p>
    <p style="margin:24px 0;">
        <a class="btn" href="{{ verify_link }}" target="_blank" rel="noopener">立即验证邮箱</a>
    </p>
    <p>如按钮无法点击，请将以下链接复制到浏览器地址栏访问：</p>
    <p style="word-break: break-all;">{{ verify_link }}</p>
    <p>若非本人操作，请忽略本邮件。</p>
    <p> —————— </p>
    <p>云凇学术 · 个人文献管理系统 </p>
    <p>高效整理，精准检索 </p>
    <p>本邮件由系统自动发送，请勿直接回复  </p>
</body>
</html>
