<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 云凇学术</title>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    {% include "includes/standalone_theme_head.html" %}
</head>
<body class="bg-slate-50">
    {% include "includes/standalone_theme_body.html" %}
    <div class="container mx-auto px-4 py-12">
        <div class="max-w-md mx-auto bg-white rounded-xl shadow-md overflow-hidden">
            <div class="p-6">
                <div class="flex justify-center mb-6">
                    <i class="fa fa-book text-blue-600 text-4xl"></i>
                </div>
                <h2 class="text-2xl font-bold text-center text-slate-800 mb-6">
                    云凇学术 - 登录
                </h2>

                {% if success %}
                <div class="mb-4 rounded-lg border border-green-200 bg-green-50 text-green-700 text-sm px-4 py-3">
                    {{ success }}
                </div>
                {% endif %}
                
                <form action="{{ url_for('login') }}" method="post">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <div class="mb-4">
                        <label class="block text-sm font-medium text-slate-700 mb-1" for="username">
                            用户名
                        </label>
                        <div class="relative">
                            <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-400">
                                <i class="fa fa-user"></i>
                            </span>
                            <input type="text" id="username" name="username" required
                                class="w-full pl-10 pr-4 py-2 rounded-lg border border-slate-300 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                        </div>
                    </div>
                    
                    <div class="mb-6">
                        <label class="block text-sm font-medium text-slate-700 mb-1" for="password">
                            密码
                        </label>
                        <div class="relative">
                            <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-400">
                                <i class="fa fa-lock"></i>
                            </span>
                            <input type="password" id="password" name="password" required
                                class="w-full pl-10 pr-4 py-2 rounded-lg border border-slate-300 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                        </div>
                    </div>
                    
                    <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-2 px-4 rounded-lg transition-colors">
                        登录
                    </button>
                </form>

                <div class="mt-3 text-right text-sm">
                    <a href="{{ url_for('forgot_password') }}" class="text-blue-600 hover:underline">忘记密码？</a>
                </div>
                
                <div class="mt-4 text-center text-sm text-slate-600">
                    还没有账号？<a href="{{ url_for('register') }}" 
                                class="text-blue-600 hover:underline">立即注册</a>
                </div>
                <div class="mt-4 text-center text-sm text-slate-600">
                    <a href="{{ url_for('admin_register') }}" 
                        class="text-blue-600 hover:underline">
                       管理员注册
                    </a>
                </div>

                {% if pending_email %}
                <form action="{{ url_for('resend_verification') }}" method="post" class="mt-4">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <input type="hidden" name="email" value="{{ pending_email }}">
                    <div class="rounded-lg border border-amber-200 bg-amber-50 text-amber-700 text-sm px-4 py-3 mb-3">
                        检测到您的邮箱尚未验证，可通过下方按钮重新发送验证邮件。
                    </div>
                    <button type="submit" class="w-full border border-blue-200 text-blue-700 hover:bg-blue-50 rounded-lg py-2 transition-colors">
                        重新发送验证邮件
                    </button>
                </form>
                {% endif %}
            </div>

            <!-- 错误弹窗（默认隐藏） -->
            <div id="error-modal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 hidden">
                <div class="bg-white rounded-lg p-6 max-w-sm w-full">
                    <div class="text-red-500 text-center mb-4">
                        <i class="fa fa-exclamation-circle text-2xl"></i>
                    </div>
                    <p class="text-slate-800 text-center mb-4" id="error-message"></p>
                    <button id="close-modal" class="w-full bg-slate-100 hover:bg-slate-200 text-slate-800 py-2 rounded-md">确认</button>
                </div>
            </div>
                        
        </div>
    </div>


    <script>
        // 错误弹窗逻辑
        document.addEventListener('DOMContentLoaded', function() {
            const errorMessage = "{{ error if error else '' }}";
            const modal = document.getElementById('error-modal');
            const messageEl = document.getElementById('error-message');
            const closeBtn = document.getElementById('close-modal');
            
            if (errorMessage) {
                messageEl.textContent = errorMessage;
                modal.classList.remove('hidden');
            }
            
            closeBtn.addEventListener('click', function() {
                modal.classList.add('hidden');
            });
        });
    </script>

</body>
</html>
