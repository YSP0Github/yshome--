<script>
    (function () {
        if (typeof window.__applyYSXSThemeToBody === 'function') {
            window.__applyYSXSThemeToBody(document.body);
            return;
        }
        var theme = window.__YSXS_THEME__ || 'light';
        document.body.classList.remove('light-theme', 'dark-theme', 'auto-theme', 'auto-light', 'auto-dark');
        document.body.classList.add(theme === 'dark' ? 'dark-theme' : 'light-theme');
    })();
</script>
