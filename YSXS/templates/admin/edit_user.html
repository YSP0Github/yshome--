{% extends "base.html" %}

{% block title %}编辑用户 {{ user.username }} - 管理员中心{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
    <!-- 面包屑导航 -->
    <div class="mb-6 text-sm">
        <a href="{{ url_for('manage_users') }}" class="text-blue-600 hover:underline">用户管理</a>
        <span class="mx-2 text-slate-400">/</span>
        <a href="{{ url_for('admin_user_detail', user_id=user.id) }}" class="text-blue-600 hover:underline">{{ user.username }} 的详情</a>
        <span class="mx-2 text-slate-400">/</span>
        <span class="text-slate-600">编辑用户</span>
    </div>

    <!-- 编辑表单 -->
    <div class="bg-white rounded-lg shadow-sm p-6">
        <h2 class="text-xl font-bold text-slate-800 mb-4">编辑用户信息</h2>
        
        <form method="post">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <!-- 用户名（不可修改） -->
            <div class="mb-4">
                <label class="block text-sm font-medium text-slate-700 mb-1">用户名</label>
                <input type="text" value="{{ user.username }}" disabled 
                       class="w-full px-3 py-2 border border-slate-300 rounded-md bg-slate-50 text-slate-500">
                <p class="text-xs text-slate-500 mt-1">用户名不可修改</p>
            </div>
            
            <!-- 邮箱 -->
            <div class="mb-4">
                <label for="email" class="block text-sm font-medium text-slate-700 mb-1">邮箱 <span class="text-red-500">*</span></label>
                <input type="email" id="email" name="email" value="{{ user.email }}" required
                       class="w-full px-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            
            <!-- 角色 -->
            <div class="mb-4">
                <label for="role" class="block text-sm font-medium text-slate-700 mb-1">用户角色</label>
                <select id="role" name="role" 
                        class="w-full px-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <option value="user" {% if user.role == 'user' %}selected{% endif %}>普通用户</option>
                    <option value="editor" {% if user.role == 'editor' %}selected{% endif %}>编辑</option>
                    <option value="admin" {% if user.role == 'admin' %}selected{% endif %}>管理员</option>
                    <option value="super admin" {% if user.role == 'super admin' %}selected{% endif %}>超级管理员</option>
                </select>
            </div>
            
            <!-- 账户状态 -->
            <div class="mb-4">
                <label class="flex items-center">
                    <input type="checkbox" name="is_active" {% if user.is_active %}checked{% endif %}
                           class="form-checkbox h-4 w-4 text-blue-600">
                    <span class="ml-2 text-sm text-slate-700">启用账户</span>
                </label>
                <p class="text-xs text-slate-500 mt-1">未启用的账户无法登录系统</p>
            </div>
            
            <!-- 密码重置（可选） -->
            <div class="mb-6">
                <label for="password" class="block text-sm font-medium text-slate-700 mb-1">重置密码（可选）</label>
                <input type="password" id="password" name="password" placeholder="不修改请留空"
                       class="w-full px-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
                <p class="text-xs text-slate-500 mt-1">密码长度至少8位，包含字母和数字</p>
            </div>
            
            <!-- 操作按钮 -->
            <div class="flex gap-3">
                <button type="submit" class="px-4 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700 transition-colors">
                    保存修改
                </button>
                <a href="{{ url_for('admin_user_detail', user_id=user.id) }}" 
                   class="px-4 py-2 bg-slate-100 text-slate-700 rounded-md hover:bg-slate-200 transition-colors">
                    取消
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
