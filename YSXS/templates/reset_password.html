<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>设置新密码 - 云凇学术</title>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    {% include "includes/standalone_theme_head.html" %}
</head>
<body class="bg-slate-50">
    {% include "includes/standalone_theme_body.html" %}
    <div class="container mx-auto px-4 py-12">
        <div class="max-w-md mx-auto bg-white rounded-xl shadow-md overflow-hidden">
            <div class="p-6">
                <div class="flex justify-center mb-6">
                    <i class="fa fa-key text-blue-600 text-4xl"></i>
                </div>
                <h2 class="text-2xl font-bold text-center text-slate-800 mb-6">设置新密码</h2>

                {% if invalid %}
                <div class="rounded-lg border border-red-200 bg-red-50 text-red-700 text-sm px-4 py-3 mb-4">
                    链接已失效或不存在，请重新申请找回密码。
                </div>
                <div class="text-center">
                    <a class="text-blue-600 hover:underline" href="{{ url_for('forgot_password') }}">返回找回密码</a>
                </div>
                {% else %}
                {% if error %}
                <div class="rounded-lg border border-red-200 bg-red-50 text-red-700 text-sm px-4 py-3 mb-4">
                    {{ error }}
                </div>
                {% endif %}
                <form action="{{ url_for('reset_password', token=token) }}" method="post">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <div class="mb-4">
                        <label class="block text-sm font-medium text-slate-700 mb-1" for="password">
                            新密码
                        </label>
                        <input type="password" id="password" name="password" required
                            class="w-full px-4 py-2 rounded-lg border border-slate-300 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                    </div>
                    <div class="mb-6">
                        <label class="block text-sm font-medium text-slate-700 mb-1" for="confirm_password">
                            确认新密码
                        </label>
                        <input type="password" id="confirm_password" name="confirm_password" required
                            class="w-full px-4 py-2 rounded-lg border border-slate-300 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                    </div>
                    <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-2 px-4 rounded-lg transition-colors">
                        保存新密码
                    </button>
                </form>
                {% endif %}
            </div>
        </div>
    </div>
</body>
</html>
