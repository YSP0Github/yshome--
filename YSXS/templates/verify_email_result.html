<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>邮箱验证 - 云凇学术</title>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    {% include "includes/standalone_theme_head.html" %}
</head>
<body class="bg-slate-50">
    {% include "includes/standalone_theme_body.html" %}
    <div class="container mx-auto px-4 py-16">
        <div class="max-w-lg mx-auto bg-white rounded-2xl shadow-md p-8 text-center">
            <div class="mb-4">
                {% if success %}
                <i class="fa fa-check-circle text-green-500 text-5xl"></i>
                {% else %}
                <i class="fa fa-exclamation-circle text-red-500 text-5xl"></i>
                {% endif %}
            </div>
            <h1 class="text-2xl font-semibold text-slate-800 mb-4">邮箱验证提示</h1>
            <p class="text-slate-600 mb-6">{{ message }}</p>
            <div class="flex flex-col gap-3">
                <a href="{{ url_for('login') }}" class="w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700 transition-colors">
                    前往登录
                </a>
                <a href="{{ url_for('index') }}" class="w-full border border-slate-200 text-slate-700 py-2 rounded-lg hover:bg-slate-50 transition-colors">
                    返回首页
                </a>
            </div>
        </div>
    </div>
</body>
</html>
