<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>找回密码 - 云凇学术</title>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    {% include "includes/standalone_theme_head.html" %}
</head>
<body class="bg-slate-50">
    {% include "includes/standalone_theme_body.html" %}
    <div class="container mx-auto px-4 py-12">
        <div class="max-w-md mx-auto bg-white rounded-xl shadow-md overflow-hidden">
            <div class="p-6">
                <div class="flex justify-center mb-6">
                    <i class="fa fa-unlock-alt text-blue-600 text-4xl"></i>
                </div>
                <h2 class="text-2xl font-bold text-center text-slate-800 mb-6">重置密码</h2>

                {% if success %}
                <div class="mb-4 rounded-lg border border-green-200 bg-green-50 text-green-700 text-sm px-4 py-3">
                    {{ success }}
                </div>
                {% endif %}

                <form action="{{ url_for('forgot_password') }}" method="post">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <div class="mb-6">
                        <label class="block text-sm font-medium text-slate-700 mb-1" for="email">
                            注册邮箱
                        </label>
                        <div class="relative">
                            <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-400">
                                <i class="fa fa-envelope"></i>
                            </span>
                            <input type="email" id="email" name="email" required
                                class="w-full pl-10 pr-4 py-2 rounded-lg border border-slate-300 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                        </div>
                    </div>

                    <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-2 px-4 rounded-lg transition-colors">
                        发送重置邮件
                    </button>
                </form>

                <div class="mt-4 text-center text-sm text-slate-600">
                    <a href="{{ url_for('login') }}" class="text-blue-600 hover:underline">返回登录</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
