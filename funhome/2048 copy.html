<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2048 进阶版｜趣味屋</title>
  <style>
    :root {
      --bg: #f6efe6;
      --paper: rgba(255, 251, 246, 0.94);
      --text: #5d5145;
      --muted: #8b7d6f;
      --accent: #f08e57;
      --accent-2: #8c68ff;
      --board: #bbada0;
      --cell: rgba(238, 228, 218, 0.45);
      --shadow: 0 24px 60px rgba(98, 76, 55, 0.16);
      --size: min(84px, calc((100vw - 72px) / 4));
      --gap: 12px;
      --move-time: 160ms;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 16% 16%, rgba(240, 142, 87, 0.18), transparent 25%),
        radial-gradient(circle at 84% 18%, rgba(140, 104, 255, 0.18), transparent 24%),
        linear-gradient(180deg, #f9f4ee 0%, #f2e8dd 100%);
      display: grid;
      place-items: center;
      padding: 24px;
    }

    a { color: inherit; text-decoration: none; }
    .btn, .ghost-btn, .button, .ghost-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      white-space: nowrap;
    }

    button { font: inherit; }

    .app {
      width: min(1040px, 100%);
      display: grid;
      grid-template-columns: 330px 1fr;
      gap: 24px;
      align-items: start;
    }

    .panel,
    .board-shell {
      background: var(--paper);
      border-radius: 30px;
      box-shadow: var(--shadow);
      border: 1px solid rgba(122, 97, 72, 0.08);
    }

    .panel {
      padding: 28px;
      position: sticky;
      top: 24px;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(140, 104, 255, 0.12);
      color: #6d4cff;
      font-weight: 700;
      font-size: 0.92rem;
    }

    h1 {
      margin: 16px 0 12px;
      font-size: clamp(2.2rem, 5vw, 3.6rem);
      line-height: 1;
    }

    .lead,
    .tips li,
    .status-note,
    .score-card span:last-child {
      color: var(--muted);
      line-height: 1.75;
    }

    .score-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin: 22px 0 18px;
    }

    .score-card {
      padding: 16px;
      border-radius: 18px;
      background: #f7ede2;
      display: grid;
      gap: 6px;
    }

    .score-card strong {
      font-size: 1.9rem;
      line-height: 1;
      transition: transform 160ms ease, color 160ms ease;
    }

    .score-card strong.bump {
      transform: scale(1.08);
      color: #f08e57;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin: 18px 0;
    }

    .btn,
    .ghost-btn,
    .ctrl {
      border: 0;
      cursor: pointer;
      transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
    }

    .btn,
    .ghost-btn {
      flex: 1 1 120px;
      min-height: 48px;
      border-radius: 16px;
      font-weight: 700;
      padding: 0 16px;
    }

    .btn {
      color: #fff;
      background: linear-gradient(135deg, var(--accent), #f6aa6f);
      box-shadow: 0 12px 26px rgba(240, 142, 87, 0.26);
    }

    .ghost-btn {
      color: var(--text);
      background: #efe4d5;
    }

    .btn:hover,
    .ghost-btn:hover,
    .ctrl:hover { transform: translateY(-1px); }

    .status {
      margin-top: 18px;
      padding: 16px;
      border-radius: 18px;
      background: linear-gradient(135deg, rgba(140, 104, 255, 0.11), rgba(240, 142, 87, 0.11));
      font-weight: 700;
    }

    .tips {
      margin: 18px 0 0;
      padding-left: 18px;
      display: grid;
      gap: 8px;
    }

    .board-shell {
      padding: 22px;
      position: relative;
    }

    .board-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }

    .board-head h2 {
      margin: 0;
      font-size: 1.18rem;
    }

    .board-wrap {
      position: relative;
      width: fit-content;
      margin: 0 auto;
    }

    .board {
      position: relative;
      display: grid;
      grid-template-columns: repeat(4, var(--size));
      gap: var(--gap);
      padding: var(--gap);
      background: var(--board);
      border-radius: 24px;
      touch-action: none;
      user-select: none;
    }

    .cell,
    .tile {
      width: var(--size);
      height: var(--size);
      border-radius: 16px;
    }

    .cell {
      background: var(--cell);
    }

    .tile-layer,
    .anim-layer {
      position: absolute;
      inset: var(--gap);
      pointer-events: none;
    }

    .tile {
      position: absolute;
      display: grid;
      place-items: center;
      font-weight: 800;
      font-size: clamp(1.4rem, 2.3vw, 2rem);
      box-shadow:
        inset 0 2px 0 rgba(255, 255, 255, 0.25),
        0 10px 18px rgba(0, 0, 0, 0.06);
    }

    .tile.small { font-size: 1.18rem; }
    .tile.tiny { font-size: 0.98rem; }

    .tile.static {
      transition: transform var(--move-time) ease;
    }

    .tile.animating {
      z-index: 4;
      transition: transform var(--move-time) cubic-bezier(.22,.9,.27,1);
    }

    .mobile-controls {
      display: none;
      margin-top: 18px;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .ctrl {
      width: 58px;
      height: 58px;
      border-radius: 18px;
      background: #efe4d5;
      color: var(--text);
      font-size: 1.4rem;
      box-shadow: 0 10px 20px rgba(90, 80, 69, 0.08);
    }

    .overlay {
      position: absolute;
      inset: 22px;
      border-radius: 24px;
      background: rgba(250, 246, 239, 0.84);
      display: none;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
      backdrop-filter: blur(6px);
      z-index: 8;
    }

    .overlay.show { display: flex; }

    .overlay-box {
      max-width: 340px;
      display: grid;
      gap: 14px;
    }

    .overlay-box h3 {
      margin: 0;
      font-size: 2rem;
    }

    .overlay-box p {
      margin: 0;
      color: var(--muted);
      line-height: 1.8;
    }

    @media (max-width: 920px) {
      .app { grid-template-columns: 1fr; }
      .panel { position: static; }
    }

    @media (max-width: 620px) {
      body { padding: 18px; }
      .panel,
      .board-shell { padding: 20px; }
      .mobile-controls { display: flex; }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="panel">
      <div class="eyebrow">🔢 经典翻新</div>
      <h1>2048</h1>
      <p class="lead">这次把方块移动、合并、弹出都重新做了一遍。现在它会真的“滑”过去，不再是生硬地瞬间刷新。</p>

      <div class="score-grid">
        <div class="score-card">
          <span>当前分数</span>
          <strong id="scoreValue">0</strong>
        </div>
        <div class="score-card">
          <span>历史最高</span>
          <strong id="bestValue">0</strong>
        </div>
      </div>

      <div class="actions">
        <button class="btn" id="restartBtn" type="button">新开一局</button>
        <button class="ghost-btn" id="undoBtn" type="button">撤销一步</button>
      </div>

      <a class="ghost-btn" href="funhome.html#library" style="display:flex;align-items:center;justify-content:center;">← 返回趣味屋</a>

      <div class="status" id="statusText">目标：先合出 128 热身，再稳稳冲击 2048。</div>
      <div class="status-note" style="margin-top:12px;">操作方式：方向键 / WASD / 触屏滑动 / 下方方向键。</div>

      <ul class="tips">
        <li>尽量把最大数字固定在角落，会更稳。</li>
        <li>撤销适合救回一次误操作，但别太依赖。</li>
        <li>合出 2048 后仍可继续冲更高分。</li>
      </ul>
    </section>

    <section class="board-shell">
      <div class="board-head">
        <h2>游戏面板</h2>
        <span class="status-note">先滑一次，感受这版的移动动画</span>
      </div>

      <div class="board-wrap">
        <div class="board" id="board"></div>
        <div class="tile-layer" id="tileLayer"></div>
        <div class="anim-layer" id="animLayer"></div>
      </div>

      <div class="mobile-controls">
        <button class="ctrl" data-move="up" type="button">↑</button>
        <button class="ctrl" data-move="left" type="button">←</button>
        <button class="ctrl" data-move="down" type="button">↓</button>
        <button class="ctrl" data-move="right" type="button">→</button>
      </div>

      <div class="overlay" id="overlay">
        <div class="overlay-box">
          <h3 id="overlayTitle">继续加油</h3>
          <p id="overlayText">再来一局，刷新一下自己的记录。</p>
          <div class="actions" style="margin:0;">
            <button class="btn" id="overlayPrimary" type="button">继续</button>
            <button class="ghost-btn" id="overlaySecondary" type="button">新开一局</button>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script>
    const SIZE = 4;
    const MOVE_TIME = 170;
    const COLORS = {
      2: ['#eee4da', '#776e65'],
      4: ['#ede0c8', '#776e65'],
      8: ['#f2b179', '#f9f6f2'],
      16: ['#f59563', '#f9f6f2'],
      32: ['#f67c5f', '#f9f6f2'],
      64: ['#f65e3b', '#f9f6f2'],
      128: ['#edcf72', '#f9f6f2'],
      256: ['#edcc61', '#f9f6f2'],
      512: ['#edc850', '#f9f6f2'],
      1024: ['#edc53f', '#f9f6f2'],
      2048: ['#edc22e', '#f9f6f2']
    };

    const boardEl = document.getElementById('board');
    const tileLayer = document.getElementById('tileLayer');
    const animLayer = document.getElementById('animLayer');
    const scoreValue = document.getElementById('scoreValue');
    const bestValue = document.getElementById('bestValue');
    const statusText = document.getElementById('statusText');
    const overlay = document.getElementById('overlay');
    const overlayTitle = document.getElementById('overlayTitle');
    const overlayText = document.getElementById('overlayText');
    const overlayPrimary = document.getElementById('overlayPrimary');
    const overlaySecondary = document.getElementById('overlaySecondary');

    let board = [];
    let score = 0;
    let best = Number(localStorage.getItem('funhome-2048-best') || 0);
    let history = [];
    let won = false;
    let gameOver = false;
    let touchStart = null;
    let animating = false;

    function emptyBoard() {
      return Array.from({ length: SIZE }, () => Array(SIZE).fill(0));
    }

    function cloneBoard(source) {
      return source.map(row => [...row]);
    }

    function setupBoard() {
      boardEl.innerHTML = '';
      for (let i = 0; i < SIZE * SIZE; i += 1) {
        const cell = document.createElement('div');
        cell.className = 'cell';
        boardEl.appendChild(cell);
      }
    }

    function getMetrics() {
      const cell = boardEl.querySelector('.cell');
      const cellSize = cell ? cell.getBoundingClientRect().width : 0;
      const gap = parseFloat(getComputedStyle(boardEl).gap) || 0;
      return { cellSize, gap };
    }

    function positionOf(row, col) {
      const { cellSize, gap } = getMetrics();
      return {
        x: col * (cellSize + gap),
        y: row * (cellSize + gap)
      };
    }

    function tileClassByValue(value) {
      if (value >= 16384) return 'tile tiny';
      if (value >= 1024) return 'tile small';
      return 'tile';
    }

    function tileColors(value) {
      const [background, color] = COLORS[value] || ['#3c3a32', '#f9f6f2'];
      return { background, color };
    }

    function createTile(value, row, col, extraClass = '') {
      const tile = document.createElement('div');
      tile.className = `${tileClassByValue(value)} ${extraClass}`.trim();
      const { background, color } = tileColors(value);
      const { x, y } = positionOf(row, col);
      tile.style.background = background;
      tile.style.color = color;
      tile.style.transform = `translate(${x}px, ${y}px)`;
      tile.textContent = value;
      return tile;
    }

    function animateTile(tile, mode) {
      const base = tile.style.transform;
      const keyframes = mode === 'spawn'
        ? [
            { transform: `${base} scale(0.2)`, opacity: 0 },
            { transform: `${base} scale(1)`, opacity: 1 }
          ]
        : [
            { transform: `${base} scale(0.85)` },
            { transform: `${base} scale(1.12)` },
            { transform: `${base} scale(1)` }
          ];

      tile.animate(keyframes, {
        duration: mode === 'spawn' ? 220 : 240,
        easing: 'ease'
      });
    }

    function renderStatic(options = {}) {
      const spawnKey = options.spawn ? `${options.spawn.row},${options.spawn.col}` : '';
      const mergeKeys = new Set((options.merges || []).map(cell => `${cell.row},${cell.col}`));
      tileLayer.innerHTML = '';

      board.forEach((row, r) => row.forEach((value, c) => {
        if (!value) return;
        const key = `${r},${c}`;
        const tile = createTile(value, r, c, 'static');
        tileLayer.appendChild(tile);
        if (key === spawnKey) animateTile(tile, 'spawn');
        if (mergeKeys.has(key)) animateTile(tile, 'merge');
      }));
    }

    function flashScore() {
      [scoreValue, bestValue].forEach(el => {
        el.classList.remove('bump');
        void el.offsetWidth;
      });
      scoreValue.classList.add('bump');
      if (score >= best) bestValue.classList.add('bump');
      setTimeout(() => {
        scoreValue.classList.remove('bump');
        bestValue.classList.remove('bump');
      }, 180);
    }

    function updateHud() {
      scoreValue.textContent = score;
      bestValue.textContent = best;

      const maxTile = Math.max(...board.flat());
      if (gameOver) {
        statusText.textContent = '这一局结束了，点“新开一局”马上重来。';
      } else if (maxTile >= 1024) {
        statusText.textContent = '离 2048 不远了，稳住大数字别乱滑。';
      } else if (maxTile >= 256) {
        statusText.textContent = '节奏不错，继续把大数留在角落。';
      } else {
        statusText.textContent = '目标：先合出 128 热身，再稳稳冲击 2048。';
      }
    }

    function randomEmptyCell(grid) {
      const empties = [];
      grid.forEach((row, r) => row.forEach((value, c) => {
        if (!value) empties.push({ row: r, col: c });
      }));
      if (!empties.length) return null;
      return empties[Math.floor(Math.random() * empties.length)];
    }

    function mapLineCoord(direction, fixed, step) {
      switch (direction) {
        case 'left': return { row: fixed, col: step };
        case 'right': return { row: fixed, col: SIZE - 1 - step };
        case 'up': return { row: step, col: fixed };
        case 'down': return { row: SIZE - 1 - step, col: fixed };
        default: return { row: fixed, col: step };
      }
    }

    function computeMove(direction) {
      const next = emptyBoard();
      const animations = [];
      const merges = [];
      let gained = 0;
      let maxCreated = 0;
      let moved = false;

      for (let fixed = 0; fixed < SIZE; fixed += 1) {
        const items = [];
        for (let step = 0; step < SIZE; step += 1) {
          const coord = mapLineCoord(direction, fixed, step);
          const value = board[coord.row][coord.col];
          if (value) items.push({ value, from: coord });
        }

        let targetStep = 0;
        for (let index = 0; index < items.length; index += 1) {
          const current = items[index];
          const nextItem = items[index + 1];
          const target = mapLineCoord(direction, fixed, targetStep);

          if (nextItem && nextItem.value === current.value) {
            animations.push({ from: current.from, to: target, value: current.value });
            animations.push({ from: nextItem.from, to: target, value: nextItem.value });
            next[target.row][target.col] = current.value * 2;
            merges.push(target);
            gained += current.value * 2;
            maxCreated = Math.max(maxCreated, current.value * 2);
            moved = true;
            if (current.from.row !== target.row || current.from.col !== target.col) moved = true;
            if (nextItem.from.row !== target.row || nextItem.from.col !== target.col) moved = true;
            index += 1;
          } else {
            animations.push({ from: current.from, to: target, value: current.value });
            next[target.row][target.col] = current.value;
            if (current.from.row !== target.row || current.from.col !== target.col) moved = true;
          }
          targetStep += 1;
        }
      }

      if (!moved) return { moved: false };

      const final = cloneBoard(next);
      const spawnCell = randomEmptyCell(final);
      let spawn = null;
      if (spawnCell) {
        const value = Math.random() < 0.9 ? 2 : 4;
        final[spawnCell.row][spawnCell.col] = value;
        spawn = { ...spawnCell, value };
      }

      return {
        moved: true,
        gained,
        maxCreated,
        next,
        final,
        animations,
        merges,
        spawn
      };
    }

    function canMove(grid = board) {
      for (let r = 0; r < SIZE; r += 1) {
        for (let c = 0; c < SIZE; c += 1) {
          const value = grid[r][c];
          if (!value) return true;
          if (r < SIZE - 1 && grid[r + 1][c] === value) return true;
          if (c < SIZE - 1 && grid[r][c + 1] === value) return true;
        }
      }
      return false;
    }

    function playAnimations(items, done) {
      animLayer.innerHTML = '';
      items.forEach(item => {
        const tile = createTile(item.value, item.from.row, item.from.col, 'animating');
        animLayer.appendChild(tile);
        requestAnimationFrame(() => {
          const { x, y } = positionOf(item.to.row, item.to.col);
          tile.style.transform = `translate(${x}px, ${y}px)`;
        });
      });

      setTimeout(() => {
        animLayer.innerHTML = '';
        done();
      }, MOVE_TIME + 20);
    }

    function startGame() {
      board = emptyBoard();
      score = 0;
      history = [];
      won = false;
      gameOver = false;
      animating = false;
      hideOverlay();
      const first = randomEmptyCell(board);
      board[first.row][first.col] = Math.random() < 0.9 ? 2 : 4;
      const second = randomEmptyCell(board);
      board[second.row][second.col] = Math.random() < 0.9 ? 2 : 4;
      updateHud();
      renderStatic();
    }

    function showOverlay(title, text, primaryLabel, primaryStartsNewGame) {
      overlayTitle.textContent = title;
      overlayText.textContent = text;
      overlayPrimary.textContent = primaryLabel;
      overlayPrimary.dataset.mode = primaryStartsNewGame ? 'restart' : 'continue';
      overlay.classList.add('show');
    }

    function hideOverlay() {
      overlay.classList.remove('show');
    }

    function move(direction) {
      if (gameOver || animating) return;
      if (overlay.classList.contains('show') && overlayPrimary.dataset.mode === 'continue') return;

      const previous = cloneBoard(board);
      const previousScore = score;
      const previousWon = won;
      const result = computeMove(direction);
      if (!result.moved) return;

      history.push({ board: previous, score: previousScore, won: previousWon });
      if (history.length > 30) history.shift();

      animating = true;
      tileLayer.innerHTML = '';
      board = result.final;
      score += result.gained;
      if (score > best) {
        best = score;
        localStorage.setItem('funhome-2048-best', String(best));
      }

      playAnimations(result.animations, () => {
        animating = false;
        updateHud();
        renderStatic({ spawn: result.spawn, merges: result.merges });
        flashScore();

        if (result.maxCreated >= 2048 && !won) {
          won = true;
          showOverlay('恭喜，合出 2048！', '这一局已经通关目标了，要继续冲更高分还是重新来一局？', '继续冲', false);
        }

        gameOver = !canMove(board);
        if (gameOver) {
          updateHud();
          showOverlay('没有可走的步了', `本局得分 ${score}，要不要马上再来一局？`, '再来一局', true);
        }
      });
    }

    function undo() {
      if (!history.length || animating) return;
      const previous = history.pop();
      board = cloneBoard(previous.board);
      score = previous.score;
      won = previous.won;
      gameOver = false;
      hideOverlay();
      updateHud();
      renderStatic();
    }

    document.getElementById('restartBtn').addEventListener('click', startGame);
    document.getElementById('undoBtn').addEventListener('click', undo);

    overlayPrimary.addEventListener('click', () => {
      if (overlayPrimary.dataset.mode === 'restart') {
        startGame();
      } else {
        hideOverlay();
      }
    });
    overlaySecondary.addEventListener('click', startGame);

    document.addEventListener('keydown', event => {
      const keyMap = {
        ArrowUp: 'up',
        ArrowDown: 'down',
        ArrowLeft: 'left',
        ArrowRight: 'right',
        w: 'up',
        a: 'left',
        s: 'down',
        d: 'right'
      };
      const direction = keyMap[event.key];
      if (!direction) return;
      event.preventDefault();
      move(direction);
    });

    document.querySelectorAll('[data-move]').forEach(button => {
      button.addEventListener('click', () => move(button.dataset.move));
    });

    boardEl.addEventListener('touchstart', event => {
      const touch = event.changedTouches[0];
      touchStart = { x: touch.clientX, y: touch.clientY };
    }, { passive: true });

    boardEl.addEventListener('touchend', event => {
      if (!touchStart) return;
      const touch = event.changedTouches[0];
      const dx = touch.clientX - touchStart.x;
      const dy = touch.clientY - touchStart.y;
      touchStart = null;
      if (Math.max(Math.abs(dx), Math.abs(dy)) < 28) return;
      if (Math.abs(dx) > Math.abs(dy)) {
        move(dx > 0 ? 'right' : 'left');
      } else {
        move(dy > 0 ? 'down' : 'up');
      }
    }, { passive: true });

    window.addEventListener('resize', () => {
      if (animating) return;
      renderStatic();
    });

    setupBoard();
    startGame();
  </script>
</body>
</html>
