<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>月面着陆｜趣味屋</title>
  <link rel="stylesheet" href="handmade-game.css">
  <style>
    :root { --accent: #9aa8ff; --accent-2: #d7dcff; }
  </style>
</head>
<body>
  <main class="page">
    <aside class="panel">
      <div class="badge">🌕 手写新作 · 物理模拟</div>
      <h1>月面着陆</h1>
      <p class="lead">你要在低重力环境里驾驶着陆器平稳落在平台上。主引擎负责减速，左右喷口负责横移。看着慢，其实非常容易在最后两秒翻车。</p>
      <div class="actions">
        <button class="btn" id="startBtn" type="button">开始任务</button>
        <button class="ghost-btn" id="resetBtn" type="button">重开本关</button>
        <a class="ghost-btn" href="funhome.html#library">← 返回趣味屋</a>
      </div>
      <div class="stats-grid">
        <div class="stat"><span>关卡</span><strong id="levelEl">1</strong></div>
        <div class="stat"><span>燃料</span><strong id="fuelEl">100</strong></div>
        <div class="stat"><span>垂直速度</span><strong id="vyEl">0.0</strong></div>
        <div class="stat"><span>水平速度</span><strong id="vxEl">0.0</strong></div>
      </div>
      <ul class="tips">
        <li>↑ 或空格：主引擎；← / →：侧向微调。</li>
        <li>安全落地时，垂直速度和水平速度都不能太高。</li>
        <li>平台会越来越窄，越往后越要提前减速。</li>
      </ul>
      <p class="meta-line" id="messageEl">别等快碰地才补救，提前控速最重要。</p>
    </aside>

    <section class="stage">
      <div class="canvas-shell">
        <div class="legend">
          <span class="legend-item">↑ 主引擎</span>
          <span class="legend-item">← → 侧向修正</span>
          <span class="legend-item">安全着陆：垂直速度 < 1.8</span>
        </div>
        <div class="canvas-wrap" style="margin-top:12px;">
          <canvas id="game" width="760" height="460"></canvas>
        </div>
      </div>
      <div class="message" id="statusEl">点开始任务后再控制引擎。</div>
    </section>
  </main>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const levelEl = document.getElementById('levelEl');
    const fuelEl = document.getElementById('fuelEl');
    const vyEl = document.getElementById('vyEl');
    const vxEl = document.getElementById('vxEl');
    const statusEl = document.getElementById('statusEl');
    const messageEl = document.getElementById('messageEl');

    const state = { running: false, over: false, level: 1, last: 0, keys: {} };
    const ship = { x: 100, y: 70, vx: 0, vy: 0, fuel: 100 };
    let pad = { x: 540, w: 120 };
    let terrain = [];

    function buildTerrain() {
      const points = [];
      let x = 0;
      while (x <= canvas.width) {
        points.push({ x, y: 310 + Math.random() * 90 });
        x += 70 + Math.random() * 50;
      }
      points.push({ x: canvas.width, y: 320 + Math.random() * 80 });
      const padWidth = Math.max(70, 140 - state.level * 12);
      pad = { x: 420 + Math.random() * 220, w: padWidth };
      terrain = points.map(point => ({ ...point }));
      terrain.push({ x: pad.x, y: 390 });
      terrain.push({ x: pad.x + pad.w, y: 390 });
      terrain.sort((a, b) => a.x - b.x);
    }

    function reset(full = false) {
      if (full) state.level = 1;
      ship.x = 90;
      ship.y = 70;
      ship.vx = 0;
      ship.vy = 0;
      ship.fuel = 100;
      state.running = false;
      state.over = false;
      buildTerrain();
      updateHud();
      statusEl.textContent = `第 ${state.level} 关待命。`;
      messageEl.textContent = '平台越窄，越要提前找姿态。';
    }

    function updateHud() {
      levelEl.textContent = state.level;
      fuelEl.textContent = ship.fuel.toFixed(0);
      vyEl.textContent = ship.vy.toFixed(2);
      vxEl.textContent = ship.vx.toFixed(2);
    }

    function groundHeight(x) {
      for (let i = 0; i < terrain.length - 1; i += 1) {
        const a = terrain[i];
        const b = terrain[i + 1];
        if (x >= a.x && x <= b.x) {
          const t = (x - a.x) / (b.x - a.x || 1);
          return a.y + (b.y - a.y) * t;
        }
      }
      return canvas.height - 30;
    }

    function nextLevel() {
      state.level += 1;
      reset();
      statusEl.textContent = `成功着陆，进入第 ${state.level} 关。`;
    }

    function crash(text) {
      state.running = false;
      state.over = true;
      statusEl.textContent = text;
      messageEl.textContent = '这类游戏最怕最后一秒慌。';
    }

    function update(dt) {
      if (!state.running) return;
      ship.vy += 0.7 * dt;
      if ((state.keys.ArrowUp || state.keys[' ']) && ship.fuel > 0) {
        ship.vy -= 1.45 * dt;
        ship.fuel -= 16 * dt;
      }
      if (state.keys.ArrowLeft && ship.fuel > 0) {
        ship.vx -= 0.85 * dt;
        ship.fuel -= 8 * dt;
      }
      if (state.keys.ArrowRight && ship.fuel > 0) {
        ship.vx += 0.85 * dt;
        ship.fuel -= 8 * dt;
      }
      ship.fuel = Math.max(0, ship.fuel);
      ship.x += ship.vx * 60 * dt;
      ship.y += ship.vy * 60 * dt;
      ship.x = Math.max(20, Math.min(canvas.width - 20, ship.x));

      const floor = groundHeight(ship.x);
      if (ship.y + 18 >= floor) {
        const onPad = ship.x >= pad.x && ship.x <= pad.x + pad.w;
        const safe = Math.abs(ship.vx) < 1.3 && Math.abs(ship.vy) < 1.8;
        if (onPad && safe) nextLevel();
        else crash(onPad ? '着陆太猛，机体受损。' : '没对准平台，直接撞地。');
      }
      updateHud();
    }

    function drawShip() {
      ctx.save();
      ctx.translate(ship.x, ship.y);
      ctx.fillStyle = '#dfe6ff';
      ctx.beginPath();
      ctx.moveTo(0, -18);
      ctx.lineTo(14, 14);
      ctx.lineTo(-14, 14);
      ctx.closePath();
      ctx.fill();
      ctx.fillRect(-18, 12, 6, 3);
      ctx.fillRect(12, 12, 6, 3);
      if ((state.keys.ArrowUp || state.keys[' ']) && state.running && ship.fuel > 0) {
        ctx.fillStyle = '#ffcf6f';
        ctx.beginPath();
        ctx.moveTo(-6, 14);
        ctx.lineTo(0, 32 + Math.random() * 8);
        ctx.lineTo(6, 14);
        ctx.closePath();
        ctx.fill();
      }
      ctx.restore();
    }

    function draw() {
      const sky = ctx.createLinearGradient(0, 0, 0, canvas.height);
      sky.addColorStop(0, '#050913');
      sky.addColorStop(1, '#141d31');
      ctx.fillStyle = sky;
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      for (let i = 0; i < 80; i += 1) {
        ctx.fillStyle = `rgba(255,255,255,${0.2 + (i % 4) * 0.1})`;
        ctx.fillRect((i * 97) % canvas.width, (i * 53) % 220, 2, 2);
      }
      ctx.beginPath();
      ctx.moveTo(0, canvas.height);
      terrain.forEach(point => ctx.lineTo(point.x, point.y));
      ctx.lineTo(canvas.width, canvas.height);
      ctx.closePath();
      ctx.fillStyle = '#5e6476';
      ctx.fill();
      ctx.fillStyle = '#9fe5ff';
      ctx.fillRect(pad.x, 388, pad.w, 6);
      drawShip();

      if (!state.running) {
        ctx.fillStyle = 'rgba(0,0,0,0.28)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#fff';
        ctx.textAlign = 'center';
        ctx.font = 'bold 28px Segoe UI';
        ctx.fillText(state.over ? '任务失败' : '准备着陆', canvas.width / 2, canvas.height / 2 - 12);
        ctx.font = '17px Segoe UI';
        ctx.fillText('点击开始任务后再控制喷射', canvas.width / 2, canvas.height / 2 + 18);
        ctx.textAlign = 'left';
      }
    }

    function loop(ts) {
      const dt = Math.min(0.032, (ts - state.last) / 1000 || 0.016);
      state.last = ts;
      update(dt);
      draw();
      requestAnimationFrame(loop);
    }

    document.addEventListener('keydown', event => { state.keys[event.key] = true; if (event.key === ' ') event.preventDefault(); });
    document.addEventListener('keyup', event => { state.keys[event.key] = false; });
    document.getElementById('startBtn').addEventListener('click', () => {
      if (state.over) reset();
      state.running = true;
      statusEl.textContent = '正在着陆。';
    });
    document.getElementById('resetBtn').addEventListener('click', () => reset());

    reset(true);
    requestAnimationFrame(loop);
  </script>
</body>
</html>
