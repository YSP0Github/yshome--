<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>打地鼠｜趣味屋</title>
  <style>
    :root {
      --bg: #120d07;
      --panel: rgba(28, 18, 10, 0.92);
      --line: rgba(255,255,255,0.08);
      --text: #fff8ef;
      --muted: #d7b89f;
      --brand: #ff9a52;
      --accent: #7cf0c5;
      --shadow: 0 24px 60px rgba(0,0,0,0.34);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 15% 15%, rgba(255,154,82,0.18), transparent 24%),
        radial-gradient(circle at 82% 18%, rgba(124,240,197,0.14), transparent 24%),
        linear-gradient(180deg, #0d0804 0%, #120d07 100%);
      padding: 24px;
    }
    a { color: inherit; text-decoration: none; }
    .btn, .ghost-btn, .button, .ghost-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      white-space: nowrap;
    }

    button, select { font: inherit; }

    .app {
      width: min(1120px, 100%);
      margin: 0 auto;
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 24px;
    }
    .panel, .stage {
      background: var(--panel);
      border-radius: 28px;
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
    }
    .panel { padding: 28px; position: sticky; top: 24px; }
    .stage { padding: 22px; }
    .eyebrow {
      display: inline-flex;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(255,154,82,0.12);
      color: #ffd3b2;
      font-weight: 700;
      font-size: 0.92rem;
    }
    h1 {
      margin: 16px 0 12px;
      font-size: clamp(2rem, 4.4vw, 3.2rem);
      line-height: 1.05;
    }
    .lead, .subtle, .tips li {
      color: var(--muted);
      line-height: 1.75;
    }
    .option-box {
      margin: 22px 0 18px;
      padding: 16px;
      border-radius: 20px;
      background: rgba(255,255,255,0.05);
      display: grid;
      gap: 10px;
    }
    select {
      min-height: 44px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.06);
      color: var(--text);
      padding: 0 12px;
    }
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin: 18px 0;
    }
    .btn, .ghost-btn, .hole {
      border: 0;
      transition: transform 0.18s ease, background 0.18s ease, box-shadow 0.18s ease;
    }
    .btn, .ghost-btn {
      flex: 1 1 120px;
      min-height: 48px;
      border-radius: 16px;
      font-weight: 700;
      padding: 0 16px;
      cursor: pointer;
    }
    .btn {
      color: #2a1808;
      background: linear-gradient(135deg, var(--brand), #ffc283);
      box-shadow: 0 12px 26px rgba(255,154,82,0.2);
    }
    .ghost-btn {
      color: var(--text);
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.06);
    }
    .tips {
      margin: 18px 0 0;
      padding-left: 18px;
      display: grid;
      gap: 8px;
    }
    .hud {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-bottom: 18px;
    }
    .hud-card {
      padding: 16px;
      border-radius: 18px;
      background: rgba(255,255,255,0.05);
    }
    .hud-card strong {
      display: block;
      margin-top: 6px;
      font-size: 1.45rem;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 18px;
    }
    .hole {
      aspect-ratio: 1 / 1;
      border-radius: 24px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.02)),
        radial-gradient(circle at center 70%, #1d120a 0 28%, #422918 29% 52%, transparent 53%);
      position: relative;
      overflow: hidden;
      cursor: pointer;
    }
    .hole::after {
      content: "";
      position: absolute;
      inset: auto 18% 18px 18%;
      height: 26%;
      background: #24150a;
      border-radius: 50%;
      box-shadow: inset 0 8px 18px rgba(0,0,0,0.45);
    }
    .mole {
      position: absolute;
      left: 50%;
      bottom: 12%;
      transform: translate(-50%, 120%);
      width: 58%;
      height: 58%;
      border-radius: 50% 50% 42% 42%;
      background: linear-gradient(180deg, #b37c54, #7c4d2d);
      display: grid;
      place-items: center;
      font-size: clamp(2rem, 4vw, 3rem);
      transition: transform 160ms ease;
      box-shadow: inset 0 4px 10px rgba(255,255,255,0.15);
    }
    .hole.active .mole { transform: translate(-50%, 0); }
    .hole.hit .mole {
      transform: translate(-50%, 12%);
      filter: brightness(1.12);
    }
    .message {
      margin-top: 18px;
      padding: 16px 18px;
      border-radius: 18px;
      background: linear-gradient(135deg, rgba(255,154,82,0.14), rgba(124,240,197,0.08));
      font-weight: 700;
    }
    @media (max-width: 980px) {
      .app { grid-template-columns: 1fr; }
      .panel { position: static; }
    }
    @media (max-width: 720px) {
      body { padding: 18px; }
      .panel, .stage { padding: 20px; }
      .hud { grid-template-columns: repeat(2, 1fr); }
      .grid { gap: 12px; }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="panel">
      <div class="eyebrow">🔨 反应小游戏</div>
      <h1>打地鼠</h1>
      <p class="lead">地鼠冒头就敲，越快越好。漏掉太多会断节奏，命中高分地鼠还能额外加分。</p>

      <div class="option-box">
        <label for="speedSelect">节奏</label>
        <select id="speedSelect">
          <option value="slow">慢热</option>
          <option value="normal" selected>标准</option>
          <option value="fast">疯狂</option>
        </select>
      </div>

      <div class="actions">
        <button class="btn" id="startBtn" type="button">开始挑战</button>
        <button class="ghost-btn" id="restartBtn" type="button">重新来过</button>
      </div>

      <a class="ghost-btn" href="funhome.html#library" style="display:flex;align-items:center;justify-content:center;">← 返回趣味屋</a>

      <ul class="tips">
        <li>每次只会出现一只地鼠，但它会越来越快。</li>
        <li>连击越高，单次得分越高。</li>
        <li>如果你只想快速爽一局，这个很合适。</li>
      </ul>
    </section>

    <section class="stage">
      <div class="hud">
        <div class="hud-card">状态<strong id="stateValue">待开始</strong></div>
        <div class="hud-card">分数<strong id="scoreValue">0</strong></div>
        <div class="hud-card">连击<strong id="comboValue">0</strong></div>
        <div class="hud-card">剩余时间<strong id="timeValue">30</strong></div>
      </div>

      <div class="grid" id="grid"></div>
      <div class="message" id="messageBox">点击开始，准备敲地鼠。</div>
    </section>
  </main>

  <script>
    const speedMap = {
      slow: [900, 1300],
      normal: [650, 1000],
      fast: [430, 760]
    };

    const grid = document.getElementById('grid');
    const stateValue = document.getElementById('stateValue');
    const scoreValue = document.getElementById('scoreValue');
    const comboValue = document.getElementById('comboValue');
    const timeValue = document.getElementById('timeValue');
    const messageBox = document.getElementById('messageBox');
    const speedSelect = document.getElementById('speedSelect');

    let score = 0;
    let combo = 0;
    let timeLeft = 30;
    let running = false;
    let activeIndex = -1;
    let roundTimer = null;
    let countdownTimer = null;

    function buildGrid() {
      grid.innerHTML = Array.from({ length: 9 }, (_, index) => `
        <button class="hole" type="button" data-index="${index}">
          <span class="mole">🐹</span>
        </button>
      `).join('');

      grid.querySelectorAll('[data-index]').forEach(button => {
        button.addEventListener('click', () => hit(Number(button.dataset.index)));
      });
    }

    function updateHud() {
      stateValue.textContent = running ? '进行中' : '待开始';
      scoreValue.textContent = score;
      comboValue.textContent = combo;
      timeValue.textContent = timeLeft;
    }

    function clearActive(markMiss) {
      if (activeIndex >= 0) {
        const active = grid.children[activeIndex];
        if (active && markMiss) {
          combo = 0;
          messageBox.textContent = '漏掉了一只，连击断了。';
        }
        active?.classList.remove('active', 'hit');
      }
      activeIndex = -1;
    }

    function scheduleNext() {
      if (!running) return;
      clearActive(true);
      activeIndex = Math.floor(Math.random() * 9);
      const hole = grid.children[activeIndex];
      hole.classList.add('active');
      const [min, max] = speedMap[speedSelect.value];
      const duration = Math.floor(Math.random() * (max - min + 1)) + min;
      roundTimer = setTimeout(scheduleNext, duration);
    }

    function hit(index) {
      if (!running) return;
      if (index !== activeIndex) {
        combo = 0;
        score = Math.max(0, score - 2);
        messageBox.textContent = '敲空了，注意节奏。';
        updateHud();
        return;
      }
      const hole = grid.children[index];
      hole.classList.add('hit');
      hole.classList.remove('active');
      activeIndex = -1;
      combo += 1;
      score += 8 + combo * 2;
      messageBox.textContent = combo >= 6 ? '连击很顺，继续！' : '命中！';
      updateHud();
    }

    function endGame() {
      running = false;
      clearTimeout(roundTimer);
      clearInterval(countdownTimer);
      clearActive(false);
      stateValue.textContent = '结束';
      messageBox.textContent = `本局得分 ${score}，再来一局继续冲。`;
      updateHud();
    }

    function startGame() {
      clearTimeout(roundTimer);
      clearInterval(countdownTimer);
      score = 0;
      combo = 0;
      timeLeft = 30;
      running = true;
      messageBox.textContent = '开始了，盯紧冒头的地鼠。';
      updateHud();
      scheduleNext();
      countdownTimer = setInterval(() => {
        timeLeft -= 1;
        updateHud();
        if (timeLeft <= 0) endGame();
      }, 1000);
    }

    document.getElementById('startBtn').addEventListener('click', startGame);
    document.getElementById('restartBtn').addEventListener('click', startGame);

    buildGrid();
    updateHud();
  </script>
</body>
</html>
