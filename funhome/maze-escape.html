<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>迷宫逃脱｜趣味屋</title>
  <style>
    :root {
      --bg: #071017;
      --panel: rgba(10, 18, 28, 0.92);
      --line: rgba(255,255,255,0.08);
      --text: #f6fbff;
      --muted: #9bb1c8;
      --brand: #2dd4bf;
      --accent: #ffd166;
      --shadow: 0 24px 60px rgba(0,0,0,0.35);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 14% 16%, rgba(45,212,191,0.16), transparent 24%),
        radial-gradient(circle at 84% 18%, rgba(255,209,102,0.14), transparent 24%),
        linear-gradient(180deg, #04080c 0%, #071017 100%);
      padding: 24px;
    }
    a { color: inherit; text-decoration: none; }
    .btn, .ghost-btn, .button, .ghost-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      white-space: nowrap;
    }

    button { font: inherit; }
    .app {
      width: min(1120px, 100%);
      margin: 0 auto;
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 24px;
    }
    .panel, .stage {
      background: var(--panel);
      border-radius: 28px;
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
    }
    .panel { padding: 28px; }
    .stage { padding: 22px; }
    .eyebrow {
      display: inline-flex;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(45,212,191,0.12);
      color: #b5fff4;
      font-weight: 700;
      font-size: 0.92rem;
    }
    h1 {
      margin: 16px 0 12px;
      font-size: clamp(2rem, 4.4vw, 3rem);
      line-height: 1.05;
    }
    .lead, .tips li, .subtle {
      color: var(--muted);
      line-height: 1.75;
    }
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin: 18px 0;
    }
    .btn, .ghost-btn, .ctrl {
      border: 0;
      transition: transform 0.18s ease, background 0.18s ease, box-shadow 0.18s ease;
    }
    .btn, .ghost-btn {
      flex: 1 1 120px;
      min-height: 48px;
      border-radius: 16px;
      font-weight: 700;
      padding: 0 16px;
      cursor: pointer;
    }
    .btn {
      color: #04211b;
      background: linear-gradient(135deg, var(--brand), #8bfff0);
      box-shadow: 0 12px 26px rgba(45,212,191,0.22);
    }
    .ghost-btn {
      color: var(--text);
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.06);
    }
    .tips {
      margin: 18px 0 0;
      padding-left: 18px;
      display: grid;
      gap: 8px;
    }
    .stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-bottom: 18px;
    }
    .stat-card {
      padding: 16px;
      border-radius: 18px;
      background: rgba(255,255,255,0.05);
    }
    .stat-card strong {
      display: block;
      margin-top: 6px;
      font-size: 1.35rem;
    }
    .maze-wrap {
      display: grid;
      place-items: center;
      padding: 12px;
      border-radius: 24px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.06);
    }
    .maze {
      display: grid;
      gap: 2px;
      width: min(100%, 560px);
      aspect-ratio: 1 / 1;
    }
    .cell {
      border-radius: 6px;
      background: rgba(255,255,255,0.06);
    }
    .cell.wall { background: #02070b; }
    .cell.path { background: rgba(255,255,255,0.06); }
    .cell.player { background: #2dd4bf; box-shadow: 0 0 16px rgba(45,212,191,0.42); }
    .cell.exit { background: #ffd166; }
    .message {
      margin-top: 18px;
      padding: 16px 18px;
      border-radius: 18px;
      background: linear-gradient(135deg, rgba(45,212,191,0.14), rgba(255,209,102,0.08));
      font-weight: 700;
    }
    .controls {
      display: none;
      margin-top: 18px;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .ctrl {
      width: 58px;
      height: 58px;
      border-radius: 18px;
      background: rgba(255,255,255,0.08);
      color: var(--text);
      font-size: 1.4rem;
      cursor: pointer;
    }
    @media (max-width: 980px) {
      .app { grid-template-columns: 1fr; }
    }
    @media (max-width: 720px) {
      body { padding: 18px; }
      .panel, .stage { padding: 20px; }
      .stats { grid-template-columns: repeat(2, 1fr); }
      .controls { display: flex; }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="panel">
      <div class="eyebrow">🧭 迷宫冒险</div>
      <h1>迷宫逃脱</h1>
      <p class="lead">从左上角出发，走到右下角出口。每次重开都会生成新迷宫，适合想静下来找路的时候。</p>

      <div class="actions">
        <button class="btn" id="restartBtn" type="button">生成新迷宫</button>
        <a class="ghost-btn" href="funhome.html#library" style="display:flex;align-items:center;justify-content:center;">← 返回趣味屋</a>
      </div>

      <ul class="tips">
        <li>方向键或 WASD 控制移动。</li>
        <li>迷宫每次都会重新生成。</li>
        <li>如果一时找不到路，就试着沿着一侧一直走。</li>
      </ul>
    </section>

    <section class="stage">
      <div class="stats">
        <div class="stat-card">步数<strong id="stepValue">0</strong></div>
        <div class="stat-card">用时<strong id="timeValue">0 秒</strong></div>
        <div class="stat-card">尺寸<strong id="sizeValue">21 × 21</strong></div>
        <div class="stat-card">状态<strong id="stateValue">进行中</strong></div>
      </div>

      <div class="maze-wrap">
        <div class="maze" id="maze"></div>
      </div>
      <div class="controls">
        <button class="ctrl" data-dir="up" type="button">↑</button>
        <button class="ctrl" data-dir="left" type="button">←</button>
        <button class="ctrl" data-dir="down" type="button">↓</button>
        <button class="ctrl" data-dir="right" type="button">→</button>
      </div>
      <div class="message" id="messageBox">找到出口，别被墙卡住。</div>
    </section>
  </main>

  <script>
    const SIZE = 21;
    const mazeEl = document.getElementById('maze');
    const stepValue = document.getElementById('stepValue');
    const timeValue = document.getElementById('timeValue');
    const stateValue = document.getElementById('stateValue');
    const messageBox = document.getElementById('messageBox');

    let maze = [];
    let player = { row: 1, col: 1 };
    let exit = { row: SIZE - 2, col: SIZE - 2 };
    let steps = 0;
    let seconds = 0;
    let active = true;
    let timerId = null;

    function emptyMaze() {
      return Array.from({ length: SIZE }, () => Array(SIZE).fill(1));
    }

    function shuffle(list) {
      const arr = [...list];
      for (let i = arr.length - 1; i > 0; i -= 1) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function carve(row, col) {
      maze[row][col] = 0;
      const dirs = shuffle([[2, 0], [-2, 0], [0, 2], [0, -2]]);
      dirs.forEach(([dr, dc]) => {
        const nr = row + dr;
        const nc = col + dc;
        if (nr <= 0 || nr >= SIZE - 1 || nc <= 0 || nc >= SIZE - 1) return;
        if (maze[nr][nc] === 0) return;
        maze[row + dr / 2][col + dc / 2] = 0;
        carve(nr, nc);
      });
    }

    function updateHud() {
      stepValue.textContent = steps;
      timeValue.textContent = `${seconds} 秒`;
      stateValue.textContent = active ? '进行中' : '已完成';
    }

    function render() {
      mazeEl.style.gridTemplateColumns = `repeat(${SIZE}, 1fr)`;
      mazeEl.innerHTML = maze.flatMap((row, rowIndex) =>
        row.map((cell, colIndex) => {
          const classes = ['cell', cell ? 'wall' : 'path'];
          if (rowIndex === player.row && colIndex === player.col) classes.push('player');
          else if (rowIndex === exit.row && colIndex === exit.col) classes.push('exit');
          return `<div class="${classes.join(' ')}"></div>`;
        })
      ).join('');
    }

    function resetGame() {
      maze = emptyMaze();
      carve(1, 1);
      player = { row: 1, col: 1 };
      exit = { row: SIZE - 2, col: SIZE - 2 };
      steps = 0;
      seconds = 0;
      active = true;
      clearInterval(timerId);
      timerId = setInterval(() => {
        seconds += 1;
        updateHud();
      }, 1000);
      messageBox.textContent = '找到出口，别被墙卡住。';
      updateHud();
      render();
    }

    function move(dr, dc) {
      if (!active) return;
      const nr = player.row + dr;
      const nc = player.col + dc;
      if (nr < 0 || nr >= SIZE || nc < 0 || nc >= SIZE || maze[nr][nc] === 1) return;
      player = { row: nr, col: nc };
      steps += 1;
      updateHud();
      render();
      if (nr === exit.row && nc === exit.col) {
        active = false;
        clearInterval(timerId);
        updateHud();
        messageBox.textContent = `成功逃脱！共走了 ${steps} 步，用时 ${seconds} 秒。`;
      }
    }

    document.getElementById('restartBtn').addEventListener('click', resetGame);
    document.addEventListener('keydown', event => {
      const map = {
        ArrowUp: [-1, 0],
        ArrowDown: [1, 0],
        ArrowLeft: [0, -1],
        ArrowRight: [0, 1],
        w: [-1, 0],
        s: [1, 0],
        a: [0, -1],
        d: [0, 1]
      };
      const dir = map[event.key];
      if (!dir) return;
      event.preventDefault();
      move(...dir);
    });
    document.querySelectorAll('[data-dir]').forEach(button => {
      button.addEventListener('click', () => {
        const dirs = {
          up: [-1, 0],
          down: [1, 0],
          left: [0, -1],
          right: [0, 1]
        };
        move(...dirs[button.dataset.dir]);
      });
    });

    resetGame();
  </script>
</body>
</html>
