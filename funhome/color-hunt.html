<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>找色块｜趣味屋</title>
  <style>
    :root {
      --bg: #0c1119;
      --panel: rgba(16, 22, 34, 0.92);
      --line: rgba(255,255,255,0.08);
      --text: #f6f8ff;
      --muted: #a5b0ca;
      --brand: #7c5cff;
      --accent: #2dd4bf;
      --shadow: 0 24px 60px rgba(0,0,0,0.34);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 14% 16%, rgba(124,92,255,0.18), transparent 24%),
        radial-gradient(circle at 84% 18%, rgba(45,212,191,0.14), transparent 24%),
        linear-gradient(180deg, #070a10 0%, #0c1119 100%);
      padding: 24px;
    }
    a { color: inherit; text-decoration: none; }
    .btn, .ghost-btn, .button, .ghost-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      white-space: nowrap;
    }

    button { font: inherit; }
    .app {
      width: min(980px, 100%);
      margin: 0 auto;
      display: grid;
      grid-template-columns: 300px 1fr;
      gap: 24px;
    }
    .panel, .stage {
      background: var(--panel);
      border-radius: 28px;
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
    }
    .panel { padding: 28px; }
    .stage { padding: 22px; }
    .eyebrow {
      display: inline-flex;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(124,92,255,0.12);
      color: #d7ccff;
      font-weight: 700;
      font-size: 0.92rem;
    }
    h1 {
      margin: 16px 0 12px;
      font-size: clamp(2rem, 4.4vw, 3rem);
      line-height: 1.05;
    }
    .lead, .tips li, .subtle {
      color: var(--muted);
      line-height: 1.75;
    }
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin: 18px 0;
    }
    .btn, .ghost-btn, .cell {
      border: 0;
      transition: transform 0.18s ease, box-shadow 0.18s ease;
    }
    .btn, .ghost-btn {
      flex: 1 1 120px;
      min-height: 48px;
      border-radius: 16px;
      font-weight: 700;
      padding: 0 16px;
      cursor: pointer;
    }
    .btn {
      color: #fff;
      background: linear-gradient(135deg, var(--brand), #aa95ff);
      box-shadow: 0 12px 26px rgba(124,92,255,0.24);
    }
    .ghost-btn {
      color: var(--text);
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.06);
    }
    .tips {
      margin: 18px 0 0;
      padding-left: 18px;
      display: grid;
      gap: 8px;
    }
    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 18px;
    }
    .stat-card {
      padding: 16px;
      border-radius: 18px;
      background: rgba(255,255,255,0.05);
    }
    .stat-card strong {
      display: block;
      margin-top: 6px;
      font-size: 1.45rem;
    }
    .grid {
      display: grid;
      gap: 10px;
      width: min(100%, 520px);
      margin: 0 auto;
    }
    .cell {
      aspect-ratio: 1 / 1;
      border-radius: 16px;
      cursor: pointer;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.08);
    }
    .message {
      margin-top: 18px;
      padding: 16px 18px;
      border-radius: 18px;
      background: linear-gradient(135deg, rgba(124,92,255,0.14), rgba(45,212,191,0.08));
      font-weight: 700;
    }
    @media (max-width: 920px) {
      .app { grid-template-columns: 1fr; }
    }
    @media (max-width: 720px) {
      body { padding: 18px; }
      .panel, .stage { padding: 20px; }
      .stats { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="panel">
      <div class="eyebrow">🎨 眼力挑战</div>
      <h1>找色块</h1>
      <p class="lead">在一堆相近颜色里找出那个稍微不一样的色块。越往后越难，网格会变大，差异会变小。</p>

      <div class="actions">
        <button class="btn" id="restartBtn" type="button">重新开始</button>
        <a class="ghost-btn" href="funhome.html#library" style="display:flex;align-items:center;justify-content:center;">← 返回趣味屋</a>
      </div>

      <ul class="tips">
        <li>开始几关很简单，后面会明显变难。</li>
        <li>找到后会自动进入下一关。</li>
        <li>非常适合“再来一关”的那种小游戏。</li>
      </ul>
    </section>

    <section class="stage">
      <div class="stats">
        <div class="stat-card">当前关卡<strong id="levelValue">1</strong></div>
        <div class="stat-card">剩余时间<strong id="timeValue">45</strong></div>
        <div class="stat-card">最佳成绩<strong id="bestValue">1</strong></div>
      </div>

      <div class="grid" id="grid"></div>
      <div class="message" id="messageBox">找出颜色略微不同的那个方块。</div>
    </section>
  </main>

  <script>
    const grid = document.getElementById('grid');
    const levelValue = document.getElementById('levelValue');
    const timeValue = document.getElementById('timeValue');
    const bestValue = document.getElementById('bestValue');
    const messageBox = document.getElementById('messageBox');

    let level = 1;
    let timeLeft = 45;
    let timerId = null;
    let best = Number(localStorage.getItem('funhome-color-hunt-best') || 1);

    function rgbString(rgb) {
      return `rgb(${rgb.join(',')})`;
    }

    function createLevel() {
      const size = Math.min(6, 2 + Math.floor(level / 2));
      const total = size * size;
      const hue = Math.floor(Math.random() * 360);
      const saturation = 70;
      const lightness = 55;
      const diff = Math.max(4, 18 - level);
      const oddIndex = Math.floor(Math.random() * total);

      const base = `hsl(${hue}deg ${saturation}% ${lightness}%)`;
      const odd = `hsl(${hue}deg ${saturation}% ${Math.max(24, lightness + (Math.random() > 0.5 ? diff : -diff))}%)`;

      grid.style.gridTemplateColumns = `repeat(${size}, 1fr)`;
      grid.innerHTML = Array.from({ length: total }, (_, index) => `
        <button class="cell" type="button" data-index="${index}" style="background:${index === oddIndex ? odd : base};"></button>
      `).join('');

      grid.querySelectorAll('[data-index]').forEach(button => {
        button.addEventListener('click', () => {
          if (Number(button.dataset.index) === oddIndex) {
            level += 1;
            best = Math.max(best, level);
            localStorage.setItem('funhome-color-hunt-best', String(best));
            messageBox.textContent = '找到了，下一关更难。';
            updateHud();
            createLevel();
          } else {
            timeLeft = Math.max(0, timeLeft - 2);
            messageBox.textContent = '点错了，扣 2 秒。';
            updateHud();
            if (timeLeft <= 0) endGame();
          }
        });
      });
    }

    function updateHud() {
      levelValue.textContent = level;
      timeValue.textContent = timeLeft;
      bestValue.textContent = best;
    }

    function endGame() {
      clearInterval(timerId);
      timerId = null;
      grid.innerHTML = '';
      messageBox.textContent = `时间到，最终到达第 ${level} 关。点“重新开始”再来。`;
    }

    function startGame() {
      clearInterval(timerId);
      level = 1;
      timeLeft = 45;
      messageBox.textContent = '找出颜色略微不同的那个方块。';
      updateHud();
      createLevel();
      timerId = setInterval(() => {
        timeLeft -= 1;
        updateHud();
        if (timeLeft <= 0) endGame();
      }, 1000);
    }

    document.getElementById('restartBtn').addEventListener('click', startGame);

    updateHud();
    startGame();
  </script>
</body>
</html>
