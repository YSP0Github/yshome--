<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>砖块弹球｜趣味屋</title>
  <style>
    :root {
      --bg: #071019;
      --panel: rgba(10, 20, 32, 0.92);
      --line: rgba(255,255,255,0.08);
      --text: #f6fbff;
      --muted: #9cb1c9;
      --brand: #2dd4bf;
      --accent: #7c5cff;
      --shadow: 0 24px 60px rgba(0,0,0,0.35);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 14% 16%, rgba(45,212,191,0.16), transparent 24%),
        radial-gradient(circle at 84% 18%, rgba(124,92,255,0.16), transparent 24%),
        linear-gradient(180deg, #04080e 0%, #071019 100%);
      padding: 24px;
    }
    a { color: inherit; text-decoration: none; }
    .btn, .ghost-btn, .button, .ghost-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      white-space: nowrap;
    }

    button { font: inherit; }
    .app {
      width: min(1120px, 100%);
      margin: 0 auto;
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 24px;
    }
    .panel, .stage {
      background: var(--panel);
      border-radius: 28px;
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
    }
    .panel { padding: 28px; }
    .stage { padding: 22px; }
    .eyebrow {
      display: inline-flex;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(45,212,191,0.12);
      color: #bcfff5;
      font-weight: 700;
      font-size: 0.92rem;
    }
    h1 {
      margin: 16px 0 12px;
      font-size: clamp(2rem, 4.4vw, 3rem);
      line-height: 1.05;
    }
    .lead, .tips li, .subtle {
      color: var(--muted);
      line-height: 1.75;
    }
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin: 18px 0;
    }
    .btn, .ghost-btn {
      flex: 1 1 120px;
      min-height: 48px;
      border-radius: 16px;
      border: 0;
      font-weight: 700;
      padding: 0 16px;
      cursor: pointer;
      transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
    }
    .btn {
      color: #08211c;
      background: linear-gradient(135deg, var(--brand), #97fff1);
      box-shadow: 0 12px 26px rgba(45,212,191,0.22);
    }
    .ghost-btn {
      color: var(--text);
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.06);
    }
    .tips {
      margin: 18px 0 0;
      padding-left: 18px;
      display: grid;
      gap: 8px;
    }
    .stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-bottom: 18px;
    }
    .stat-card {
      padding: 16px;
      border-radius: 18px;
      background: rgba(255,255,255,0.05);
    }
    .stat-card strong {
      display: block;
      margin-top: 6px;
      font-size: 1.35rem;
    }
    .canvas-shell {
      display: grid;
      place-items: center;
      padding: 12px;
      border-radius: 24px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.06);
    }
    canvas {
      width: min(100%, 720px);
      aspect-ratio: 16 / 10;
      border-radius: 18px;
      background: linear-gradient(180deg, rgba(8,18,28,1), rgba(3,8,14,1));
    }
    .message {
      margin-top: 18px;
      padding: 16px 18px;
      border-radius: 18px;
      background: linear-gradient(135deg, rgba(45,212,191,0.14), rgba(124,92,255,0.08));
      font-weight: 700;
    }
    @media (max-width: 980px) {
      .app { grid-template-columns: 1fr; }
    }
    @media (max-width: 720px) {
      body { padding: 18px; }
      .panel, .stage { padding: 20px; }
      .stats { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="panel">
      <div class="eyebrow">🏓 街机小游戏</div>
      <h1>砖块弹球</h1>
      <p class="lead">接住小球，打碎所有砖块。左/右方向键或 A/D 控制挡板，适合短时间来一把。</p>

      <div class="actions">
        <button class="btn" id="startBtn" type="button">开始 / 继续</button>
        <button class="ghost-btn" id="restartBtn" type="button">重开</button>
      </div>

      <a class="ghost-btn" href="funhome.html#library" style="display:flex;align-items:center;justify-content:center;">← 返回趣味屋</a>

      <ul class="tips">
        <li>击中挡板不同位置，反弹角度会不同。</li>
        <li>砖块全部清空就过关。</li>
        <li>如果球掉到底部，会损失一条生命。</li>
      </ul>
    </section>

    <section class="stage">
      <div class="stats">
        <div class="stat-card">得分<strong id="scoreValue">0</strong></div>
        <div class="stat-card">生命<strong id="lifeValue">3</strong></div>
        <div class="stat-card">剩余砖块<strong id="brickValue">0</strong></div>
        <div class="stat-card">状态<strong id="stateValue">待开始</strong></div>
      </div>

      <div class="canvas-shell">
        <canvas id="canvas" width="720" height="450"></canvas>
      </div>
      <div class="message" id="messageBox">点开始后用左右方向键移动挡板。</div>
    </section>
  </main>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const scoreValue = document.getElementById('scoreValue');
    const lifeValue = document.getElementById('lifeValue');
    const brickValue = document.getElementById('brickValue');
    const stateValue = document.getElementById('stateValue');
    const messageBox = document.getElementById('messageBox');

    let paddle, ball, bricks, score, lives, running, animationId;
    let leftPressed = false;
    let rightPressed = false;

    function resetGame() {
      paddle = { x: canvas.width / 2 - 60, y: canvas.height - 28, width: 120, height: 14, speed: 8 };
      ball = { x: canvas.width / 2, y: canvas.height - 44, dx: 4, dy: -4, radius: 9 };
      bricks = [];
      score = 0;
      lives = 3;
      running = false;
      for (let row = 0; row < 5; row += 1) {
        for (let col = 0; col < 8; col += 1) {
          bricks.push({
            x: 28 + col * 83,
            y: 38 + row * 30,
            width: 70,
            height: 18,
            alive: true,
            color: `hsl(${180 + row * 26 + col * 4}deg 80% 60%)`
          });
        }
      }
      updateHud();
      draw();
      messageBox.textContent = '点开始后用左右方向键移动挡板。';
    }

    function updateHud() {
      scoreValue.textContent = score;
      lifeValue.textContent = lives;
      brickValue.textContent = bricks.filter(brick => brick.alive).length;
      stateValue.textContent = running ? '进行中' : '待开始';
    }

    function drawRoundedRect(x, y, w, h, r, color) {
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.roundRect(x, y, w, h, r);
      ctx.fill();
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      bricks.forEach(brick => {
        if (brick.alive) drawRoundedRect(brick.x, brick.y, brick.width, brick.height, 8, brick.color);
      });

      drawRoundedRect(paddle.x, paddle.y, paddle.width, paddle.height, 8, '#e8f6ff');

      ctx.fillStyle = '#2dd4bf';
      ctx.beginPath();
      ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
      ctx.fill();
    }

    function bounceFromPaddle() {
      const hitPos = (ball.x - (paddle.x + paddle.width / 2)) / (paddle.width / 2);
      ball.dx = hitPos * 6;
      ball.dy = -Math.abs(ball.dy);
    }

    function update() {
      if (!running) return;

      if (leftPressed) paddle.x -= paddle.speed;
      if (rightPressed) paddle.x += paddle.speed;
      paddle.x = Math.max(0, Math.min(canvas.width - paddle.width, paddle.x));

      ball.x += ball.dx;
      ball.y += ball.dy;

      if (ball.x - ball.radius <= 0 || ball.x + ball.radius >= canvas.width) ball.dx *= -1;
      if (ball.y - ball.radius <= 0) ball.dy *= -1;

      if (ball.y + ball.radius >= paddle.y &&
          ball.x >= paddle.x &&
          ball.x <= paddle.x + paddle.width &&
          ball.dy > 0) {
        bounceFromPaddle();
      }

      bricks.forEach(brick => {
        if (!brick.alive) return;
        const hitX = ball.x >= brick.x && ball.x <= brick.x + brick.width;
        const hitY = ball.y - ball.radius <= brick.y + brick.height && ball.y + ball.radius >= brick.y;
        if (hitX && hitY) {
          brick.alive = false;
          score += 10;
          ball.dy *= -1;
        }
      });

      if (bricks.every(brick => !brick.alive)) {
        running = false;
        updateHud();
        messageBox.textContent = `清空了全部砖块！最终得分 ${score}。`;
      }

      if (ball.y - ball.radius > canvas.height) {
        lives -= 1;
        if (lives <= 0) {
          running = false;
          updateHud();
          messageBox.textContent = `没有生命了，本局得分 ${score}。`;
        } else {
          ball.x = canvas.width / 2;
          ball.y = canvas.height - 44;
          ball.dx = 4;
          ball.dy = -4;
          paddle.x = canvas.width / 2 - 60;
          running = false;
          updateHud();
          messageBox.textContent = '掉球了，点开始继续。';
        }
      }

      updateHud();
      draw();
      animationId = requestAnimationFrame(update);
    }

    function startGame() {
      if (running) return;
      running = true;
      messageBox.textContent = '稳住挡板，把砖块全部清掉。';
      updateHud();
      cancelAnimationFrame(animationId);
      animationId = requestAnimationFrame(update);
    }

    document.addEventListener('keydown', event => {
      if (event.key === 'ArrowLeft' || event.key === 'a') leftPressed = true;
      if (event.key === 'ArrowRight' || event.key === 'd') rightPressed = true;
    });
    document.addEventListener('keyup', event => {
      if (event.key === 'ArrowLeft' || event.key === 'a') leftPressed = false;
      if (event.key === 'ArrowRight' || event.key === 'd') rightPressed = false;
    });

    document.getElementById('startBtn').addEventListener('click', startGame);
    document.getElementById('restartBtn').addEventListener('click', () => {
      cancelAnimationFrame(animationId);
      resetGame();
    });

    resetGame();
  </script>
</body>
</html>
