<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>靶心猎手｜趣味屋</title>
  <link rel="stylesheet" href="handmade-game.css">
  <style>
    :root { --accent: #ff7070; --accent-2: #ffc46b; }
    canvas { cursor: crosshair; }
  </style>
</head>
<body>
  <main class="page">
    <aside class="panel">
      <div class="badge">🎯 手写新作 · 点击射击</div>
      <h1>靶心猎手</h1>
      <p class="lead">不是无脑乱点，而是偏准度和节奏的打靶练习。目标会弹跳、缩放、变速，连续命中会给你更高倍率，空枪则会打断节奏。</p>
      <div class="actions">
        <button class="btn" id="startBtn" type="button">开始计时</button>
        <button class="ghost-btn" id="restartBtn" type="button">重置</button>
        <a class="ghost-btn" href="funhome.html#library">← 返回趣味屋</a>
      </div>
      <div class="stats-grid">
        <div class="stat"><span>得分</span><strong id="scoreEl">0</strong></div>
        <div class="stat"><span>连击</span><strong id="comboEl">0</strong></div>
        <div class="stat"><span>剩余时间</span><strong id="timeEl">45.0</strong></div>
        <div class="stat"><span>最佳分数</span><strong id="bestEl">0</strong></div>
      </div>
      <ul class="tips">
        <li>点击靶子中心区域得分更高，边缘命中分数较低。</li>
        <li>连续命中会提升靶子速度，也会提高倍率。</li>
        <li>空枪会扣时间并清空连击。</li>
      </ul>
      <p class="meta-line" id="messageEl">开始后立刻点，不要先观察太久。</p>
    </aside>

    <section class="stage">
      <div class="canvas-shell">
        <div class="legend">
          <span class="legend-item">🖱️ 鼠标点击靶子</span>
          <span class="legend-item">⏱️ 45 秒内刷高分</span>
        </div>
        <div class="canvas-wrap" style="margin-top:12px;">
          <canvas id="game" width="680" height="420"></canvas>
        </div>
      </div>
      <div class="message" id="statusEl">点击“开始计时”进入一轮 45 秒挑战。</div>
    </section>
  </main>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('scoreEl');
    const comboEl = document.getElementById('comboEl');
    const timeEl = document.getElementById('timeEl');
    const bestEl = document.getElementById('bestEl');
    const messageEl = document.getElementById('messageEl');
    const statusEl = document.getElementById('statusEl');
    const storageKey = 'funhome-best-target-hunter';
    const state = { running: false, over: false, time: 45, score: 0, combo: 0, best: Number(localStorage.getItem(storageKey) || 0), last: 0 };
    bestEl.textContent = state.best;
    let targets = [];
    let sparks = [];

    function reset() {
      state.running = false;
      state.over = false;
      state.time = 45;
      state.score = 0;
      state.combo = 0;
      targets = [];
      sparks = [];
      for (let i = 0; i < 4; i += 1) spawnTarget();
      updateHud();
      statusEl.textContent = '准备开始。';
      messageEl.textContent = '先追最慢的那个靶。';
    }

    function updateHud() {
      scoreEl.textContent = state.score;
      comboEl.textContent = state.combo;
      timeEl.textContent = state.time.toFixed(1);
      bestEl.textContent = state.best;
    }

    function spawnTarget() {
      const speedScale = 1 + state.combo * 0.05 + state.score / 250;
      targets.push({
        x: 70 + Math.random() * (canvas.width - 140),
        y: 70 + Math.random() * (canvas.height - 140),
        r: 24 + Math.random() * 16,
        vx: (Math.random() > 0.5 ? 1 : -1) * (60 + Math.random() * 90) * speedScale,
        vy: (Math.random() > 0.5 ? 1 : -1) * (60 + Math.random() * 90) * speedScale,
        pulse: Math.random() * Math.PI * 2,
        hue: 360 * Math.random(),
      });
    }

    function hitTarget(target, distance) {
      const ratio = 1 - distance / target.r;
      const gain = Math.max(8, Math.round(12 + ratio * 24 + state.combo * 1.2));
      state.score += gain;
      state.combo += 1;
      if (state.score > state.best) {
        state.best = state.score;
        localStorage.setItem(storageKey, String(state.best));
      }
      messageEl.textContent = ratio > 0.7 ? '漂亮，接近红心。' : '命中了，继续！';
      for (let i = 0; i < 12; i += 1) {
        sparks.push({ x: target.x, y: target.y, vx: (Math.random() - 0.5) * 200, vy: (Math.random() - 0.5) * 200, life: 0.6, color: `hsl(${target.hue} 90% 68%)` });
      }
      targets = targets.filter(t => t !== target);
      spawnTarget();
      updateHud();
    }

    function missShot() {
      state.combo = 0;
      state.time = Math.max(0, state.time - 1.2);
      messageEl.textContent = '空枪，节奏断了。';
      updateHud();
    }

    function update(dt) {
      if (!state.running) return;
      state.time -= dt;
      if (state.time <= 0) {
        state.time = 0;
        state.running = false;
        state.over = true;
        statusEl.textContent = '计时结束。';
      }
      targets.forEach(target => {
        target.x += target.vx * dt;
        target.y += target.vy * dt;
        target.pulse += dt * 3;
        if (target.x < target.r || target.x > canvas.width - target.r) target.vx *= -1;
        if (target.y < target.r || target.y > canvas.height - target.r) target.vy *= -1;
      });
      sparks.forEach(s => {
        s.x += s.vx * dt;
        s.y += s.vy * dt;
        s.vx *= 0.96;
        s.vy *= 0.96;
        s.life -= dt;
      });
      sparks = sparks.filter(s => s.life > 0);
      updateHud();
      statusEl.textContent = `保持连击会越来越快，当前靶数 ${targets.length}`;
    }

    function drawTarget(target) {
      const radius = target.r + Math.sin(target.pulse) * 2;
      const gradient = ctx.createRadialGradient(target.x - radius * 0.25, target.y - radius * 0.25, 6, target.x, target.y, radius);
      gradient.addColorStop(0, '#fff');
      gradient.addColorStop(0.25, '#ffefe8');
      gradient.addColorStop(0.5, `hsl(${target.hue} 90% 68%)`);
      gradient.addColorStop(1, '#5b1220');
      ctx.fillStyle = gradient;
      ctx.beginPath();
      ctx.arc(target.x, target.y, radius, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = 'rgba(255,255,255,0.92)';
      ctx.beginPath();
      ctx.arc(target.x, target.y, radius * 0.58, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#ff5f6b';
      ctx.beginPath();
      ctx.arc(target.x, target.y, radius * 0.22, 0, Math.PI * 2);
      ctx.fill();
    }

    function draw() {
      const bg = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
      bg.addColorStop(0, '#0d1628');
      bg.addColorStop(1, '#1a243d');
      ctx.fillStyle = bg;
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      for (let i = 0; i < 12; i += 1) {
        ctx.fillStyle = `rgba(255,255,255,${0.03 + i * 0.004})`;
        ctx.fillRect(i * 60, 0, 1, canvas.height);
      }
      targets.forEach(drawTarget);
      sparks.forEach(s => {
        ctx.globalAlpha = s.life;
        ctx.fillStyle = s.color;
        ctx.beginPath();
        ctx.arc(s.x, s.y, 3, 0, Math.PI * 2);
        ctx.fill();
      });
      ctx.globalAlpha = 1;

      if (!state.running) {
        ctx.fillStyle = 'rgba(0,0,0,0.28)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#fff';
        ctx.textAlign = 'center';
        ctx.font = 'bold 28px Segoe UI';
        ctx.fillText(state.over ? '计时结束' : '准备开枪', canvas.width / 2, canvas.height / 2 - 12);
        ctx.font = '17px Segoe UI';
        ctx.fillText('开始后用鼠标打靶', canvas.width / 2, canvas.height / 2 + 20);
        ctx.textAlign = 'left';
      }
    }

    canvas.addEventListener('pointerdown', (event) => {
      const rect = canvas.getBoundingClientRect();
      const x = (event.clientX - rect.left) * (canvas.width / rect.width);
      const y = (event.clientY - rect.top) * (canvas.height / rect.height);
      if (!state.running) return;
      let hit = null;
      let hitDistance = Infinity;
      targets.forEach(target => {
        const distance = Math.hypot(x - target.x, y - target.y);
        if (distance <= target.r && distance < hitDistance) {
          hit = target;
          hitDistance = distance;
        }
      });
      if (hit) hitTarget(hit, hitDistance);
      else missShot();
    });

    function loop(ts) {
      const dt = Math.min(0.032, (ts - state.last) / 1000 || 0.016);
      state.last = ts;
      update(dt);
      draw();
      requestAnimationFrame(loop);
    }

    document.getElementById('startBtn').addEventListener('click', () => {
      if (state.over) reset();
      state.running = true;
      statusEl.textContent = '计时开始！';
    });
    document.getElementById('restartBtn').addEventListener('click', reset);

    reset();
    requestAnimationFrame(loop);
  </script>
</body>
</html>
