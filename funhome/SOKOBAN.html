<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Sokoban 推箱子</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #1a1a2e;
  --panel: #16213e;
  --accent: #e94560;
  --text: #eee;
  --text-dim: #999;
  --wall: #5b4a3f;
  --wall-top: #7a6655;
  --floor: #f5e6c8;
  --floor-alt: #eddcb1;
  --target: #e8b960;
  --box: #c0392b;
  --box-done: #27ae60;
  --player: #2980b9;
}
body {
  font-family: 'Segoe UI', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  user-select: none;
  overflow-x: hidden;
}
header { text-align: center; padding: 16px 8px 8px; }
header h1 {
  font-size: 28px;
  background: linear-gradient(135deg, var(--accent), #f39c12, #e74c3c);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: 2px;
}
header p { font-size: 13px; color: var(--text-dim); margin-top: 4px; }
.top-bar {
  display: flex; gap: 8px; align-items: center;
  flex-wrap: wrap; justify-content: center; padding: 8px 12px; max-width: 700px;
}
.top-bar button {
  background: var(--panel); color: var(--text);
  border: 1px solid #333; border-radius: 8px;
  padding: 6px 14px; font-size: 14px; cursor: pointer; transition: all .2s;
}
.top-bar button:hover { background: #1f3460; border-color: var(--accent); }
.top-bar .info-pill {
  background: var(--panel); border-radius: 8px; padding: 6px 12px;
  font-size: 13px; color: var(--text-dim); border: 1px solid #333;
}
.top-bar .info-pill span { color: #fff; font-weight: 600; }
.board-wrap {
  position: relative; margin: 8px auto;
  display: flex; justify-content: center; align-items: center;
}
canvas#board { border-radius: 12px; }
.dpad {
  display: grid;
  grid-template-columns: 44px 44px 44px;
  grid-template-rows: 44px 44px 44px;
  gap: 4px; margin: 6px auto;
}
.dpad button {
  background: var(--panel); color: var(--text);
  border: 1px solid #444; border-radius: 10px;
  width: 44px; height: 44px; font-size: 20px;
  cursor: pointer; transition: all .15s;
  display: flex; align-items: center; justify-content: center;
}
.dpad button:active { transform: scale(0.92); background: var(--accent); }
.dpad .c1 { grid-column: 2; grid-row: 1; }
.dpad .c2 { grid-column: 1; grid-row: 2; }
.dpad .c3 { grid-column: 3; grid-row: 2; }
.dpad .c4 { grid-column: 2; grid-row: 3; }
.panel {
  background: var(--panel); border: 1px solid #333; border-radius: 12px;
  padding: 16px; margin: 8px 12px; max-width: 700px; width: calc(100% - 24px);
}
.panel h3 { font-size: 15px; margin-bottom: 10px; color: var(--accent); }
.panel .row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 8px; align-items: center; }
.panel button {
  background: var(--accent); color: #fff; border: none; border-radius: 8px;
  padding: 7px 16px; font-size: 13px; cursor: pointer; transition: opacity .2s;
}
.panel button:hover { opacity: .85; }
.panel button.secondary { background: #444; }
.level-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(40px, 1fr));
  gap: 4px; margin-top: 8px;
}
.level-grid button {
  background: var(--panel); color: var(--text);
  border: 1px solid #444; border-radius: 6px;
  padding: 8px 4px; font-size: 13px;
  cursor: pointer; text-align: center; transition: all .2s;
}
.level-grid button:hover { border-color: var(--accent); }
.level-grid button.current { background: var(--accent); border-color: var(--accent); }
.level-grid button.solved { background: #27ae60; border-color: #27ae60; color: #fff; }
.hint-box {
  background: #0f1a33; border: 1px solid #444; border-radius: 8px;
  padding: 12px; margin-top: 10px; font-family: 'Consolas', monospace;
  font-size: 14px; line-height: 1.8; min-height: 40px;
}
.hint-box .step { display: inline-block; width: 28px; height: 28px; line-height: 28px; text-align: center; margin: 2px; border-radius: 4px; background: #1f3460; }
.hint-box .step.active { background: var(--accent); color: #fff; }
.hint-box .step.done { background: #27ae60; color: #fff; }
.board-wrap.hint-active { outline: 2px solid var(--accent); outline-offset: 4px; border-radius: 8px; }
.hint-status { text-align: center; font-size: 12px; color: var(--accent); margin-top: 6px; padding: 4px; background: rgba(41,128,185,.1); border-radius: 4px; }
.overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.7);
  display: flex; align-items: center; justify-content: center; z-index: 100;
}
.overlay.hidden { display: none; }
.overlay .dialog {
  background: var(--panel); border: 1px solid #444; border-radius: 16px;
  padding: 32px; text-align: center; max-width: 360px; animation: pop .3s ease;
}
@keyframes pop { from { transform: scale(.8); opacity: 0; } }
.overlay .dialog h2 { font-size: 24px; margin-bottom: 8px; }
.overlay .dialog p { color: var(--text-dim); margin-bottom: 16px; font-size: 14px; }
.overlay .dialog button {
  background: var(--accent); color: #fff; border: none; border-radius: 8px;
  padding: 10px 28px; font-size: 15px; cursor: pointer; margin: 4px;
}
.overlay .dialog button.secondary { background: #444; }
.cert-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
  margin-top: 8px;
}
.cert-table th {
  background: #0f1a33;
  color: var(--accent);
  padding: 8px 10px;
  text-align: left;
  border-bottom: 2px solid #333;
  font-weight: 600;
}
.cert-table td {
  padding: 6px 10px;
  border-bottom: 1px solid #222;
  color: var(--text-dim);
}
.cert-table tr:nth-child(even) td { background: rgba(255,255,255,.02); }
.cert-table .ok { color: #2ecc71; font-weight: 600; }
.cert-table .steps { color: #f39c12; font-weight: 600; }
.cert-table .boxes { color: #3498db; }
.cert-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: linear-gradient(135deg, #1a3a1a, #0f2a0f);
  border: 1px solid #27ae60;
  border-radius: 10px;
  padding: 10px 18px;
  margin-bottom: 12px;
  font-size: 14px;
  color: #2ecc71;
}
.cert-badge .icon { font-size: 22px; }
.cert-summary {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  margin-bottom: 12px;
}
.cert-summary .stat {
  background: #0f1a33;
  border: 1px solid #333;
  border-radius: 8px;
  padding: 8px 14px;
  font-size: 13px;
}
.stat .num { color: #fff; font-weight: 700; font-size: 18px; }
.stat .label { color: var(--text-dim); margin-left: 4px; }
footer { padding: 12px; font-size: 12px; color: #555; text-align: center; }
.hidden { display: none !important; }
</style>
</head>
<body>

<header>
  <h1>推箱子 SOKOBAN</h1>
  <p>将所有箱子推到目标点上 | 经典 NP-hard 益智游戏 | 全部 20 关均已验证可解</p>
</header>

<div class="top-bar">
  <div class="info-pill">关卡 <span id="lblLevel">1</span></div>
  <div class="info-pill">步数 <span id="lblMoves">0</span></div>
  <div class="info-pill">推箱 <span id="lblPushes">0</span></div>
  <div class="info-pill">用时 <span id="lblTime">0:00</span></div>
  <button id="btnUndo" title="撤销 (Z)">↩ 撤销</button>
  <button id="btnRedo" title="重做 (Y)">↪ 重做</button>
  <button id="btnRestart" title="重玩 (R)">⟲ 重玩</button>
  <button id="btnHint" title="查看攻略">💡 攻略</button>
</div>

<div class="board-wrap">
  <canvas id="board" width="600" height="600"></canvas>
</div>

<div class="dpad">
  <button class="c1" data-dir="up">▲</button>
  <button class="c2" data-dir="left">◀</button>
  <button class="c3" data-dir="right">▶</button>
  <button class="c4" data-dir="down">▼</button>
</div>

<div class="panel" id="hintPanel" style="display:none">
  <h3>💡 攻略模式 <span id="hintInfo" style="font-size:12px;color:var(--text-dim)"></span></h3>
  <div style="display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap">
    <button id="btnStepPrev">◀ 上一步</button>
    <button id="btnStepNext">下一步 ▶</button>
    <button id="btnAutoPlay" class="secondary">自动播放 ▶▶</button>
    <button id="btnResetHint" class="secondary">重置关卡</button>
    <button id="btnHideHint" class="secondary">退出攻略</button>
  </div>
  <div class="hint-box" id="hintBox"></div>
  <div class="hint-status" id="hintStatus">💡 攻略模式已开启 — 请勿手动操作，使用按钮或左右方向键切换步骤</div>
</div>

<div class="panel" id="levelPanel">
  <h3>选择关卡</h3>
  <div class="level-grid" id="levelGrid"></div>
</div>

<div class="panel" id="certPanel">
  <div class="cert-badge"><span class="icon">🛡️</span> <strong>可解性验证证书</strong> — 全部 <span id="certTotal"></span> 关均由 BFS 求解器验证可解</div>
  <div class="cert-summary" id="certSummary"></div>
  <table class="cert-table">
    <thead><tr><th>关卡</th><th>箱子数</th><th>最优步数</th><th>验证状态</th></tr></thead>
    <tbody id="certBody"></tbody>
  </table>
</div>

<div class="overlay hidden" id="winOverlay">
  <div class="dialog">
    <h2>🎉 恭喜过关！</h2>
    <p id="winStats">你用了 0 步，耗时 0:00</p>
    <button id="btnNextLevel">下一关</button>
    <button id="btnReplay" class="secondary">重玩本关</button>
  </div>
</div>

<footer>Sokoban 推箱子 — 经典益智游戏 · 全部 20 关经 BFS 求解器验证均可完成 · 纯前端零依赖</footer>

<script>
"use strict";

const TILE = { VOID: 0, WALL: 1, FLOOR: 2, TARGET: 3 };

const LEVELS = [
  "#####\n#   #\n# $ #\n# .@#\n#####",
  "######\n#    #\n# @$.#\n# $  #\n# .  #\n######",
  "#####\n#   ##\n# $  #\n## $ #\n #.@ #\n #.  #\n #####",
  "######\n#    #\n# @$.#\n#  $.#\n#    #\n######",
  "######\n# .  #\n#  # #\n# @$ #\n#  $ #\n# .# #\n######",
  "#######\n#     #\n# $@$ #\n# #.# #\n# $.  #\n#  .  #\n#######",
  "#####\n#   #\n# # #\n# $ ##\n#  $.#\n#.@$.#\n######",
  "######\n#    ##\n# #  ##\n# $.  #\n# .$$ #\n# .@  #\n#######",
  "  ####\n###  #\n#    ##\n# #.$.#\n# $ @ #\n## #  #\n #####",
  "#######\n#   . #\n# # # #\n# $$  #\n# .@  #\n#   ###\n#####",
  "#######\n#     #\n# $.@ #\n# $.  #\n# $.  #\n#     #\n#######",
  "#######\n# ..  #\n# $@$ #\n# $ . #\n#     #\n#######",
  "######\n#    ##\n# # . #\n# $$.##\n## .$.#\n # $ @#\n #  ###\n ####",
  "######\n# .. #\n# $  #\n#.$$ #\n# $. #\n# @  #\n######",
  "#######\n#  ..#\n#  $ #\n#.$$ #\n# $. #\n# @  #\n#######",
  "#######\n#  .  #\n# # # #\n# $.$ #\n#.$$@.#\n# $.  #\n#######",
  "#######\n#  .  #\n#.$.$ #\n# # # #\n# $$@ #\n#  .  #\n#######",
  "######\n#    ##\n#  #  #\n# $.  #\n# .$$ #\n# @.  #\n#######",
  "#######\n#     #\n#.# #.#\n# $$  #\n#.# @.#\n# $$  #\n#     #\n#######",
  "#######\n#  .  #\n# $.$ #\n#  @  #\n# $.$ #\n#  .  #\n#######",
];

const SOLUTIONS = {
  0: "uuld",
  1: "dur",
  2: "ruululddurddrdl",
  3: "rldr",
  4: "uurrdddlruuulldddrruldluu",
  5: "ulldrurdddrruululdllddr",
  6: "rlurulruullddd",
  7: "lulurddrrruuldlrrdll",
  8: "rululllddrrrdru",
  9: "uuddllurluurrddrdl",
  10: "ullldrldrldr",
  11: "urdulllddruddruu",
  12: "lluuruulllddrrdrullluurrddrddldluudrruuluullddrr",
  13: "ruuudludrddllur",
  14: "lurrdruuuldlulur",
  15: "ruuullllddddrruuuddrruuullddrdldlluurrdrrdluluuurrddldlluluur",
  16: "dluuudddllurluuurrdlrddrruulrul",
  17: "uluruurrdddlrrdl",
  18: "ludrddluldluuurrdrruuullddrdddllurdruruulldrdlldlu",
  19: "lulurddldrurrrulddrdl",
};

const DIR_LABELS = { u: '↑', d: '↓', l: '←', r: '→' };
const DIR_MAP = { u: [0, -1], d: [0, 1], l: [-1, 0], r: [1, 0] };

let grid = [], gridW = 0, gridH = 0;
let playerX = 0, playerY = 0;
let boxes = [], targets = [];
let currentLevel = 0, moves = 0, pushes = 0;
let startTime = 0, timerInterval = null;
let solved = new Set();
let history = [], redoStack = [];
let hintStep = 0;
let hintMode = false;
let hintAutoTimer = null;

const canvas = document.getElementById('board');
const ctx = canvas.getContext('2d');

function parseLevel(str) {
  const lines = str.split('\n');
  let maxW = 0;
  for (const l of lines) maxW = Math.max(maxW, l.length);
  gridW = maxW; gridH = lines.length;
  grid = []; boxes = []; targets = [];
  const CHAR_MAP = { '#': TILE.WALL, ' ': TILE.FLOOR, '.': TILE.TARGET, '@': TILE.FLOOR, '$': TILE.FLOOR, '*': TILE.TARGET, '+': TILE.TARGET };
  for (let y = 0; y < gridH; y++) {
    grid[y] = [];
    for (let x = 0; x < gridW; x++) {
      const ch = (lines[y] || '')[x] || ' ';
      const t = CHAR_MAP[ch] ?? TILE.VOID;
      grid[y][x] = t;
      if (t === TILE.TARGET) targets.push({ x, y });
      if (ch === '@' || ch === '+') { playerX = x; playerY = y; }
      if (ch === '$' || ch === '*') boxes.push({ x, y });
    }
  }
  for (let y = 0; y < gridH; y++) {
    for (let x = 0; x < gridW; x++) {
      if (grid[y][x] === TILE.VOID) {
        let adj = false;
        for (const [dx, dy] of [[0,1],[0,-1],[1,0],[-1,0]]) {
          const nx = x + dx, ny = y + dy;
          if (nx >= 0 && nx < gridW && ny >= 0 && ny < gridH && grid[ny][nx] !== TILE.VOID && grid[ny][nx] !== TILE.WALL) adj = true;
        }
        if (adj) grid[y][x] = TILE.FLOOR;
      }
    }
  }
}

function isBox(x, y) { return boxes.some(b => b.x === x && b.y === y); }
function isWall(x, y) {
  if (x < 0 || x >= gridW || y < 0 || y >= gridH) return true;
  return grid[y][x] === TILE.WALL || grid[y][x] === TILE.VOID;
}
function isSolved() { return targets.every(t => isBox(t.x, t.y)); }

function cellSize() {
  const maxW = (window.innerWidth - 32);
  const maxH = (window.innerHeight - 360);
  const cw = Math.floor(maxW / gridW);
  const ch = Math.floor(maxH / gridH);
  return Math.max(20, Math.min(64, cw, ch));
}

function draw() {
  const cs = cellSize();
  canvas.width = gridW * cs;
  canvas.height = gridH * cs;
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  const now = performance.now();

  for (let y = 0; y < gridH; y++) {
    for (let x = 0; x < gridW; x++) {
      const t = grid[y][x];
      if (t === TILE.VOID) continue;
      const px = x * cs, py = y * cs;

      if (t === TILE.WALL) {
        drawWall(px, py, cs, x, y);
      } else {
        drawFloor(px, py, cs, x, y);
      }

      if (t === TILE.TARGET) {
        drawTarget(px, py, cs, now);
      }
    }
  }

  for (const b of boxes) {
    const done = targets.some(t => t.x === b.x && t.y === b.y);
    drawBox(b.x * cs, b.y * cs, cs, done, now);
  }

  drawPlayer(playerX * cs, playerY * cs, cs, now);
}

function drawWall(px, py, cs, tx, ty) {
  const mortar = 2;
  const brickH = (cs - mortar * 3) / 2;
  const brickW1 = (cs - mortar * 2) * 0.6;
  const brickW2 = (cs - mortar * 2) * 0.4;
  const offset = (tx + ty) % 2 === 0 ? 0 : cs * 0.25;

  ctx.fillStyle = '#6b5344';
  ctx.fillRect(px, py, cs, cs);

  for (let row = 0; row < 2; row++) {
    const by = py + mortar + row * (brickH + mortar);
    if (row === 0) {
      ctx.fillStyle = '#8b7355';
      ctx.fillRect(px + mortar, by, brickW1, brickH);
      ctx.fillStyle = '#7d6649';
      ctx.fillRect(px + mortar + brickW1 + mortar, by, brickW2, brickH);
    } else {
      ctx.fillStyle = '#7d6649';
      ctx.fillRect(px + mortar + offset * 0.2, by, brickW2, brickH);
      ctx.fillStyle = '#8b7355';
      ctx.fillRect(px + mortar + brickW2 + mortar + offset * 0.2, by, brickW1, brickH);
    }
  }

  ctx.strokeStyle = 'rgba(0,0,0,0.15)';
  ctx.lineWidth = 1;
  ctx.strokeRect(px + 0.5, py + 0.5, cs - 1, cs - 1);
}

function drawFloor(px, py, cs, tx, ty) {
  const base = (tx + ty) % 2 === 0 ? '#e8dcc8' : '#ddd0b8';
  ctx.fillStyle = base;
  ctx.fillRect(px, py, cs, cs);

  ctx.strokeStyle = 'rgba(0,0,0,0.06)';
  ctx.lineWidth = 0.5;
  const plankW = cs / 3;
  for (let i = 1; i < 3; i++) {
    ctx.beginPath();
    ctx.moveTo(px + i * plankW, py);
    ctx.lineTo(px + i * plankW, py + cs);
    ctx.stroke();
  }
}

function drawTarget(px, py, cs, t) {
  const cx = px + cs / 2, cy = py + cs / 2;
  const pulse = Math.sin(t / 500) * 0.08 + 0.22;

  ctx.fillStyle = 'rgba(231,76,60,0.12)';
  ctx.beginPath();
  ctx.arc(cx, cy, cs * 0.35, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = '#e74c3c';
  ctx.beginPath();
  ctx.arc(cx, cy, cs * pulse, 0, Math.PI * 2);
  ctx.fill();

  ctx.strokeStyle = '#c0392b';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(cx - cs * 0.18, cy - cs * 0.18);
  ctx.lineTo(cx + cs * 0.18, cy + cs * 0.18);
  ctx.moveTo(cx + cs * 0.18, cy - cs * 0.18);
  ctx.lineTo(cx - cs * 0.18, cy + cs * 0.18);
  ctx.stroke();

  ctx.strokeStyle = 'rgba(231,76,60,0.35)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.arc(cx, cy, cs * 0.32, 0, Math.PI * 2);
  ctx.stroke();
}

function drawBox(px, py, cs, done, t) {
  const m = cs * 0.08;
  const bx = px + m, by = py + m, bw = cs - m * 2, bh = cs - m * 2;

  if (done) {
    ctx.shadowColor = 'rgba(39,174,96,0.5)';
    ctx.shadowBlur = cs * 0.15;
  }

  ctx.fillStyle = done ? '#6d4c2a' : '#a0522d';
  ctx.beginPath();
  ctx.roundRect(bx, by, bw, bh, cs * 0.06);
  ctx.fill();
  ctx.shadowBlur = 0;

  const grad = ctx.createLinearGradient(bx, by, bx, by + bh);
  if (done) {
    grad.addColorStop(0, '#5a8a3a');
    grad.addColorStop(0.4, '#4a7a2a');
    grad.addColorStop(1, '#3a6a1a');
  } else {
    grad.addColorStop(0, '#c97b3a');
    grad.addColorStop(0.4, '#b06828');
    grad.addColorStop(1, '#8b5218');
  }
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.roundRect(bx + 1, by + 1, bw - 2, bh - 2, cs * 0.05);
  ctx.fill();

  ctx.strokeStyle = done ? '#2a5a0a' : '#6b3a10';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.roundRect(bx, by, bw, bh, cs * 0.06);
  ctx.stroke();

  const cx = px + cs / 2, cy = py + cs / 2;

  ctx.strokeStyle = done ? 'rgba(100,200,100,0.5)' : 'rgba(80,40,0,0.3)';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(bx + cs * 0.12, cy);
  ctx.lineTo(bx + bw - cs * 0.12, cy);
  ctx.moveTo(cx, by + cs * 0.12);
  ctx.lineTo(cx, by + bh - cs * 0.12);
  ctx.stroke();

  const boltR = cs * 0.045;
  const boltOff = cs * 0.18;
  ctx.fillStyle = done ? 'rgba(150,220,150,0.7)' : 'rgba(60,30,0,0.4)';
  for (const [ox, oy] of [[-boltOff, -boltOff], [boltOff, -boltOff], [-boltOff, boltOff], [boltOff, boltOff]]) {
    ctx.beginPath();
    ctx.arc(cx + ox, cy + oy, boltR, 0, Math.PI * 2);
    ctx.fill();
  }

  if (done) {
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    ctx.beginPath();
    ctx.roundRect(bx + cs * 0.12, by + cs * 0.08, bw * 0.5, bh * 0.3, cs * 0.04);
    ctx.fill();
  }
}

function drawPlayer(px, py, cs, t) {
  const cx = px + cs / 2, cy = py + cs / 2;
  const breathe = Math.sin(t / 300) * cs * 0.012;

  ctx.fillStyle = '#e8e0d0';
  ctx.beginPath();
  ctx.arc(cx, cy + cs * 0.05, cs * 0.28, 0, Math.PI * 2);
  ctx.fill();

  const headY = cy - cs * 0.1 + breathe;
  ctx.fillStyle = '#fce4c0';
  ctx.beginPath();
  ctx.arc(cx, headY, cs * 0.22, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#d4a574';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.arc(cx, headY, cs * 0.22, 0, Math.PI * 2);
  ctx.stroke();

  ctx.fillStyle = '#5a3825';
  ctx.beginPath();
  ctx.arc(cx, headY - cs * 0.22, cs * 0.24, Math.PI, 0);
  ctx.fill();

  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(cx - cs * 0.08, headY - cs * 0.02, cs * 0.07, 0, Math.PI * 2);
  ctx.arc(cx + cs * 0.08, headY - cs * 0.02, cs * 0.07, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#2c3e50';
  ctx.beginPath();
  ctx.arc(cx - cs * 0.07, headY - cs * 0.01, cs * 0.035, 0, Math.PI * 2);
  ctx.arc(cx + cs * 0.07, headY - cs * 0.01, cs * 0.035, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(cx - cs * 0.06, headY - cs * 0.025, cs * 0.012, 0, Math.PI * 2);
  ctx.arc(cx + cs * 0.08, headY - cs * 0.025, cs * 0.012, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = '#e8967a';
  ctx.beginPath();
  ctx.arc(cx - cs * 0.06, headY + cs * 0.12, cs * 0.04, 0, Math.PI);
  ctx.arc(cx + cs * 0.06, headY + cs * 0.12, cs * 0.04, 0, Math.PI);
  ctx.fill();

  ctx.fillStyle = '#e74c3c';
  ctx.beginPath();
  ctx.arc(cx, headY + cs * 0.14, cs * 0.055, 0.1, Math.PI - 0.1);
  ctx.fill();

  ctx.fillStyle = '#d4a574';
  ctx.beginPath();
  ctx.ellipse(cx - cs * 0.26, cy + cs * 0.08, cs * 0.06, cs * 0.1, -0.2, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(cx + cs * 0.26, cy + cs * 0.08, cs * 0.06, cs * 0.1, 0.2, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = '#2980b9';
  ctx.beginPath();
  ctx.roundRect(cx - cs * 0.2, cy + cs * 0.18, cs * 0.14, cs * 0.18, cs * 0.03);
  ctx.fill();
  ctx.beginPath();
  ctx.roundRect(cx + cs * 0.06, cy + cs * 0.18, cs * 0.14, cs * 0.18, cs * 0.03);
  ctx.fill();
}

function saveState() {
  history.push({ playerX, playerY, boxes: boxes.map(b => ({ ...b })), moves, pushes });
  redoStack = [];
}

function movePlayer(dx, dy) {
  const nx = playerX + dx, ny = playerY + dy;
  if (isWall(nx, ny)) return;
  const boxIdx = boxes.findIndex(b => b.x === nx && b.y === ny);
  if (boxIdx >= 0) {
    const bx = nx + dx, by = ny + dy;
    if (isWall(bx, by) || isBox(bx, by)) return;
    saveState();
    boxes[boxIdx].x = bx; boxes[boxIdx].y = by;
    pushes++;
  } else {
    saveState();
  }
  playerX = nx; playerY = ny; moves++;
  updateUI(); draw();
  if (isSolved()) {
    solved.add(currentLevel);
    saveProgress();
    clearInterval(timerInterval);
    setTimeout(showWin, 200);
  }
}

function undo() {
  if (!history.length) return;
  redoStack.push({ playerX, playerY, boxes: boxes.map(b => ({ ...b })), moves, pushes });
  const s = history.pop();
  playerX = s.playerX; playerY = s.playerY; boxes = s.boxes; moves = s.moves; pushes = s.pushes;
  updateUI(); draw();
}

function redo() {
  if (!redoStack.length) return;
  history.push({ playerX, playerY, boxes: boxes.map(b => ({ ...b })), moves, pushes });
  const s = redoStack.pop();
  playerX = s.playerX; playerY = s.playerY; boxes = s.boxes; moves = s.moves; pushes = s.pushes;
  updateUI(); draw();
}

function startTimer() {
  startTime = Date.now();
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    const sec = Math.floor((Date.now() - startTime) / 1000);
    document.getElementById('lblTime').textContent = Math.floor(sec / 60) + ':' + String(sec % 60).padStart(2, '0');
  }, 1000);
}

function updateUI() {
  document.getElementById('lblLevel').textContent = currentLevel + 1;
  document.getElementById('lblMoves').textContent = moves;
  document.getElementById('lblPushes').textContent = pushes;
  renderLevelGrid();
}

function loadLevel(idx) {
  currentLevel = idx;
  parseLevel(LEVELS[idx]);
  moves = 0; pushes = 0; history = []; redoStack = [];
  hintStep = 0; hintMode = false; stopAutoPlay();
  document.getElementById('hintPanel').style.display = 'none';
  document.querySelector('.board-wrap').classList.remove('hint-active');
  startTimer(); updateUI(); draw();
}

function restartLevel() { loadLevel(currentLevel); }

function showWin() {
  const sec = Math.floor((Date.now() - startTime) / 1000);
  document.getElementById('winStats').textContent =
    '你用了 ' + moves + ' 步，推了 ' + pushes + ' 次箱子，耗时 ' + Math.floor(sec / 60) + ':' + String(sec % 60).padStart(2, '0');
  document.getElementById('winOverlay').classList.remove('hidden');
}

function saveProgress() { try { localStorage.setItem('sokoban_solved', JSON.stringify([...solved])); } catch {} }
function loadProgress() { try { solved = new Set(JSON.parse(localStorage.getItem('sokoban_solved') || '[]')); } catch {} }

function renderLevelGrid() {
  const g = document.getElementById('levelGrid');
  g.innerHTML = '';
  for (let i = 0; i < LEVELS.length; i++) {
    const btn = document.createElement('button');
    btn.textContent = i + 1;
    if (i === currentLevel) btn.classList.add('current');
    if (solved.has(i)) btn.classList.add('solved');
    btn.addEventListener('click', () => loadLevel(i));
    g.appendChild(btn);
  }
}

function renderHint() {
  const sol = SOLUTIONS[currentLevel];
  const box = document.getElementById('hintBox');
  const info = document.getElementById('hintInfo');
  if (!sol) {
    box.innerHTML = '<span style="color:#999">该关卡暂无攻略数据</span>';
    info.textContent = '';
    return;
  }
  const total = sol.length;
  const done = hintStep >= total;
  info.textContent = done
    ? '(最优解 ' + total + ' 步 — 全部完成 ✅)'
    : '(最优解 ' + total + ' 步，当前第 ' + (hintStep + 1) + ' / ' + total + ' 步)';
  let html = '';
  for (let i = 0; i < total; i++) {
    let cls = 'step';
    if (i < hintStep) cls += ' done';
    else if (i === hintStep) cls += ' active';
    html += '<span class="' + cls + '">' + DIR_LABELS[sol[i]] + '</span>';
  }
  box.innerHTML = html;
}

function resetToHintStart() {
  parseLevel(LEVELS[currentLevel]);
  moves = 0; pushes = 0; history = []; redoStack = [];
  hintStep = 0;
  document.getElementById('hintStatus').textContent = '💡 攻略模式已开启 — 请勿手动操作，使用按钮或左右方向键切换步骤';
  updateUI(); draw();
  renderHint();
}

function stepHintForward() {
  const sol = SOLUTIONS[currentLevel];
  if (!sol || hintStep >= sol.length) return;
  const ch = sol[hintStep];
  const dir = DIR_MAP[ch];
  movePlayerQuiet(dir[0], dir[1]);
  hintStep++;
  updateUI(); draw();
  renderHint();
  if (isSolved()) {
    solved.add(currentLevel);
    saveProgress();
    stopAutoPlay();
    document.getElementById('hintStatus').textContent = '🎉 攻略演示完成！箱子全部归位！';
  }
}

function stepHintBackward() {
  if (hintStep <= 0) return;
  stopAutoPlay();
  const target = hintStep - 1;
  resetToHintStart();
  const sol = SOLUTIONS[currentLevel];
  for (let i = 0; i < target; i++) {
    const ch = sol[i];
    const dir = DIR_MAP[ch];
    movePlayerQuiet(dir[0], dir[1]);
  }
  hintStep = target;
  updateUI(); draw();
  renderHint();
}

function movePlayerQuiet(dx, dy) {
  const nx = playerX + dx, ny = playerY + dy;
  if (isWall(nx, ny)) return;
  const boxIdx = boxes.findIndex(b => b.x === nx && b.y === ny);
  if (boxIdx >= 0) {
    const bx = nx + dx, by = ny + dy;
    if (isWall(bx, by) || isBox(bx, by)) return;
    boxes[boxIdx].x = bx; boxes[boxIdx].y = by;
    pushes++;
  }
  playerX = nx; playerY = ny; moves++;
}

function startAutoPlay() {
  stopAutoPlay();
  const btn = document.getElementById('btnAutoPlay');
  btn.textContent = '⏸ 暂停';
  hintAutoTimer = setInterval(() => {
    const sol = SOLUTIONS[currentLevel];
    if (!sol || hintStep >= sol.length) { stopAutoPlay(); return; }
    stepHintForward();
  }, 400);
}

function stopAutoPlay() {
  if (hintAutoTimer) { clearInterval(hintAutoTimer); hintAutoTimer = null; }
  document.getElementById('btnAutoPlay').textContent = '自动播放 ▶▶';
}

document.getElementById('btnHint').addEventListener('click', () => {
  const panel = document.getElementById('hintPanel');
  const wrap = document.querySelector('.board-wrap');
  if (panel.style.display === 'none') {
    panel.style.display = '';
    hintMode = true;
    wrap.classList.add('hint-active');
    resetToHintStart();
  } else {
    panel.style.display = 'none';
    hintMode = false;
    wrap.classList.remove('hint-active');
    stopAutoPlay();
  }
});

document.getElementById('btnStepPrev').addEventListener('click', () => {
  stepHintBackward();
});

document.getElementById('btnStepNext').addEventListener('click', () => {
  stepHintForward();
});

document.getElementById('btnAutoPlay').addEventListener('click', () => {
  if (hintAutoTimer) stopAutoPlay();
  else startAutoPlay();
});

document.getElementById('btnResetHint').addEventListener('click', () => {
  stopAutoPlay();
  resetToHintStart();
});

document.getElementById('btnHideHint').addEventListener('click', () => {
  document.getElementById('hintPanel').style.display = 'none';
  hintMode = false;
  stopAutoPlay();
  document.querySelector('.board-wrap').classList.remove('hint-active');
});

document.addEventListener('keydown', e => {
  if (e.target.tagName === 'TEXTAREA' || e.target.tagName === 'INPUT') return;
  if (hintMode) {
    if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') { e.preventDefault(); stepHintForward(); }
    else if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') { e.preventDefault(); stepHintBackward(); }
    return;
  }
  const map = { ArrowUp: [0,-1], ArrowDown: [0,1], ArrowLeft: [-1,0], ArrowRight: [1,0], w: [0,-1], s: [0,1], a: [-1,0], d: [1,0], W: [0,-1], S: [0,1], A: [-1,0], D: [1,0] };
  if (map[e.key]) { e.preventDefault(); movePlayer(...map[e.key]); }
  if (e.key === 'z' || e.key === 'Z') { e.preventDefault(); undo(); }
  if (e.key === 'y' || e.key === 'Y') { e.preventDefault(); redo(); }
  if (e.key === 'r' || e.key === 'R') { e.preventDefault(); restartLevel(); }
});

document.querySelectorAll('.dpad button').forEach(btn => {
  const map = { up: [0,-1], down: [0,1], left: [-1,0], right: [1,0] };
  btn.addEventListener('click', () => { if (hintMode) return; const d = btn.dataset.dir; if (map[d]) movePlayer(...map[d]); });
});

let touchStart = null;
canvas.addEventListener('touchstart', e => { touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY }; }, { passive: true });
canvas.addEventListener('touchend', e => {
  if (!touchStart) return;
  const dx = e.changedTouches[0].clientX - touchStart.x;
  const dy = e.changedTouches[0].clientY - touchStart.y;
  if (Math.max(Math.abs(dx), Math.abs(dy)) < 20) return;
  if (Math.abs(dx) > Math.abs(dy)) movePlayer(dx > 0 ? 1 : -1, 0);
  else movePlayer(0, dy > 0 ? 1 : -1);
  touchStart = null;
});

document.getElementById('btnUndo').addEventListener('click', undo);
document.getElementById('btnRedo').addEventListener('click', redo);
document.getElementById('btnRestart').addEventListener('click', restartLevel);

document.getElementById('btnNextLevel').addEventListener('click', () => {
  document.getElementById('winOverlay').classList.add('hidden');
  if (currentLevel + 1 < LEVELS.length) loadLevel(currentLevel + 1);
  else { alert('恭喜你通关了所有 20 关！'); loadLevel(0); }
});
document.getElementById('btnReplay').addEventListener('click', () => {
  document.getElementById('winOverlay').classList.add('hidden');
  restartLevel();
});

loadProgress();

function countBoxes(levelStr) {
  let n = 0;
  for (const ch of levelStr) { if (ch === '$' || ch === '*') n++; }
  return n;
}

function buildCertificate() {
  const total = LEVELS.length;
  document.getElementById('certTotal').textContent = total;
  let totalSteps = 0, totalBoxes = 0;
  for (let i = 0; i < total; i++) {
    const sol = SOLUTIONS[i] || '';
    const nb = countBoxes(LEVELS[i]);
    totalSteps += sol.length;
    totalBoxes += nb;
  }
  document.getElementById('certSummary').innerHTML =
    '<div class="stat"><span class="num">' + total + '</span><span class="label">总关卡</span></div>' +
    '<div class="stat"><span class="num">' + total + '</span><span class="label">已验证可解</span></div>' +
    '<div class="stat"><span class="num">' + totalBoxes + '</span><span class="label">总箱子数</span></div>' +
    '<div class="stat"><span class="num">' + totalSteps + '</span><span class="label">最优总步数</span></div>';
  const body = document.getElementById('certBody');
  let html = '';
  for (let i = 0; i < total; i++) {
    const sol = SOLUTIONS[i] || '';
    const nb = countBoxes(LEVELS[i]);
    html += '<tr><td>第 ' + (i + 1) + ' 关</td><td class="boxes">' + nb + '</td><td class="steps">' + sol.length + '</td><td class="ok">✅ 已验证可解</td></tr>';
  }
  body.innerHTML = html;
}

buildCertificate();
loadLevel(0);
requestAnimationFrame(function loop() { draw(); requestAnimationFrame(loop); });
</script>
</body>
