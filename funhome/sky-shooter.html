<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>星际小飞机｜趣味屋</title>
  <link rel="stylesheet" href="handmade-game.css">
  <style>
    :root { --accent: #7f5cff; --accent-2: #35e0c4; }
    .hud-note { margin-top: 10px; }
  </style>
</head>
<body>
  <main class="page">
    <aside class="panel">
      <div class="badge">🚀 手写新作 · 飞行射击</div>
      <h1>星际小飞机</h1>
      <p class="lead">这次不再是凑数小游戏。它是一款真正能连续玩几局的轻量飞机大战：有敌机节奏、连击加分、逐步提速和存档最高分。</p>
      <div class="actions">
        <button class="btn" id="startBtn" type="button">开始战斗</button>
        <button class="ghost-btn" id="pauseBtn" type="button">暂停</button>
        <a class="ghost-btn" href="funhome.html#library">← 返回趣味屋</a>
      </div>
      <div class="stats-grid">
        <div class="stat"><span>得分</span><strong id="scoreEl">0</strong></div>
        <div class="stat"><span>生命</span><strong id="lifeEl">3</strong></div>
        <div class="stat"><span>连击</span><strong id="comboEl">0</strong></div>
        <div class="stat"><span>最高分</span><strong id="bestEl">0</strong></div>
      </div>
      <ul class="tips">
        <li>方向键 / A D 移动，按住空格可连续射击。</li>
        <li>连续击落敌机会叠加连击倍率，漏掉敌机会清空连击。</li>
        <li>每 300 分节奏会提快一点，越后面越刺激。</li>
      </ul>
      <p class="meta-line hud-note" id="messageEl">准备升空。点“开始战斗”后再移动。</p>
    </aside>

    <section class="stage">
      <div class="canvas-shell">
        <div class="legend">
          <span class="legend-item">🕹️ 操作：← → / A D / 空格</span>
          <span class="legend-item">🎯 目标：尽可能长时间生存并刷高分</span>
        </div>
        <div class="canvas-wrap" style="margin-top:12px;">
          <canvas id="game" width="480" height="680"></canvas>
        </div>
      </div>
      <div class="message" id="statusEl">战斗还没开始。</div>
    </section>
  </main>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('scoreEl');
    const lifeEl = document.getElementById('lifeEl');
    const comboEl = document.getElementById('comboEl');
    const bestEl = document.getElementById('bestEl');
    const statusEl = document.getElementById('statusEl');
    const messageEl = document.getElementById('messageEl');
    const startBtn = document.getElementById('startBtn');
    const pauseBtn = document.getElementById('pauseBtn');

    const storageKey = 'funhome-best-sky-shooter';
    const state = {
      running: false,
      paused: false,
      over: false,
      score: 0,
      lives: 3,
      combo: 0,
      best: Number(localStorage.getItem(storageKey) || 0),
      last: 0,
      spawnTimer: 0,
      keys: {},
      flash: 0
    };
    bestEl.textContent = state.best;

    const player = { x: canvas.width / 2, y: canvas.height - 70, w: 34, h: 38, speed: 290, cooldown: 0, hitTimer: 0 };
    const stars = Array.from({ length: 70 }, () => ({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, s: 1 + Math.random() * 2, v: 20 + Math.random() * 70 }));
    let bullets = [];
    let enemies = [];
    let particles = [];

    function resetGame() {
      state.score = 0;
      state.lives = 3;
      state.combo = 0;
      state.over = false;
      state.paused = false;
      state.spawnTimer = 0;
      state.flash = 0;
      bullets = [];
      enemies = [];
      particles = [];
      player.x = canvas.width / 2;
      player.cooldown = 0;
      player.hitTimer = 0;
      updateHud();
      messageEl.textContent = '升空成功，开始清场。';
      statusEl.textContent = '敌机接近中……';
    }

    function updateHud() {
      scoreEl.textContent = state.score;
      lifeEl.textContent = state.lives;
      comboEl.textContent = state.combo;
      bestEl.textContent = state.best;
    }

    function spawnEnemy() {
      const wave = 1 + Math.floor(state.score / 300);
      const typeRoll = Math.random();
      const enemy = {
        x: 40 + Math.random() * (canvas.width - 80),
        y: -30,
        w: 28 + Math.random() * 12,
        h: 28 + Math.random() * 12,
        speed: 100 + Math.random() * 60 + wave * 16,
        hp: typeRoll > 0.82 ? 2 + Math.floor(wave / 3) : 1,
        zigzag: typeRoll > 0.55 && typeRoll < 0.78,
        phase: Math.random() * Math.PI * 2,
      };
      enemies.push(enemy);
    }

    function addExplosion(x, y, color = '#ffd07d', count = 12) {
      for (let i = 0; i < count; i += 1) {
        particles.push({
          x, y,
          vx: (Math.random() - 0.5) * 180,
          vy: (Math.random() - 0.5) * 180,
          life: 0.5 + Math.random() * 0.4,
          size: 2 + Math.random() * 3,
          color,
        });
      }
    }

    function loseLife(reason) {
      if (player.hitTimer > 0 || state.over) return;
      state.lives -= 1;
      state.combo = 0;
      player.hitTimer = 1.2;
      state.flash = 0.25;
      addExplosion(player.x, player.y, '#ff8585', 18);
      updateHud();
      if (state.lives <= 0) {
        endGame(`坠机！${reason}`);
      } else {
        messageEl.textContent = `${reason}，还剩 ${state.lives} 条命。`;
      }
    }

    function endGame(text) {
      state.running = false;
      state.over = true;
      state.paused = false;
      if (state.score > state.best) {
        state.best = state.score;
        localStorage.setItem(storageKey, String(state.best));
      }
      updateHud();
      statusEl.textContent = text + ' 点“开始战斗”再来一局。';
      messageEl.textContent = '这局结束了，但手感已经有了。';
    }

    function shoot() {
      bullets.push({ x: player.x, y: player.y - 24, vy: -420, r: 4 });
      if (state.combo >= 6) bullets.push({ x: player.x - 11, y: player.y - 14, vy: -420, r: 3 });
      if (state.combo >= 12) bullets.push({ x: player.x + 11, y: player.y - 14, vy: -420, r: 3 });
    }

    function update(dt) {
      if (!state.running || state.paused) return;

      const moveX = (state.keys.ArrowLeft || state.keys.a || state.keys.A ? -1 : 0) + (state.keys.ArrowRight || state.keys.d || state.keys.D ? 1 : 0);
      player.x += moveX * player.speed * dt;
      player.x = Math.max(24, Math.min(canvas.width - 24, player.x));
      player.cooldown -= dt;
      player.hitTimer = Math.max(0, player.hitTimer - dt);
      state.flash = Math.max(0, state.flash - dt);

      if ((state.keys[' '] || state.keys.Spacebar) && player.cooldown <= 0) {
        shoot();
        player.cooldown = Math.max(0.08, 0.18 - Math.min(0.07, state.combo * 0.004));
      }

      state.spawnTimer -= dt;
      if (state.spawnTimer <= 0) {
        spawnEnemy();
        state.spawnTimer = Math.max(0.22, 0.9 - Math.min(0.55, state.score / 850));
      }

      bullets.forEach(b => b.y += b.vy * dt);
      bullets = bullets.filter(b => b.y > -20);

      enemies.forEach(enemy => {
        enemy.y += enemy.speed * dt;
        if (enemy.zigzag) enemy.x += Math.sin(enemy.phase + enemy.y * 0.02) * 40 * dt;
      });

      for (const bullet of bullets) {
        for (const enemy of enemies) {
          if (Math.abs(bullet.x - enemy.x) < enemy.w * 0.5 && Math.abs(bullet.y - enemy.y) < enemy.h * 0.5) {
            bullet.y = -999;
            enemy.hp -= 1;
            addExplosion(bullet.x, bullet.y, '#88f7ff', 4);
            if (enemy.hp <= 0) {
              enemy.dead = true;
              state.combo += 1;
              const gain = 10 + state.combo * 2;
              state.score += gain;
              addExplosion(enemy.x, enemy.y, '#ffd07d', 16);
            }
          }
        }
      }

      enemies = enemies.filter(enemy => {
        if (enemy.dead) return false;
        if (enemy.y > canvas.height + 40) {
          state.combo = 0;
          messageEl.textContent = '有敌机漏网，连击清空。';
          return false;
        }
        if (!state.over && Math.abs(enemy.x - player.x) < (enemy.w + player.w) * 0.45 && Math.abs(enemy.y - player.y) < (enemy.h + player.h) * 0.45) {
          enemy.dead = true;
          loseLife('和敌机相撞了');
          return false;
        }
        return true;
      });

      particles.forEach(p => {
        p.x += p.vx * dt;
        p.y += p.vy * dt;
        p.life -= dt;
        p.vx *= 0.98;
        p.vy *= 0.98;
      });
      particles = particles.filter(p => p.life > 0);

      if (state.score > state.best) {
        state.best = state.score;
        localStorage.setItem(storageKey, String(state.best));
      }
      updateHud();
      statusEl.textContent = `第 ${1 + Math.floor(state.score / 300)} 波敌人 · 按住空格火力全开`;
    }

    function drawPlayer() {
      ctx.save();
      ctx.translate(player.x, player.y);
      if (player.hitTimer > 0) ctx.globalAlpha = 0.45 + Math.sin(player.hitTimer * 24) * 0.2;
      ctx.fillStyle = '#8cf5ff';
      ctx.beginPath();
      ctx.moveTo(0, -24);
      ctx.lineTo(18, 18);
      ctx.lineTo(0, 8);
      ctx.lineTo(-18, 18);
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(-4, -6, 8, 18);
      ctx.fillStyle = '#7f5cff';
      ctx.fillRect(-15, 6, 30, 8);
      ctx.restore();
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      const bg = ctx.createLinearGradient(0, 0, 0, canvas.height);
      bg.addColorStop(0, '#081120');
      bg.addColorStop(1, '#132744');
      ctx.fillStyle = bg;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      stars.forEach(star => {
        star.y += star.v * (state.running && !state.paused ? 0.016 : 0.005);
        if (star.y > canvas.height) { star.y = -4; star.x = Math.random() * canvas.width; }
        ctx.fillStyle = `rgba(255,255,255,${0.35 + star.s * 0.1})`;
        ctx.fillRect(star.x, star.y, star.s, star.s * 3);
      });

      bullets.forEach(b => {
        ctx.fillStyle = '#ffd978';
        ctx.beginPath();
        ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
        ctx.fill();
      });

      enemies.forEach(enemy => {
        ctx.save();
        ctx.translate(enemy.x, enemy.y);
        ctx.fillStyle = enemy.hp > 1 ? '#ff8c70' : '#ffb347';
        ctx.beginPath();
        ctx.moveTo(0, 20);
        ctx.lineTo(18, -16);
        ctx.lineTo(0, -8);
        ctx.lineTo(-18, -16);
        ctx.closePath();
        ctx.fill();
        if (enemy.hp > 1) {
          ctx.fillStyle = '#fff';
          ctx.fillRect(-8, -2, 16, 4);
        }
        ctx.restore();
      });

      particles.forEach(p => {
        ctx.globalAlpha = Math.max(0, p.life);
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;
      });

      drawPlayer();

      ctx.fillStyle = 'rgba(255,255,255,0.08)';
      ctx.fillRect(14, 14, 130, 54);
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 16px Segoe UI';
      ctx.fillText(`得分 ${state.score}`, 26, 36);
      ctx.fillText(`连击 x${Math.max(1, state.combo)}`, 26, 58);

      if (!state.running) {
        ctx.fillStyle = 'rgba(0,0,0,0.45)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#fff';
        ctx.textAlign = 'center';
        ctx.font = 'bold 30px Segoe UI';
        ctx.fillText(state.over ? '本局结束' : '准备起飞', canvas.width / 2, canvas.height / 2 - 10);
        ctx.font = '18px Segoe UI';
        ctx.fillText(state.over ? '点击左侧按钮重新挑战' : '开始后按方向键和空格', canvas.width / 2, canvas.height / 2 + 26);
        ctx.textAlign = 'left';
      }
      if (state.flash > 0) {
        ctx.fillStyle = `rgba(255,80,80,${state.flash})`;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
      }
    }

    function loop(ts) {
      const dt = Math.min(0.032, (ts - state.last) / 1000 || 0.016);
      state.last = ts;
      update(dt);
      draw();
      requestAnimationFrame(loop);
    }

    document.addEventListener('keydown', (event) => {
      state.keys[event.key] = true;
      if (event.key === ' ') event.preventDefault();
    });
    document.addEventListener('keyup', (event) => {
      state.keys[event.key] = false;
    });

    startBtn.addEventListener('click', () => {
      resetGame();
      state.running = true;
      statusEl.textContent = '战斗开始，别让敌机靠近底线。';
    });
    pauseBtn.addEventListener('click', () => {
      if (state.over || !state.running) return;
      state.paused = !state.paused;
      statusEl.textContent = state.paused ? '已暂停。' : '继续战斗中。';
    });

    resetGame();
    requestAnimationFrame(loop);
  </script>
</body>
</html>
