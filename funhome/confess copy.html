<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>表白小剧场｜趣味屋</title>
  <style>
    :root {
      --bg: #1a0f1f;
      --panel: rgba(40, 18, 46, 0.88);
      --line: rgba(255,255,255,0.1);
      --text: #fff5fb;
      --muted: #e7bfd0;
      --pink: #ff78b2;
      --purple: #ba8cff;
      --shadow: 0 24px 60px rgba(0,0,0,0.35);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 14% 16%, rgba(255,120,178,0.26), transparent 24%),
        radial-gradient(circle at 84% 18%, rgba(186,140,255,0.2), transparent 24%),
        linear-gradient(180deg, #130712 0%, #1a0f1f 100%);
      display: grid;
      place-items: center;
      padding: 24px;
      overflow: hidden;
    }

    a { color: inherit; text-decoration: none; }
    .btn, .ghost-btn, .button, .ghost-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      white-space: nowrap;
    }

    button { font: inherit; }

    .app {
      width: min(920px, 100%);
      background: var(--panel);
      border-radius: 32px;
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      padding: 28px;
      position: relative;
      overflow: hidden;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .badge {
      display: inline-flex;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,0.08);
      color: #ffe7f2;
      font-weight: 700;
    }

    .ghost-btn,
    .btn {
      min-height: 46px;
      padding: 0 18px;
      border-radius: 16px;
      border: 0;
      cursor: pointer;
      font-weight: 700;
      transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
    }

    .ghost-btn {
      background: rgba(255,255,255,0.08);
      color: var(--text);
      border: 1px solid rgba(255,255,255,0.08);
    }

    .btn {
      background: linear-gradient(135deg, var(--pink), #ff9ec9);
      color: #fff;
      box-shadow: 0 14px 28px rgba(255,120,178,0.24);
    }

    .hero {
      text-align: center;
      padding: 42px 0 16px;
    }

    h1 {
      margin: 12px 0 14px;
      font-size: clamp(2.3rem, 5vw, 4rem);
      line-height: 1.1;
    }

    .hero p {
      margin: 0 auto;
      max-width: 42rem;
      color: var(--muted);
      line-height: 1.85;
      font-size: 1.05rem;
    }

    .heart {
      width: 84px;
      height: 84px;
      margin: 0 auto 18px;
      position: relative;
      transform: rotate(-45deg);
      animation: pulse 1.6s infinite;
    }

    .heart::before,
    .heart::after {
      content: "";
      position: absolute;
      width: 84px;
      height: 84px;
      background: linear-gradient(135deg, var(--pink), #ff95d8);
      border-radius: 50%;
    }

    .heart,
    .heart::before,
    .heart::after {
      background: linear-gradient(135deg, var(--pink), #ff95d8);
      box-shadow: 0 0 36px rgba(255,120,178,0.35);
    }

    .heart::before { top: -42px; left: 0; }
    .heart::after { top: 0; left: 42px; }

    .playground {
      margin-top: 26px;
      min-height: 320px;
      border-radius: 28px;
      border: 1px dashed rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.04);
      position: relative;
      overflow: hidden;
      padding: 20px;
    }

    .question {
      text-align: center;
      margin-top: 24px;
      font-size: clamp(1.4rem, 3vw, 2.2rem);
      font-weight: 800;
    }

    .subtitle {
      text-align: center;
      margin-top: 10px;
      color: var(--muted);
    }

    .button-area {
      position: relative;
      height: 180px;
      margin-top: 24px;
    }

    .choice {
      position: absolute;
      min-width: 150px;
      min-height: 58px;
      border-radius: 18px;
      border: 0;
      font-weight: 800;
      font-size: 1.02rem;
      cursor: pointer;
    }

    .choice.yes {
      left: 50%;
      top: 38px;
      transform: translateX(calc(-50% - 110px));
      background: linear-gradient(135deg, var(--pink), #ff9ec9);
      color: #fff;
      box-shadow: 0 16px 30px rgba(255,120,178,0.24);
    }

    .choice.no {
      left: 50%;
      top: 38px;
      transform: translateX(30px);
      background: rgba(255,255,255,0.1);
      color: var(--text);
      border: 1px solid rgba(255,255,255,0.12);
      transition: left 0.25s ease, top 0.25s ease, transform 0.25s ease;
    }

    .message {
      margin-top: 18px;
      text-align: center;
      font-weight: 700;
      color: #ffe8f2;
      min-height: 1.6em;
    }

    .overlay {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
      background: rgba(19, 7, 18, 0.72);
      backdrop-filter: blur(10px);
    }

    .overlay.show { display: flex; }

    .overlay-box {
      max-width: 440px;
      display: grid;
      gap: 14px;
    }

    .overlay-box h2 {
      margin: 0;
      font-size: 2.2rem;
    }

    .overlay-box p {
      margin: 0;
      color: var(--muted);
      line-height: 1.8;
    }

    .float-heart {
      position: absolute;
      font-size: 1.6rem;
      animation: floatUp 1.8s linear forwards;
      pointer-events: none;
    }

    @keyframes pulse {
      0%, 100% { transform: rotate(-45deg) scale(1); }
      50% { transform: rotate(-45deg) scale(1.06); }
    }

    @keyframes floatUp {
      0% { transform: translateY(0) scale(0.8); opacity: 0; }
      20% { opacity: 1; }
      100% { transform: translateY(-220px) scale(1.3); opacity: 0; }
    }

    @media (max-width: 720px) {
      body { padding: 18px; }
      .app { padding: 20px; }
      .button-area { height: 220px; }
      .choice.yes {
        left: 50%;
        top: 28px;
        transform: translateX(-50%);
      }
      .choice.no {
        left: 50%;
        top: 110px;
        transform: translateX(-50%);
      }
    }
  </style>
</head>
<body>
  <main class="app" id="app">
    <div class="topbar">
      <span class="badge">💘 互动彩蛋</span>
      <a class="ghost-btn" href="funhome.html#library">← 返回趣味屋</a>
    </div>

    <section class="hero">
      <div class="heart"></div>
      <h1>表白小剧场</h1>
      <p>这不是严肃表白工具，只是趣味屋里的一个轻松小彩蛋。你可以把它当成一个会“躲躲闪闪”的按钮玩具。</p>
    </section>

    <section class="playground" id="playground">
      <div class="question">愿意和我一起去趣味屋继续玩下去吗？</div>
      <div class="subtitle">“不愿意”会先害羞地躲一下。</div>
      <div class="button-area" id="buttonArea">
        <button class="choice yes" id="yesBtn" type="button">愿意 💖</button>
        <button class="choice no" id="noBtn" type="button">再想想 🙈</button>
      </div>
      <div class="message" id="messageBox">试试看把鼠标移到“再想想”上。</div>
    </section>

    <div class="overlay" id="overlay">
      <div class="overlay-box">
        <h2>答应啦！</h2>
        <p>那就一起继续快乐摸鱼吧。愿你今天有好心情，也有好玩的小游戏。</p>
        <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;">
          <button class="btn" id="againBtn" type="button">再玩一次</button>
          <a class="ghost-btn" href="funhome.html#library" style="display:flex;align-items:center;">回趣味屋</a>
        </div>
      </div>
    </div>
  </main>

  <script>
    const app = document.getElementById('app');
    const playground = document.getElementById('playground');
    const buttonArea = document.getElementById('buttonArea');
    const noBtn = document.getElementById('noBtn');
    const yesBtn = document.getElementById('yesBtn');
    const messageBox = document.getElementById('messageBox');
    const overlay = document.getElementById('overlay');

    let dodgeCount = 0;

    function moveNoButton() {
      const areaRect = buttonArea.getBoundingClientRect();
      const btnRect = noBtn.getBoundingClientRect();
      const maxX = Math.max(0, areaRect.width - btnRect.width - 8);
      const maxY = Math.max(0, areaRect.height - btnRect.height - 8);
      const nextX = Math.random() * maxX;
      const nextY = Math.random() * maxY;
      noBtn.style.left = `${nextX}px`;
      noBtn.style.top = `${nextY}px`;
      noBtn.style.transform = 'none';
      dodgeCount += 1;

      if (dodgeCount < 2) {
        messageBox.textContent = '哎呀，它害羞了，先躲一下。';
      } else if (dodgeCount < 4) {
        messageBox.textContent = '它还在躲，你的态度很坚定。';
      } else {
        messageBox.textContent = '好吧好吧，看来你真的很认真。';
      }
    }

    function burstHearts() {
      for (let i = 0; i < 24; i += 1) {
        const heart = document.createElement('span');
        heart.className = 'float-heart';
        heart.textContent = ['💖', '💗', '✨', '💘'][Math.floor(Math.random() * 4)];
        heart.style.left = `${Math.random() * 100}%`;
        heart.style.bottom = `${Math.random() * 25}px`;
        heart.style.animationDelay = `${Math.random() * 0.4}s`;
        app.appendChild(heart);
        setTimeout(() => heart.remove(), 2000);
      }
    }

    function resetScene() {
      dodgeCount = 0;
      messageBox.textContent = '试试看把鼠标移到“再想想”上。';
      noBtn.removeAttribute('style');
      overlay.classList.remove('show');
    }

    noBtn.addEventListener('mouseenter', moveNoButton);
    noBtn.addEventListener('click', moveNoButton);
    yesBtn.addEventListener('click', () => {
      messageBox.textContent = '哇，收到一个肯定答复。';
      overlay.classList.add('show');
      burstHearts();
    });
    document.getElementById('againBtn').addEventListener('click', resetScene);

    resetScene();
  </script>
</body>
</html>
