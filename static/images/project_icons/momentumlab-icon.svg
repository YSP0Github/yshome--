<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">碰撞实验图标</title>
  <desc id="desc">两球碰撞与动量守恒的力学项目图标</desc>
  <defs>
    <linearGradient id="bg" x1="56" y1="56" x2="456" y2="456" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#041e2a"/>
      <stop offset="0.55" stop-color="#0e7490"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="14" flood-color="#020617" flood-opacity="0.4"/>
    </filter>
  </defs>
  <rect x="32" y="32" width="448" height="448" rx="120" fill="url(#bg)"/>
  <circle cx="120" cy="110" r="12" fill="#fff" fill-opacity="0.08"/>
  <circle cx="400" cy="400" r="10" fill="#fff" fill-opacity="0.06"/>
  <g filter="url(#shadow)">
    <!-- Ball A (cyan, left, moving right) -->
    <circle cx="180" cy="256" r="42" fill="#22d3ee" filter="url(#glow)"/>
    <text x="180" y="262" text-anchor="middle" fill="#fff" font-size="24" font-weight="bold" font-family="Inter,sans-serif">A</text>
    <!-- Velocity arrow A -->
    <line x1="222" y1="256" x2="260" y2="256" stroke="#22d3ee" stroke-width="5" stroke-linecap="round"/>
    <polygon points="260,250 274,256 260,262" fill="#22d3ee"/>

    <!-- Ball B (pink, right, moving left) -->
    <circle cx="340" cy="256" r="48" fill="#f472b6" filter="url(#glow)"/>
    <text x="340" y="262" text-anchor="middle" fill="#fff" font-size="24" font-weight="bold" font-family="Inter,sans-serif">B</text>
    <!-- Velocity arrow B -->
    <line x1="292" y1="256" x2="260" y2="256" stroke="#f472b6" stroke-width="5" stroke-linecap="round"/>
    <polygon points="260,250 246,256 260,262" fill="#f472b6"/>

    <!-- Impact flash -->
    <circle cx="260" cy="256" r="12" fill="#fbbf24" opacity="0.6" filter="url(#glow)"/>

    <!-- Momentum arrows (below) -->
    <line x1="180" y1="330" x2="240" y2="330" stroke="#22d3ee" stroke-width="3" stroke-opacity="0.6" stroke-linecap="round"/>
    <polygon points="240,326 250,330 240,334" fill="#22d3ee" fill-opacity="0.6"/>
    <text x="180" y="352" text-anchor="middle" fill="#22d3ee" fill-opacity="0.6" font-size="12" font-family="Inter,sans-serif">p₁</text>

    <line x1="340" y1="330" x2="280" y2="330" stroke="#f472b6" stroke-width="3" stroke-opacity="0.6" stroke-linecap="round"/>
    <polygon points="280,326 270,330 280,334" fill="#f472b6" fill-opacity="0.6"/>
    <text x="340" y="352" text-anchor="middle" fill="#f472b6" fill-opacity="0.6" font-size="12" font-family="Inter,sans-serif">p₂</text>

    <!-- Equals sign and total -->
    <text x="260" y="390" text-anchor="middle" fill="#fbbf24" fill-opacity="0.7" font-size="16" font-weight="bold" font-family="Inter,sans-serif">p₁ + p₂ = const</text>
  </g>
</svg>
