<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">科学小实验图标</title>
  <desc id="desc">结合摆、共振波形与实验风格的科学小实验项目图标</desc>
  <defs>
    <linearGradient id="bg" x1="56" y1="56" x2="456" y2="456" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#10203A"/>
      <stop offset="0.55" stop-color="#165DFF"/>
      <stop offset="1" stop-color="#36CFC9"/>
    </linearGradient>
    <linearGradient id="panel" x1="136" y1="104" x2="392" y2="408" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0E1A2F" stop-opacity="0.96"/>
      <stop offset="1" stop-color="#081321" stop-opacity="0.96"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#020617" flood-opacity="0.38"/>
    </filter>
  </defs>

  <rect x="32" y="32" width="448" height="448" rx="120" fill="url(#bg)"/>
  <circle cx="118" cy="118" r="14" fill="#ffffff" fill-opacity="0.16"/>
  <circle cx="404" cy="108" r="12" fill="#ffffff" fill-opacity="0.12"/>
  <circle cx="402" cy="394" r="16" fill="#ffffff" fill-opacity="0.12"/>

  <g filter="url(#shadow)">
    <rect x="112" y="104" width="288" height="304" rx="76" fill="url(#panel)" stroke="#ffffff" stroke-opacity="0.14" stroke-width="4"/>
    <path d="M170 146H342" stroke="#EAF2FF" stroke-width="18" stroke-linecap="round"/>
    <circle cx="256" cy="146" r="10" fill="#EAF2FF"/>
    <path d="M256 146L214 232" stroke="#EAF2FF" stroke-width="16" stroke-linecap="round"/>
    <circle cx="214" cy="232" r="28" fill="#36CFC9" stroke="#EAF2FF" stroke-width="10"/>
    <path d="M146 316C170 284 194 348 218 316C242 284 266 348 290 316C314 284 338 348 366 316" fill="none" stroke="#7DD3FC" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M152 362H360" stroke="#ffffff" stroke-opacity="0.18" stroke-width="10" stroke-linecap="round"/>
    <circle cx="326" cy="216" r="18" fill="none" stroke="#FBBF24" stroke-width="10"/>
    <circle cx="326" cy="216" r="36" fill="none" stroke="#FBBF24" stroke-opacity="0.55" stroke-width="8"/>
    <circle cx="326" cy="216" r="54" fill="none" stroke="#FBBF24" stroke-opacity="0.28" stroke-width="6"/>
