<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">电磁场实验图标</title>
  <desc id="desc">闪电与电场线的电磁场可视化项目图标</desc>
  <defs>
    <linearGradient id="bg" x1="56" y1="56" x2="456" y2="456" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0c0a1a"/>
      <stop offset="0.55" stop-color="#6d28d9"/>
      <stop offset="1" stop-color="#a855f7"/>
    </linearGradient>
    <radialGradient id="posCharge" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#fca5a5"/>
      <stop offset="1" stop-color="#ef4444"/>
    </radialGradient>
    <radialGradient id="negCharge" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#93c5fd"/>
      <stop offset="1" stop-color="#3b82f6"/>
    </radialGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="14" flood-color="#020617" flood-opacity="0.4"/>
    </filter>
  </defs>

  <rect x="32" y="32" width="448" height="448" rx="120" fill="url(#bg)"/>
  <circle cx="130" cy="110" r="12" fill="#fff" fill-opacity="0.1"/>
  <circle cx="400" cy="400" r="14" fill="#fff" fill-opacity="0.08"/>

  <g filter="url(#shadow)">
    <!-- Electric field lines from + to - -->
    <path d="M160,256 C200,200 310,200 350,256" fill="none" stroke="#c4b5fd" stroke-opacity="0.4" stroke-width="3"/>
    <path d="M160,256 C200,256 310,256 350,256" fill="none" stroke="#c4b5fd" stroke-opacity="0.5" stroke-width="3"/>
    <path d="M160,256 C200,310 310,310 350,256" fill="none" stroke="#c4b5fd" stroke-opacity="0.4" stroke-width="3"/>
    <path d="M160,256 C200,170 310,170 350,256" fill="none" stroke="#c4b5fd" stroke-opacity="0.3" stroke-width="2.5"/>
    <path d="M160,256 C200,340 310,340 350,256" fill="none" stroke="#c4b5fd" stroke-opacity="0.3" stroke-width="2.5"/>

    <!-- Arrowheads on field lines -->
    <polygon points="254,225 266,230 258,238" fill="#c4b5fd" fill-opacity="0.7"/>
    <polygon points="254,254 266,258 258,266" fill="#c4b5fd" fill-opacity="0.7"/>
    <polygon points="254,285 266,290 258,298" fill="#c4b5fd" fill-opacity="0.6"/>

    <!-- Positive charge -->
    <g filter="url(#glow)">
      <circle cx="160" cy="256" r="30" fill="url(#posCharge)"/>
    </g>
    <line x1="148" y1="256" x2="172" y2="256" stroke="#fff" stroke-width="5" stroke-linecap="round"/>
    <line x1="160" y1="244" x2="160" y2="268" stroke="#fff" stroke-width="5" stroke-linecap="round"/>

    <!-- Negative charge -->
    <g filter="url(#glow)">
      <circle cx="350" cy="256" r="30" fill="url(#negCharge)"/>
    </g>
    <line x1="338" y1="256" x2="362" y2="256" stroke="#fff" stroke-width="5" stroke-linecap="round"/>

    <!-- Small equipotential hint -->
    <ellipse cx="256" cy="256" rx="100" ry="40" fill="none" stroke="#e9d5ff" stroke-opacity="0.15" stroke-width="2" stroke-dasharray="8,6"/>
    <ellipse cx="256" cy="256" rx="60" ry="24" fill="none" stroke="#e9d5ff" stroke-opacity="0.2" stroke-width="2" stroke-dasharray="6,5"/>

    <!-- Spark / lightning bolt -->
    <path d="M256,120 L242,180 L262,178 L248,240" fill="none" stroke="#fde68a" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
  </g>
</svg>
