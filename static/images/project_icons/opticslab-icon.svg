<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">光学实验图标</title>
  <desc id="desc">透镜与光线的光学追迹项目图标</desc>
  <defs>
    <linearGradient id="bg" x1="56" y1="56" x2="456" y2="456" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0a1628"/>
      <stop offset="0.55" stop-color="#0369a1"/>
      <stop offset="1" stop-color="#0ea5e9"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="14" flood-color="#020617" flood-opacity="0.4"/>
    </filter>
  </defs>

  <rect x="32" y="32" width="448" height="448" rx="120" fill="url(#bg)"/>
  <circle cx="120" cy="130" r="12" fill="#fff" fill-opacity="0.1"/>
  <circle cx="390" cy="380" r="10" fill="#fff" fill-opacity="0.08"/>

  <g filter="url(#shadow)">
    <!-- Incoming parallel rays -->
    <line x1="80" y1="200" x2="230" y2="200" stroke="#fde68a" stroke-width="4" stroke-opacity="0.8"/>
    <line x1="80" y1="240" x2="230" y2="240" stroke="#fde68a" stroke-width="4" stroke-opacity="0.8"/>
    <line x1="80" y1="280" x2="230" y2="280" stroke="#fde68a" stroke-width="4" stroke-opacity="0.8"/>
    <line x1="80" y1="320" x2="230" y2="320" stroke="#fde68a" stroke-width="4" stroke-opacity="0.6"/>

    <!-- Convex lens -->
    <path d="M230,180 Q250,170 250,180 L250,340 Q250,350 230,340 Z" fill="rgba(52,211,153,0.15)" stroke="#34d399" stroke-width="3"/>
    <path d="M270,180 Q250,170 250,180 L250,340 Q250,350 270,340 Z" fill="rgba(52,211,153,0.15)" stroke="#34d399" stroke-width="3"/>

    <!-- Refracted rays converging to focal point -->
    <line x1="250" y1="200" x2="400" y2="256" stroke="#fde68a" stroke-width="3.5" stroke-opacity="0.9"/>
    <line x1="250" y1="240" x2="400" y2="256" stroke="#fde68a" stroke-width="3.5" stroke-opacity="0.9"/>
    <line x1="250" y1="280" x2="400" y2="256" stroke="#fde68a" stroke-width="3.5" stroke-opacity="0.9"/>
    <line x1="250" y1="320" x2="400" y2="256" stroke="#fde68a" stroke-width="3" stroke-opacity="0.7"/>

    <!-- Continuation past focal point (dashed) -->
    <line x1="400" y1="256" x2="440" y2="240" stroke="#fde68a" stroke-width="2" stroke-opacity="0.3" stroke-dasharray="6,4"/>
    <line x1="400" y1="256" x2="440" y2="256" stroke="#fde68a" stroke-width="2" stroke-opacity="0.3" stroke-dasharray="6,4"/>
    <line x1="400" y1="256" x2="440" y2="272" stroke="#fde68a" stroke-width="2" stroke-opacity="0.3" stroke-dasharray="6,4"/>

    <!-- Focal point -->
    <circle cx="400" cy="256" r="6" fill="#fde68a" filter="url(#glow)"/>
    <text x="400" y="280" text-anchor="middle" fill="#fde68a" fill-opacity="0.6" font-size="14" font-family="Inter,sans-serif">F</text>

    <!-- Optical axis -->
    <line x1="60" y1="256" x2="450" y2="256" stroke="#fff" stroke-opacity="0.1" stroke-width="1" stroke-dasharray="5,5"/>
  </g>
</svg>
