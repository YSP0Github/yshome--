<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">热力学实验图标</title>
  <desc id="desc">分子运动与温度的热力学项目图标</desc>
  <defs>
    <linearGradient id="bg" x1="56" y1="56" x2="456" y2="456" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1a0a0a"/>
      <stop offset="0.55" stop-color="#991b1b"/>
      <stop offset="1" stop-color="#ef4444"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="14" flood-color="#020617" flood-opacity="0.4"/>
    </filter>
  </defs>
  <rect x="32" y="32" width="448" height="448" rx="120" fill="url(#bg)"/>
  <circle cx="120" cy="120" r="12" fill="#fff" fill-opacity="0.08"/>
  <circle cx="390" cy="390" r="10" fill="#fff" fill-opacity="0.06"/>
  <g filter="url(#shadow)">
    <!-- Container box -->
    <rect x="140" y="140" width="232" height="232" rx="16" fill="none" stroke="#fca5a5" stroke-width="3" stroke-opacity="0.4"/>
    <!-- Molecules (scattered circles) -->
    <circle cx="190" cy="200" r="8" fill="#ef4444" filter="url(#glow)"/>
    <circle cx="310" cy="180" r="6" fill="#f97316" filter="url(#glow)"/>
    <circle cx="250" cy="260" r="9" fill="#fbbf24" filter="url(#glow)"/>
    <circle cx="180" cy="320" r="7" fill="#ef4444" filter="url(#glow)"/>
    <circle cx="330" cy="310" r="6" fill="#f97316" filter="url(#glow)"/>
    <circle cx="260" cy="190" r="5" fill="#fca5a5" filter="url(#glow)"/>
    <circle cx="220" cy="340" r="7" fill="#fbbf24" filter="url(#glow)"/>
    <circle cx="340" cy="250" r="8" fill="#ef4444" filter="url(#glow)"/>
    <!-- Speed lines -->
    <line x1="185" y1="200" x2="170" y2="205" stroke="#fca5a5" stroke-width="2" stroke-opacity="0.5" stroke-linecap="round"/>
    <line x1="305" y1="180" x2="320" y2="175" stroke="#fca5a5" stroke-width="2" stroke-opacity="0.5" stroke-linecap="round"/>
    <line x1="250" y1="265" x2="250" y2="280" stroke="#fca5a5" stroke-width="2" stroke-opacity="0.4" stroke-linecap="round"/>
    <!-- Thermometer hint -->
    <rect x="400" y="180" width="16" height="140" rx="8" fill="none" stroke="#fca5a5" stroke-width="2" stroke-opacity="0.3"/>
    <rect x="404" y="260" width="8" height="56" rx="4" fill="#ef4444" fill-opacity="0.6"/>
  </g>
</svg>
