<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">波动光学实验图标</title>
  <desc id="desc">双缝干涉与衍射的波动光学项目图标</desc>
  <defs>
    <linearGradient id="bg" x1="56" y1="56" x2="456" y2="456" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0c0a1e"/>
      <stop offset="0.55" stop-color="#5b21b6"/>
      <stop offset="1" stop-color="#a78bfa"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="14" flood-color="#020617" flood-opacity="0.4"/>
    </filter>
  </defs>
  <rect x="32" y="32" width="448" height="448" rx="120" fill="url(#bg)"/>
  <circle cx="110" cy="130" r="12" fill="#fff" fill-opacity="0.08"/>
  <g filter="url(#shadow)">
    <!-- Barrier -->
    <rect x="200" y="80" width="8" height="140" rx="2" fill="#1e1b4b" stroke="#a78bfa" stroke-width="2" stroke-opacity="0.4"/>
    <rect x="200" y="292" width="8" height="140" rx="2" fill="#1e1b4b" stroke="#a78bfa" stroke-width="2" stroke-opacity="0.4"/>
    <!-- Slits (two gaps) -->
    <rect x="198" y="220" width="12" height="24" rx="2" fill="#c4b5fd" fill-opacity="0.5"/>
    <rect x="198" y="268" width="12" height="24" rx="2" fill="#c4b5fd" fill-opacity="0.5"/>
    <!-- Interference fringes on screen -->
    <rect x="370" y="120" width="12" height="272" rx="4" fill="#0c0a1e" stroke="#a78bfa" stroke-width="2" stroke-opacity="0.3"/>
    <!-- Fringe pattern -->
    <rect x="372" y="130" width="8" height="8" fill="#a78bfa" fill-opacity="0.15"/>
    <rect x="372" y="146" width="8" height="8" fill="#a78bfa" fill-opacity="0.1"/>
    <rect x="372" y="162" width="8" height="10" fill="#a78bfa" fill-opacity="0.25"/>
    <rect x="372" y="180" width="8" height="8" fill="#a78bfa" fill-opacity="0.1"/>
    <rect x="372" y="196" width="8" height="12" fill="#a78bfa" fill-opacity="0.4"/>
    <rect x="372" y="216" width="8" height="8" fill="#a78bfa" fill-opacity="0.1"/>
    <rect x="372" y="232" width="8" height="14" fill="#c4b5fd" fill-opacity="0.8"/>
    <rect x="372" y="254" width="8" height="8" fill="#a78bfa" fill-opacity="0.1"/>
    <rect x="372" y="270" width="8" height="12" fill="#a78bfa" fill-opacity="0.4"/>
    <rect x="372" y="290" width="8" height="8" fill="#a78bfa" fill-opacity="0.1"/>
    <rect x="372" y="306" width="8" height="10" fill="#a78bfa" fill-opacity="0.25"/>
    <rect x="372" y="324" width="8" height="8" fill="#a78bfa" fill-opacity="0.1"/>
    <rect x="372" y="340" width="8" height="8" fill="#a78bfa" fill-opacity="0.15"/>
    <!-- Wavefronts from source -->
    <circle cx="80" cy="256" r="40" fill="none" stroke="#c4b5fd" stroke-width="2" stroke-opacity="0.2"/>
    <circle cx="80" cy="256" r="70" fill="none" stroke="#c4b5fd" stroke-width="1.5" stroke-opacity="0.15"/>
    <circle cx="80" cy="256" r="100" fill="none" stroke="#c4b5fd" stroke-width="1" stroke-opacity="0.1"/>
    <!-- Source dot -->
    <circle cx="80" cy="256" r="6" fill="#c4b5fd" filter="url(#glow)"/>
  </g>
</svg>
