<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D 太阳系天体旋转</title>
<link rel="icon" type="image/svg+xml" href="../../static/images/project_icons/solarsystem-icon.svg">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #000;
    font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif; color: #e0e8f0; }
  canvas { display: block; }

  #panel {
    position: fixed; top: 16px; right: 16px; z-index: 10;
    background: rgba(8,12,28,0.92); backdrop-filter: blur(16px);
    border: 1px solid rgba(80,130,255,0.15); border-radius: 14px;
    padding: 18px 20px; min-width: 260px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  }
  #panel h2 {
    font-size: 1rem; margin-bottom: 12px; color: #7eb8ff;
    display: flex; align-items: center; gap: 8px;
  }
  #panel h2::before {
    content: ''; width: 7px; height: 7px; border-radius: 50%; background: #3b8bff;
  }
  .row {
    display: flex; align-items: center; margin: 7px 0; gap: 8px;
  }
  .row label {
    font-size: 0.78rem; color: #7a8da8; min-width: 54px;
  }
  .row input[type="range"] {
    flex: 1; accent-color: #3b8bff; height: 4px; cursor: pointer;
  }
  .row .val {
    min-width: 32px; text-align: right; font-size: 0.78rem;
    color: #7eb8ff; font-weight: 600;
  }
  .btns {
    display: flex; gap: 5px; margin-top: 12px; flex-wrap: wrap;
  }
  .btn {
    padding: 5px 10px; border-radius: 7px;
    border: 1px solid rgba(80,130,255,0.2);
    background: rgba(40,80,180,0.1); color: #7eb8ff;
    font-size: 0.75rem; font-weight: 600; cursor: pointer;
    transition: 0.2s; user-select: none;
  }
  .btn:hover { background: rgba(40,80,180,0.2); }
  .btn.on { background: rgba(40,80,180,0.3); border-color: #3b8bff; }

  #info {
    position: fixed; bottom: 16px; left: 16px; z-index: 10;
    background: linear-gradient(180deg, rgba(10,15,35,0.97) 0%, rgba(6,10,25,0.99) 100%);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(80,130,255,0.2); border-radius: 20px;
    padding: 0; text-align: left;
    width: calc(100% - 32px); max-width: 900px;
    box-shadow: 0 12px 48px rgba(0,0,0,0.7), 0 0 100px rgba(60,120,255,0.08), inset 0 1px 0 rgba(255,255,255,0.06);
    opacity: 0; pointer-events: none; transition: opacity 0.4s, transform 0.4s;
    max-height: 50vh; overflow-y: auto;
  }
  #info.show { opacity: 1; pointer-events: auto; }
  #info::-webkit-scrollbar { width: 4px; }
  #info::-webkit-scrollbar-thumb { background: rgba(100,150,255,0.3); border-radius: 2px; }

  .info-header {
    padding: 14px 18px 12px;
    background: linear-gradient(135deg, rgba(40,80,180,0.15) 0%, rgba(20,40,100,0.1) 100%);
    border-bottom: 1px solid rgba(80,130,255,0.15);
    border-radius: 20px 20px 0 0;
  }
  .info-title-row { display: flex; align-items: center; gap: 10px; margin-bottom: 4px; }
  .info-title-row h2 { font-size: 1.1rem; color: #fff; margin: 0; font-weight: 700; text-shadow: 0 0 20px rgba(126,184,255,0.5); }
  #infoType {
    font-size: 0.6rem; color: #ffb848; background: rgba(255,170,50,0.15);
    padding: 4px 10px; border-radius: 12px; border: 1px solid rgba(255,170,50,0.3);
    white-space: nowrap; font-weight: 600; letter-spacing: 0.5px;
  }
  .info-subtitle {
    font-size: 0.78rem; color: #7090b8; margin: 0; font-style: italic;
    line-height: 1.4;
  }

  .info-body {
    padding: 12px 16px;
    display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 10px;
  }
  .info-section {
    background: rgba(255,255,255,0.02); border-radius: 10px; padding: 10px 12px;
    border: 1px solid rgba(80,130,255,0.08);
  }
  .info-section h4 {
    font-size: 0.62rem; color: #5080c0; margin: 0 0 6px 0;
    text-transform: uppercase; letter-spacing: 0.8px; font-weight: 600;
    display: flex; align-items: center; gap: 5px;
  }
  .info-section h4::before {
    content: ''; width: 2px; height: 10px; background: #4080ff; border-radius: 1px;
  }
  .info-grid {
    display: grid; grid-template-columns: auto 1fr; gap: 3px 10px; align-items: center;
  }
  .info-item { display: contents; }
  .info-label { font-size: 0.62rem; color: #5a7090; white-space: nowrap; }
  .info-val { font-size: 0.66rem; color: #c8d8f0; font-weight: 500; white-space: nowrap; }

  .info-features {
    display: flex; gap: 6px; flex-wrap: wrap;
    padding: 8px 16px;
    border-top: 1px solid rgba(80,130,255,0.1);
  }
  .feature-item {
    background: rgba(60,120,255,0.06); border-radius: 6px; padding: 4px 10px;
    border: 1px solid rgba(80,130,255,0.1); text-align: center;
    flex: 0 0 auto; display: flex; align-items: center; gap: 5px;
  }
  .feature-icon { font-size: 0.9rem; }
  .feature-label { font-size: 0.5rem; color: #5a7090; }
  .feature-value { font-size: 0.6rem; color: #90b8e8; font-weight: 500; }

  .info-fact {
    padding: 10px 16px;
    background: rgba(40,80,160,0.08);
    border-top: 1px solid rgba(80,130,255,0.12);
    border-radius: 0 0 20px 20px;
  }
  .info-fact h4 {
    font-size: 0.6rem; color: #5080c0; margin: 0 0 6px 0;
    text-transform: uppercase; letter-spacing: 1px; font-weight: 600;
  }
  .info-fact p {
    font-size: 0.68rem; color: #8aa8c8; line-height: 1.5; margin: 0;
  }

  #hint {
    position: fixed; bottom: 10px; left: 50%; transform: translateX(-50%); z-index: 10;
    font-size: 0.78rem; color: #3a5070; opacity: 0.6;
    pointer-events: none; transition: opacity 1s;
  }
  #disclaimer {
    position: fixed; bottom: 12px; right: 16px; z-index: 10;
    font-size: 0.65rem; color: #3a5070; opacity: 0.45;
    max-width: 320px; text-align: right; line-height: 1.4;
    pointer-events: none;
  }

  #panelToggle {
    display: none; cursor: pointer; padding: 6px 14px; border-radius: 10px;
    background: rgba(8,12,28,0.92); backdrop-filter: blur(16px);
    border: 1px solid rgba(80,130,255,0.15);
    box-shadow: 0 4px 16px rgba(0,0,0,0.5);
    font-size: 0.82rem; font-weight: 600; color: #7eb8ff;
    position: fixed; top: 12px; right: 12px; z-index: 11;
    user-select: none; -webkit-user-select: none;
    transition: opacity 0.2s;
  }
  #panelToggle::after {
    content: ''; display: inline-block; margin-left: 6px;
    border: 4px solid transparent; border-top-color: #7eb8ff;
    vertical-align: middle; transition: transform 0.2s;
  }
  #panelToggle.collapsed::after { transform: rotate(-90deg); }

  @media (max-width: 700px) {
    #panel {
      min-width: auto; width: calc(100% - 24px); padding: 12px;
      max-height: 0; overflow: hidden; opacity: 0;
      transition: max-height 0.3s ease, opacity 0.25s ease, padding 0.3s ease;
      padding-top: 0; padding-bottom: 0; border-width: 0;
    }
    #panel.open {
      max-height: 80vh; opacity: 1; overflow-y: auto;
      padding: 12px; border-width: 1px;
    }
    #panelToggle { display: block; }
  }

  #bodyList {
    position: fixed; top: 16px; left: 16px; z-index: 10;
    background: rgba(8,12,28,0.92); backdrop-filter: blur(16px);
    border: 1px solid rgba(80,130,255,0.15); border-radius: 14px;
    padding: 14px 16px; width: 200px; max-height: 70vh;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    overflow-y: auto;
  }
  #bodyList h3 {
    font-size: 0.85rem; margin-bottom: 10px; color: #7eb8ff;
    display: flex; align-items: center; gap: 6px;
  }
  #bodyList h3::before {
    content: ''; width: 6px; height: 6px; border-radius: 50%; background: #3b8bff;
  }

  #timeDisplay {
    position: fixed; top: 16px; left: 50%; transform: translateX(-50%); z-index: 10;
    background: rgba(8,12,28,0.92); backdrop-filter: blur(16px);
    border: 1px solid rgba(80,130,255,0.15); border-radius: 10px;
    padding: 8px 18px; text-align: center;
    box-shadow: 0 4px 16px rgba(0,0,0,0.4);
    font-size: 0.82rem; color: #7eb8ff; font-weight: 600;
    white-space: nowrap;
  }
  #timeDisplay .time-val { color: #ffb347; font-size: 1rem; }
  #scaleBar {
    position: fixed; bottom: 60px; right: 20px; z-index: 10;
    text-align: center; pointer-events: none;
  }
  #scaleBarLine {
    height: 2px; background: #7eb8ff; margin: 0 auto;
    box-shadow: 0 0 8px rgba(126,184,255,0.6);
  }
  #scaleBarText {
    font-size: 0.72rem; color: #7eb8ff; margin-top: 4px;
    font-family: 'Consolas', 'Monaco', monospace;
  }
  .body-group { margin-bottom: 8px; }
  .body-group-title {
    font-size: 0.68rem; color: #4a6080; text-transform: uppercase;
    letter-spacing: 0.5px; margin-bottom: 4px; padding-left: 2px;
  }
  .body-item {
    padding: 4px 8px; border-radius: 6px; cursor: pointer;
    font-size: 0.75rem; color: #8aa0c0; transition: 0.15s;
    display: flex; align-items: center; gap: 6px;
  }
  .body-item:hover { background: rgba(40,80,180,0.2); color: #c8d8f0; }
  .body-item .dot {
    width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0;
  }
  @media (max-width: 700px) {
    #bodyList { display: none; }
  }
</style>
</head>
<body>

<div id="panelToggle" class="collapsed">控制台</div>
<div id="panel">
  <h2>太阳系控制台</h2>
  <div class="row">
    <label>速度倍率</label>
    <input type="range" id="slOrbit" min="0" max="5" step="0.1" value="1">
    <span class="val" id="vlOrbit">1.0</span>
  </div>
  <div class="row">
    <label>轨道缩放</label>
    <input type="range" id="slOrbS" min="0.3" max="3" step="0.1" value="1">
    <span class="val" id="vlOrbS">1.0</span>
  </div>
  <div class="row">
    <label>行星缩放</label>
    <input type="range" id="slPltS" min="0.3" max="50" step="0.1" value="5">
    <span class="val" id="vlPltS">5.0</span>
  </div>
  <div class="row">
    <label>视角距离</label>
    <input type="range" id="slCam" min="2" max="5000" step="2" value="200">
    <span class="val" id="vlCam">200</span>
  </div>
  <div class="row">
    <label>环境光</label>
    <input type="range" id="slAmb" min="0" max="5" step="0.1" value="0.6">
    <span class="val" id="vlAmb">0.6</span>
  </div>
  <div class="row">
    <label>曝光度</label>
    <input type="range" id="slExp" min="0.3" max="8" step="0.1" value="1.0">
    <span class="val" id="vlExp">1.0</span>
  </div>
  <div class="btns">
    <div class="btn" id="btnPause">暂停</div>
    <div class="btn on" id="btnOrbit">轨道线</div>
    <div class="btn" id="btnLabel">名称</div>
    <div class="btn on" id="btnGlow">光效</div>
    <div class="btn on" id="btnBelt">小行星带</div>
    <div class="btn" id="btnKuiper">柯伊伯带</div>
    <div class="btn on" id="btnMode">示意图</div>
    <div class="btn" id="btnReset">重置</div>
  </div>
</div>

<div id="bodyList">
  <h3>天体列表</h3>
  <div id="bodyListContent"></div>
</div>

<div id="timeDisplay">
  模拟时间：<span class="time-val" id="simTime">0 天</span>
</div>

<div id="scaleBar" style="display:none;">
  <div id="scaleBarLine"></div>
  <div id="scaleBarText">1 AU</div>
</div>

<div id="info">
  <div class="info-header">
    <div class="info-title-row">
      <h2 id="infoName"></h2>
      <span id="infoType"></span>
    </div>
    <p id="infoSubtitle" class="info-subtitle"></p>
  </div>
  <div class="info-body">
    <div class="info-section">
      <h4>基本参数</h4>
      <div class="info-grid">
        <div class="info-item"><span class="info-label">直径</span><span class="info-val" id="infoDiam"></span></div>
        <div class="info-item"><span class="info-label">质量</span><span class="info-val" id="infoMass"></span></div>
        <div class="info-item"><span class="info-label">密度</span><span class="info-val" id="infoDensity"></span></div>
        <div class="info-item"><span class="info-label">表面重力</span><span class="info-val" id="infoGravity"></span></div>
        <div class="info-item"><span class="info-label">逃逸速度</span><span class="info-val" id="infoEscape"></span></div>
        <div class="info-item"><span class="info-label">轴倾斜角</span><span class="info-val" id="infoTilt"></span></div>
      </div>
    </div>
    <div class="info-section">
      <h4>轨道与运动</h4>
      <div class="info-grid">
        <div class="info-item"><span class="info-label">与太阳距离</span><span class="info-val" id="infoDist"></span></div>
        <div class="info-item"><span class="info-label">轨道速度</span><span class="info-val" id="infoOrbVel"></span></div>
        <div class="info-item"><span class="info-label">轨道离心率</span><span class="info-val" id="infoEcc"></span></div>
        <div class="info-item"><span class="info-label">自转周期</span><span class="info-val" id="infoDay"></span></div>
        <div class="info-item"><span class="info-label">公转周期</span><span class="info-val" id="infoYear"></span></div>
      </div>
    </div>
    <div class="info-section">
      <h4>环境特征</h4>
      <div class="info-grid">
        <div class="info-item"><span class="info-label">表面温度</span><span class="info-val" id="infoTemp"></span></div>
        <div class="info-item"><span class="info-label">已知卫星</span><span class="info-val" id="infoMoons"></span></div>
        <div class="info-item"><span class="info-label">大气成分</span><span class="info-val" id="infoAtm"></span></div>
      </div>
    </div>
  </div>
  <div class="info-features" id="infoFeatures"></div>
  <div class="info-fact">
    <h4>趣闻</h4>
    <p id="infoFact"></p>
  </div>
</div>
<div id="hint">左键拖动旋转 · 中键平移 · 滚轮缩放 · +/- 缩放 · 单击查看信息 · 双击聚焦天体</div>
<div id="disclaimer">科学说明：行星半径和轨道距离经过视觉缩放（非真实比例），否则行星将不可见。自转轴倾角、公转周期比例为真实值。环面倾角与行星自转轴一致。</div>

}

function createRingGeometry(innerR, outerR, segments, colors, opacity, eng) {
  const ringTexture = makeTexture(512, 64, function (ctx, w, h) {
    const gradient = ctx.createLinearGradient(0, 0, w, 0);
    colors.forEach(function (c) { gradient.addColorStop(c[0], c[1]); });
    ctx.fillStyle = gradient;
    ctx.fillRect(0, 0, w, h);
    if (eng === 'Saturn') {
      const shadowGrad = ctx.createLinearGradient(0, 0, w, 0);
      shadowGrad.addColorStop(0.0, 'rgba(0,0,0,0.6)');
      shadowGrad.addColorStop(0.18, 'rgba(0,0,0,0.45)');
      shadowGrad.addColorStop(0.32, 'rgba(0,0,0,0.22)');
      shadowGrad.addColorStop(0.45, 'rgba(0,0,0,0.08)');
      shadowGrad.addColorStop(0.55, 'rgba(0,0,0,0.0)');
      shadowGrad.addColorStop(1.0, 'rgba(0,0,0,0.0)');
      ctx.fillStyle = shadowGrad;
      ctx.fillRect(0, 0, w, h);
    }
  });
  var ringGeom = new THREE.RingGeometry(innerR, outerR, segments);
  var ringUvs = ringGeom.attributes.uv;
  var ringPos = ringGeom.attributes.position;
  for (var i = 0; i < ringUvs.count; i++) {
    var x = ringPos.getX(i), y = ringPos.getY(i);
    var r = Math.sqrt(x * x + y * y);
    ringUvs.setXY(i, (r - innerR) / (outerR - innerR), 0.5);
  }
  var ringMat = new THREE.MeshBasicMaterial({
    map: ringTexture, side: THREE.DoubleSide,
    transparent: true, opacity: opacity, depthWrite: false
  });
  return new THREE.Mesh(ringGeom, ringMat);
}

/* ═══════════════════════════════════════════════
   程序化纹理
   ═══════════════════════════════════════════════ */

function makeTexture(width, height, drawFn) {
  const canvas = document.createElement('canvas');
  canvas.width = width;
  canvas.height = height;
  const ctx = canvas.getContext('2d', { willReadFrequently: true });
  drawFn(ctx, width, height);
  const texture = new THREE.CanvasTexture(canvas);
  texture.colorSpace = THREE.SRGBColorSpace;
  return texture;
}

// ── FBM 噪声系统 ──
function noise2D(x, y) {
  const n = Math.sin(x * 12.9898 + y * 78.233) * 43758.5453123;
  return n - Math.floor(n);
}
function fbm2D(x, y, oct, seed) {
  let v = 0, a = 1, f = 1, mx = 0;
  for (let i = 0; i < oct; i++) {
    v += a * noise2D(x * f + seed + i * 137, y * f + seed + i * 251);
    mx += a; f *= 2.1; a *= 0.48;
  }
  return v / mx;
}
function addNoise(ctx, w, h, amount, seed) {
  const imageData = ctx.getImageData(0, 0, w, h);
  const data = imageData.data;
  for (let i = 0; i < data.length; i += 4) {
    const x = (i / 4) % w, y = Math.floor((i / 4) / w);
    const n = (fbm2D(x * 0.02, y * 0.01, 3, seed || 0) - 0.5) * 2 * amount;
    data[i]     = Math.max(0, Math.min(255, data[i] + n));
    data[i + 1] = Math.max(0, Math.min(255, data[i + 1] + n * 0.9));
    data[i + 2] = Math.max(0, Math.min(255, data[i + 2] + n * 0.8));
  }
  ctx.putImageData(imageData, 0, 0);
}

function textureMercury() {
  return makeTexture(512, 256, (ctx, w, h) => {
    // 基底：带纬度渐变的灰色
    const base = ctx.createLinearGradient(0, 0, 0, h);

    base.addColorStop(0.5, '#6e6660');
    base.addColorStop(0.7, '#787068');
    base.addColorStop(1, '#867e76');
    ctx.fillStyle = base;
    ctx.fillRect(0, 0, w, h);
    addNoise(ctx, w, h, 16, 1);
    // 大型冲击盆地（较暗的椭圆区域）
    for (let i = 0; i < 8; i++) {
      const bx = Math.random() * w, by = Math.random() * h;
      const br = 12 + Math.random() * 30;
      const g = ctx.createRadialGradient(bx, by, br * 0.2, bx, by, br);
      g.addColorStop(0, 'rgba(50,45,40,0.3)');
      g.addColorStop(0.5, 'rgba(65,58,50,0.12)');
      g.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = g;
      ctx.beginPath(); ctx.arc(bx, by, br, 0, Math.PI * 2); ctx.fill();
    }
    // 密集陨石坑 — 亮边暗心
    for (let i = 0; i < 120; i++) {
      const cx = Math.random() * w, cy = Math.random() * h;
      const cr = 1.5 + Math.random() * 12;
      // 亮环
      const gr = ctx.createRadialGradient(cx, cy, cr * 0.75, cx, cy, cr * 1.15);
      gr.addColorStop(0, 'rgba(0,0,0,0)');
      gr.addColorStop(0.4, 'rgba(140,130,120,0.3)');
      gr.addColorStop(0.7, 'rgba(160,150,140,0.15)');
      gr.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = gr;
      ctx.beginPath(); ctx.arc(cx, cy, cr * 1.15, 0, Math.PI * 2); ctx.fill();
      // 暗底
      const gd = ctx.createRadialGradient(cx, cy, 0, cx, cy, cr * 0.7);
      gd.addColorStop(0, 'rgba(40,36,32,0.4)');
      gd.addColorStop(0.5, 'rgba(55,48,42,0.15)');
      gd.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = gd;
      ctx.beginPath(); ctx.arc(cx, cy, cr * 0.7, 0, Math.PI * 2); ctx.fill();
    }
    // 细小陨石坑
    for (let i = 0; i < 200; i++) {
      const cx = Math.random() * w, cy = Math.random() * h;
      const cr = 0.5 + Math.random() * 2;
      ctx.fillStyle = `rgba(${50 + Math.random() * 40},${45 + Math.random() * 35},${40 + Math.random() * 30},0.35)`;
      ctx.beginPath(); ctx.arc(cx, cy, cr, 0, Math.PI * 2); ctx.fill();
    }
    addNoise(ctx, w, h, 6, 2);
  });
}

function textureVenus() {

    grad.addColorStop(0.25, '#ddc068');
    grad.addColorStop(0.5, '#c8a848');
    grad.addColorStop(0.75, '#d4b858');
    grad.addColorStop(1, '#bf9840');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, w, h);
    // 漩涡云带 — 多频率正弦波
    for (let i = 0; i < 30; i++) {
      const y0 = Math.random() * h;
      const freq = 0.004 + Math.random() * 0.02;
      const amp = 4 + Math.random() * 16;
      const phase = Math.random() * Math.PI * 2;
      ctx.strokeStyle = `rgba(190,155,70,${0.06 + Math.random() * 0.12})`;
      ctx.lineWidth = 2 + Math.random() * 8;
      ctx.beginPath();
      for (let x = 0; x < w; x += 4) {
        const y = y0 + Math.sin(x * freq + phase) * amp
                    + Math.sin(x * freq * 2.7 + phase * 1.8) * amp * 0.3;
        x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      }
      ctx.stroke();
    }
    // 亮色云顶斑块
    for (let i = 0; i < 40; i++) {
      const bx = Math.random() * w, by = Math.random() * h;
      const br = 5 + Math.random() * 18;
      const g = ctx.createRadialGradient(bx, by, 0, bx, by, br);
      g.addColorStop(0, 'rgba(240,220,160,0.15)');
      g.addColorStop(0.5, 'rgba(220,200,140,0.06)');
      g.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = g;
      ctx.beginPath(); ctx.arc(bx, by, br, 0, Math.PI * 2); ctx.fill();
    }
    addNoise(ctx, w, h, 8, 10);
  });
}

function textureEarth() {
  return makeTexture(1024, 512, (ctx, w, h) => {
    // ── 1. 低分辨率噪声生成大陆高度图 ──
    const EM = 256, EH = 128;
    const elevCanvas = document.createElement('canvas');
    elevCanvas.width = EM; elevCanvas.height = EH;
    const eCtx = elevCanvas.getContext('2d');
    const eImg = eCtx.createImageData(EM, EH);
    const ed = eImg.data;
    for (let y = 0; y < EH; y++) {
      // 纬度 [-PI/2, PI/2]
      const lat = (y / (EH - 1) - 0.5) * Math.PI;
      for (let x = 0; x < EM; x++) {
        // 经度 [0, 2*PI]
        const lon = (x / (EM - 1)) * Math.PI * 2;
        // 映射到噪声空间
        const nx = (lon / Math.PI) * 1.6;
        const ny = (lat / (Math.PI / 2)) * 1.6;
        let e = fbm2D(nx + 0.5, ny + 0.5, 6, 7);
        // 模拟大陆架：浅海区略微抬高
        e += fbm2D(nx * 0.5, ny * 0.5, 4, 99) * 0.15;
        // 南极洲
        if (lat < -1.05) e = Math.max(e, 0.42 + Math.abs(lat + 1.05) * 0.8);
        // 格陵兰效应：北极附近局部增高
        if (lat > 1.1) e = Math.max(e, 0.4 + fbm2D(nx * 3, ny * 3, 3, 44) * 0.25);
        const idx = (y * EM + x) * 4;
        const v = Math.max(0, Math.min(255, e * 255));
        ed[idx] = ed[idx + 1] = ed[idx + 2] = v;
        ed[idx + 3] = 255;
      }
    }
    eCtx.putImageData(eImg, 0, 0);
    // 放大到全分辨率
    ctx.drawImage(elevCanvas, 0, 0, w, h);

    // ── 2. 根据高度着色 ──
    const img = ctx.getImageData(0, 0, w, h);
    const d = img.data;
    for (let i = 0; i < d.length; i += 4) {
      const e = d[i] / 255;
      // 添加地形细节噪声
      const px = (i / 4) % w, py = Math.floor((i / 4) / w);
      const micro = (fbm2D(px * 0.04, py * 0.02, 3, 20) - 0.5) * 15;

      let r, g, b;
      if (e < 0.30) {        // 深海
        r = 12; g = 38; b = 80;
      } else if (e < 0.38) { // 浅海
        r = 18 + micro * 0.3; g = 55 + micro * 0.3; b = 120 + micro * 0.3;
      } else if (e < 0.41) { // 海滩/海岸
        r = 200 + micro; g = 185 + micro * 0.8; b = 130 + micro * 0.5;
      } else if (e < 0.50) { // 低地绿地
        r = 55 + micro; g = 145 + micro; b = 50 + micro * 0.5;
      } else if (e < 0.60) { // 森林/丘陵
        r = 30 + micro * 0.7; g = 110 + micro; b = 25 + micro * 0.4;
      } else if (e < 0.70) { // 高地/高原
        r = 120 + micro; g = 105 + micro * 0.8; b = 65 + micro * 0.4;
      } else if (e < 0.82) { // 山地
        r = 145 + micro * 0.7; g = 130 + micro * 0.6; b = 105 + micro * 0.4;
      } else {               // 雪山
        r = 230 + micro * 0.3; g = 238 + micro * 0.3; b = 248 + micro * 0.1;
      }
      d[i] = Math.max(0, Math.min(255, r));
      d[i + 1] = Math.max(0, Math.min(255, g));
      d[i + 2] = Math.max(0, Math.min(255, b));
    }
    ctx.putImageData(img, 0, 0);

    // ── 3. 冰盖 ──
    const iceTop = ctx.createLinearGradient(0, 0, 0, h * 0.06);
    iceTop.addColorStop(0, 'rgba(238,243,252,0.8)');
    iceTop.addColorStop(0.5, 'rgba(228,235,248,0.3)');
    iceTop.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = iceTop; ctx.fillRect(0, 0, w, h * 0.06);

    const iceBot = ctx.createLinearGradient(0, h * 0.94, 0, h);
    iceBot.addColorStop(0, 'rgba(255,255,255,0)');
    iceBot.addColorStop(0.5, 'rgba(235,240,250,0.4)');
    iceBot.addColorStop(1, 'rgba(240,244,252,0.85)');
    ctx.fillStyle = iceBot; ctx.fillRect(0, h * 0.94, w, h * 0.06);

    // ── 4. 云层 ──
    ctx.globalAlpha = 0.13;
    for (let i = 0; i < 100; i++) {
      const cx = Math.random() * w, cy = Math.random() * h;
      const crx = 15 + Math.random() * 70, cry = 3 + Math.random() * 9;
      const angle = Math.random() * 0.3;
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.ellipse(cx, cy, crx, cry, angle, 0, Math.PI * 2);
      ctx.fill();
    }
    // 热带对流云（更集中）
    ctx.globalAlpha = 0.08;
    for (let i = 0; i < 50; i++) {
      const cx = Math.random() * w;
      const cy = h * 0.35 + Math.random() * h * 0.3;
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.ellipse(cx, cy, 12 + Math.random() * 35, 4 + Math.random() * 6, Math.random() * 0.2, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;

    addNoise(ctx, w, h, 3, 30);
  });
}

      for (let x = 0; x < w; x++) {
        // 湍流位移
        const turb = fbm2D(x * 0.015, y * 0.01, 3, 1);
        const dy = (turb - 0.5) * 38;
        // 扭曲后的 y
        const yDist = (y + dy + h) % h;
        const bandIdx = (yDist / h * NB) % NB;
        const bi = Math.floor(bandIdx);
        const frac = bandIdx - bi;
        const b0 = palette[((bi % NB) + NB) % NB];
        const b1 = palette[((bi + 1) % NB + NB) % NB];
        // 条带边界锐化
        const edge = Math.abs(frac - 0.5) * 2;
        const sharp = Math.pow(edge, 0.6);
        const r = (b0[0] + (b1[0] - b0[0]) * frac) * sharp;
        const g = (b0[1] + (b1[1] - b0[1]) * frac) * sharp;
        const b = (b0[2] + (b1[2] - b0[2]) * frac) * sharp;
        // 细节
        const n = (fbm2D(x * 0.08, y * 0.04, 3, 50) - 0.5) * 15;
        const i = (y * w + x) * 4;
        d[i]     = Math.max(0, Math.min(255, r + n));
        d[i + 1] = Math.max(0, Math.min(255, g + n));
        d[i + 2] = Math.max(0, Math.min(255, b + n * 0.6));
        d[i + 3] = 255;
      }
    }
    ctx.putImageData(img, 0, 0);

    // 大红斑
    const gx = w * 0.58, gy = h * 0.54;
    for (let dy = -35; dy < 35; dy++) {
      for (let dx = -55; dx < 55; dx++) {
        const d2 = (dx * dx) / (50 * 50) + (dy * dy) / (18 * 18);
        if (d2 < 2.5) {
          const a = d2 < 1 ? 0.7 : 0.7 * Math.max(0, 1 - (d2 - 1) / 1.5);
          const turbR = fbm2D(gx + dx * 0.3, gy + dy * 0.3, 3, 99);
          const rr = 200 + (turbR - 0.5) * 30;
          ctx.fillStyle = `rgba(${rr},${60 + (turbR-0.5)*20},${15 + (turbR-0.5)*10},${a})`;
          ctx.fillRect(gx + dx, gy + dy, 1, 1);
        }
      }
    }

    // 小白斑（反气旋风暴）
    const ovals = [
      [0.32, 0.42, 16, 8],
      [0.48, 0.28, 12, 6],
      [0.7, 0.6, 14, 7],
      [0.38, 0.65, 10, 5]
    ];
    ovals.forEach(([ox, oy, orx, ory]) => {
      const cx = ox * w, cy = oy * h;
      const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, orx);
      g.addColorStop(0, 'rgba(240,225,200,0.45)');
      g.addColorStop(0.5, 'rgba(220,200,175,0.2)');
      g.addColorStop(1, 'rgba(200,180,155,0)');
      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.ellipse(cx, cy, orx, ory, 0.05, 0, Math.PI * 2);
      ctx.fill();
    });
  });
}

function textureSaturn() {
  return makeTexture(512, 256, (ctx, w, h) => {
    // 柔和条带 — 淡金色调
    const bands = [
      [225,205,145],[210,190,130],[230,210,152],[200,180,120],
      [220,200,140],[215,195,135],[228,208,150],[205,185,128],
      [222,202,142],[212,192,132],[226,206,148],[208,188,130]
    ];
    const NB = bands.length;
    const img = ctx.createImageData(w, h);
    const d = img.data;
    for (let y = 0; y < h; y++) {
      const turb = fbm2D(0, y * 0.04, 2, 70);
      const dy = (turb - 0.5) * 6;
      const yd = ((y + dy + h) % h) / h * NB;
      const bi = Math.floor(yd);
      const frac = yd - bi;
      const b0 = bands[((bi % NB) + NB) % NB];
      const b1 = bands[((bi + 1) % NB + NB) % NB];
      for (let x = 0; x < w; x++) {
        const n = (fbm2D(x * 0.04, y * 0.03, 2, 80) - 0.5) * 8;
        const i = (y * w + x) * 4;
        d[i]     = Math.max(0, Math.min(255, b0[0] + (b1[0] - b0[0]) * frac + n));
        d[i + 1] = Math.max(0, Math.min(255, b0[1] + (b1[1] - b0[1]) * frac + n));
        d[i + 2] = Math.max(0, Math.min(255, b0[2] + (b1[2] - b0[2]) * frac + n * 0.6));
        d[i + 3] = 255;
      }
    }
    ctx.putImageData(img, 0, 0);
    addNoise(ctx, w, h, 2, 75);
  });
}

function textureUranus() {
  return makeTexture(512, 256, (ctx, w, h) => {
    // 淡蓝绿色基底 + 极微弱条带
    const img = ctx.createImageData(w, h);
    const d = img.data;
    for (let y = 0; y < h; y++) {
      const band = Math.sin(y * 0.06) * 0.04 + Math.sin(y * 0.15) * 0.02;
      for (let x = 0; x < w; x++) {
        const n = (fbm2D(x * 0.03, y * 0.02, 2, 60) - 0.5) * 10;
        const r = 108 + band * 20 + n;
        const g = 198 + band * 15 + n;
        const b = 218 + band * 10 + n * 0.7;
        const i = (y * w + x) * 4;
        d[i] = Math.max(0, Math.min(255, r));
        d[i+1] = Math.max(0, Math.min(255, g));
        d[i+2] = Math.max(0, Math.min(255, b));
        d[i+3] = 255;
      }
    }
    ctx.putImageData(img, 0, 0);
    addNoise(ctx, w, h, 1, 65);
  });
}

function textureNeptune() {
  return makeTexture(512, 256, (ctx, w, h) => {
    // 深蓝基底 + 微弱大气特征
    const img = ctx.createImageData(w, h);
    const d = img.data;
    for (let y = 0; y < h; y++) {
      const band = Math.sin(y * 0.05) * 0.03 + fbm2D(0, y * 0.03, 2, 55) * 0.04;
      for (let x = 0; x < w; x++) {
        const n = (fbm2D(x * 0.04, y * 0.03, 3, 50) - 0.5) * 14;
        const r = 22 + band * 30 + n * 0.3;
        const g = 52 + band * 35 + n * 0.5;
        const b = 170 + band * 20 + n;
        const i = (y * w + x) * 4;
        d[i] = Math.max(0, Math.min(255, r));
        d[i+1] = Math.max(0, Math.min(255, g));
        d[i+2] = Math.max(0, Math.min(255, b));
        d[i+3] = 255;
      }
    }
    ctx.putImageData(img, 0, 0);
    // 大暗斑
    const dx = w * 0.45, dy = h * 0.48;
    const g = ctx.createRadialGradient(dx, dy, 0, dx, dy, 22);
    g.addColorStop(0, 'rgba(10,25,120,0.35)');
    g.addColorStop(0.5, 'rgba(15,35,140,0.15)');
    g.addColorStop(1, 'rgba(20,45,160,0)');
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.ellipse(dx, dy, 24, 13, 0.1, 0, Math.PI * 2); ctx.fill();
    // 亮云
    for (let i = 0; i < 8; i++) {
      const cx = w * 0.15 + Math.random() * w * 0.7;
      const cy = h * 0.15 + Math.random() * h * 0.7;
      const crx = 4 + Math.random() * 12, cry = 2 + Math.random() * 4;
      ctx.fillStyle = `rgba(180,210,240,${0.06 + Math.random() * 0.1})`;
      ctx.beginPath();
      ctx.ellipse(cx, cy, crx, cry, Math.random() * 0.3, 0, Math.PI * 2);
      ctx.fill();
    }
    addNoise(ctx, w, h, 3, 55);
  });
}

function textureSun() {
  return makeTexture(512, 256, (ctx, w, h) => {
    // 全画布逐像素生成 — 颗粒感光球表面
    const img = ctx.createImageData(w, h);
    const d = img.data;
    for (let y = 0; y < h; y++) {
      for (let x = 0; x < w; x++) {
        const n1 = fbm2D(x * 0.06, y * 0.03, 5, 0);
        const n2 = fbm2D(x * 0.18, y * 0.09, 3, 42);
        const fac = fbm2D(x * 0.025, y * 0.013, 2, 88);
        const gran = (n1 - 0.5) * 0.22 + (n2 - 0.5) * 0.06;
        const bright = fac > 0.55 ? (fac - 0.55) * 0.4 : 0;
        const i = (y * w + x) * 4;
        d[i]     = Math.min(255, 255 * (0.96 + gran + bright));
        d[i + 1] = Math.min(255, 232 * (0.9 + gran + bright * 0.8));
        d[i + 2] = Math.min(255, 48 * (0.55 + gran * 0.35));
        d[i + 3] = 255;
      }
    }
    ctx.putImageData(img, 0, 0);
    // 太阳黑子
    for (let i = 0; i < 12; i++) {
      const sx = w * 0.1 + Math.random() * w * 0.8;
      const sy = h * 0.1 + Math.random() * h * 0.8;
      const sr = 2 + Math.random() * 8;
      const r2 = Math.ceil(sr * 2.5);
      for (let dy = -r2; dy < r2; dy++) {
        for (let dx = -r2; dx < r2; dx++) {
          const d2 = (dx * dx) / (sr * sr) + (dy * dy) / ((sr * 0.5) * (sr * 0.5));
          if (d2 < 4) {
            const a = d2 < 1 ? 0.45 : 0.45 * Math.max(0, 1 - (d2 - 1) / 3);
            ctx.fillStyle = `rgba(50,18,5,${a * 0.6})`;
            ctx.fillRect(sx + dx, sy + dy, 1, 1);
          }
        }
      }
    }
    // 亮斑区域
    for (let i = 0; i < 25; i++) {
      const fx = w * 0.1 + Math.random() * w * 0.8;
      const fy = h * 0.1 + Math.random() * h * 0.8;
      const fr = 3 + Math.random() * 7;
      const g = ctx.createRadialGradient(fx, fy, 0, fx, fy, fr);
      g.addColorStop(0, 'rgba(255,245,180,0.12)');
      g.addColorStop(1, 'rgba(255,200,50,0)');
      ctx.fillStyle = g;
      ctx.beginPath(); ctx.arc(fx, fy, fr, 0, Math.PI * 2); ctx.fill();
    }
  });
}

function createAsteroidTexture(seed, colorScheme) {
  return makeTexture(256, 128, (ctx, w, h) => {
    // 填充基底颜色
    const img = ctx.createImageData(w, h);
    const d = img.data;
    for (let y = 0; y < h; y++) {
      for (let x = 0; x < w; x++) {
        const nx = x / w, ny = y / h;
        // 多层噪声
        const n1 = fbm2D(x * 0.05, y * 0.04, 4, seed);
        const n2 = fbm2D(x * 0.12, y * 0.10, 3, seed + 37);
        const n3 = fbm2D(x * 0.25, y * 0.22, 2, seed + 73);
        // 颜色混合
        const baseColor = colorScheme.base;
        const darkColor = colorScheme.dark;
        const lightColor = colorScheme.light;
        const mix1 = n1;
        const mix2 = n2 * 0.5;
        const r = baseColor[0] + (lightColor[0] - baseColor[0]) * mix1 + (darkColor[0] - baseColor[0]) * mix2;
        const g = baseColor[1] + (lightColor[1] - baseColor[1]) * mix1 + (darkColor[1] - baseColor[1]) * mix2;
        const b = baseColor[2] + (lightColor[2] - baseColor[2]) * mix1 + (darkColor[2] - baseColor[2]) * mix2;
        // 微细节
        const micro = (n3 - 0.5) * 25;
        const i = (y * w + x) * 4;
        d[i]     = Math.max(0, Math.min(255, r + micro));
        d[i + 1] = Math.max(0, Math.min(255, g + micro * 0.85));
        d[i + 2] = Math.max(0, Math.min(255, b + micro * 0.7));
        d[i + 3] = 255;
      }
    }
    ctx.putImageData(img, 0, 0);

    // 陨石坑
    for (let i = 0; i < 60; i++) {
      const cx = Math.random() * w, cy = Math.random() * h;
      const cr = 2 + Math.random() * 14;
      // 亮边（坑沿）
      const gRim = ctx.createRadialGradient(cx, cy, cr * 0.75, cx, cy, cr * 1.2);
      gRim.addColorStop(0, 'rgba(0,0,0,0)');
      gRim.addColorStop(0.45, colorScheme.rimBright);
      gRim.addColorStop(0.7, colorScheme.rimBright.replace('0.4', '0.15'));
      gRim.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = gRim;
      ctx.beginPath(); ctx.arc(cx, cy, cr * 1.2, 0, Math.PI * 2); ctx.fill();
      // 暗底（坑内）
      const gDark = ctx.createRadialGradient(cx, cy, 0, cx, cy, cr * 0.65);
      gDark.addColorStop(0, 'rgba(0,0,0,0.45)');
      gDark.addColorStop(0.5, 'rgba(0,0,0,0.2)');
      gDark.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = gDark;
      ctx.beginPath(); ctx.arc(cx, cy, cr * 0.65, 0, Math.PI * 2); ctx.fill();
    }
    // 细小陨石坑
    for (let i = 0; i < 120; i++) {
      const cx = Math.random() * w, cy = Math.random() * h;
      const cr = 0.5 + Math.random() * 2.5;
      ctx.fillStyle = `rgba(0,0,0,${0.2 + Math.random() * 0.25})`;
      ctx.beginPath(); ctx.arc(cx, cy, cr, 0, Math.PI * 2); ctx.fill();
    }
    // 裂缝/沟槽
    ctx.strokeStyle = 'rgba(0,0,0,0.15)';
    ctx.lineWidth = 0.5;
    for (let i = 0; i < 8; i++) {
      ctx.beginPath();
      let sx = Math.random() * w, sy = Math.random() * h;
      ctx.moveTo(sx, sy);
      for (let j = 0; j < 5; j++) {
        sx += (Math.random() - 0.5) * 30;
        sy += (Math.random() - 0.5) * 15;
        ctx.lineTo(sx, sy);
      }
      ctx.stroke();
    }
    addNoise(ctx, w, h, 4, seed + 101);
  });
}

// 4 种不同光谱类型的小行星颜色方案
const ASTEROID_SCHEMES = [
  { base:[72,65,55], dark:[45,40,32], light:[105,95,80], rimBright:'rgba(160,145,125,0.4)', name:'C-type-暗碳质' },
  { base:[110,85,60], dark:[75,55,35], light:[150,125,95], rimBright:'rgba(200,175,145,0.4)', name:'S-type-石质' },
  { base:[130,120,108], dark:[90,82,72], light:[170,158,142], rimBright:'rgba(210,200,185,0.4)', name:'M-type-金属' },
  { base:[95,70,60], dark:[60,40,30], light:[135,105,90], rimBright:'rgba(185,150,130,0.4)', name:'R-type-红化' }
];

/* ── 小行星带 ── */
function createAsteroidBelt() {
  const group = new THREE.Group();

  // 柯克伍德缝隙
  function kirkwoodGap(r) {
    const frac = (r - BELT_INNER) / (BELT_OUTER - BELT_INNER);
    const gaps = [[0.14,0.025],[0.27,0.022],[0.40,0.028],[0.53,0.020],[0.66,0.024],[0.80,0.018]];
    let shift = 0;
    for (const [c, w] of gaps) { const d = Math.abs(frac - c); if (d < w) shift = Math.max(shift, (w - d) / w * 2.5); }
    return shift;
  }

  // 创建不规则岩石几何体 — 基于位置的噪声变形，保持大致球形
  function rockGeometry(baseR, deformStrength) {
    const geo = new THREE.IcosahedronGeometry(baseR, 2);
    const p = geo.attributes.position;
    for (let i = 0; i < p.count; i++) {
      const x = p.getX(i), y = p.getY(i), z = p.getZ(i);
      const len = Math.sqrt(x * x + y * y + z * z);
      const nx = x / len, ny = y / len, nz = z / len;
      // 多层位置噪声 — 每个顶点结果确定性一致，不会产生平坦碎片
      var n1 = Math.sin(nx * 5.0 + ny * 3.7) * Math.cos(nz * 4.2 + nx * 2.8) * 0.5
              + Math.sin(ny * 7.1 + nz * 6.3) * Math.cos(nx * 5.5) * 0.3
              + Math.sin(nz * 9.0 + nx * 8.2 + ny * 7.5) * 0.2;
      var factor = 1 + n1 * deformStrength;
      factor = Math.max(0.6, Math.min(1.4, factor));
      p.setXYZ(i, nx * len * factor, ny * len * factor, nz * len * factor);
    }
    geo.computeVertexNormals();
    return geo;
  }

  // 每种光谱类型生成 4 个纹理变体 (不同种子 = 不同陨石坑/裂缝分布)
  const astTextures = [];
  ASTEROID_SCHEMES.forEach(function (scheme, si) {
    for (let vi = 0; vi < 4; vi++) {
      astTextures.push(createAsteroidTexture(si * 137 + vi * 53 + 42, scheme));

function textureIcyMoon(baseRGB, craterCount, tint) {

  var geo = new THREE.IcosahedronGeometry(1, 2);
  var pos = geo.attributes.position;
  for (var i = 0; i < pos.count; i++) {
    var x = pos.getX(i), y = pos.getY(i), z = pos.getZ(i);
    var len = Math.sqrt(x*x + y*y + z*z);
    var nx = x/len, ny = y/len, nz = z/len;
    var n1 = Math.sin(nx*5.0+ny*3.7)*Math.cos(nz*4.2+nx*2.8)*0.5
            + Math.sin(ny*7.1+nz*6.3)*Math.cos(nx*5.5)*0.3;
    var factor = 1 + n1 * 0.25;
    factor = Math.max(0.7, Math.min(1.3, factor));
    pos.setXYZ(i, nx*len*factor, ny*len*factor, nz*len*factor);
  }
  geo.computeVertexNormals();
  var tex = createAsteroidTexture(42 + Math.floor(Math.random()*100), {
    base: cfg.color, dark: cfg.color.map(function(c){return c-25;}), light: cfg.color.map(function(c){return c+30;}),

  });

  });
});

      return { name: a.data.name, obj: a, color: '#b8a888' };
    })}
  ];
  groups.forEach(function (g) {
    var div = document.createElement('div');
    div.className = 'body-group';
    div.innerHTML = '<div class="body-group-title">' + g.title + '</div>';
    g.items.forEach(function (item) {
      var el = document.createElement('div');
      el.className = 'body-item';
      el.innerHTML = '<span class="dot" style="background:' + item.color + '"></span>' + item.name;
      el.addEventListener('click', function () {
        // 聚焦到该天体（等同双击）
        if (focusedPlanet === item.obj) {
          focusedPlanet = null;
          controls.target.set(0, 0, 0);
          return;
        }
        focusedPlanet = item.obj;
        var pos = item.obj.mesh.position;
        var minDist = MODE_CONFIG[viewMode].sunRadius * 2;
        var baseR = (item.obj.data.radius || item.obj.data.visualRadius || 0);
        var bodyRadius = item.obj.modeScale != null ? baseR * item.obj.modeScale : MODE_CONFIG[viewMode].sunRadius;
        var dist = Math.max(bodyRadius * 6 + 2, minDist);
        camera.position.set(pos.x + dist, pos.y + dist * 0.6, pos.z + dist);
        controls.target.copy(pos);
        // 显示信息
        showInfo(item.obj.data);
      });
      div.appendChild(el);
    });
    container.appendChild(div);
  });
})();

/* ── 模式切换 ── */
function switchViewMode(mode) {
  if (mode === viewMode) return;
  viewMode = mode;
  var cfg = MODE_CONFIG[mode];

  // 更新太阳
  sunMesh.geometry.dispose();
  sunMesh.geometry = new THREE.SphereGeometry(cfg.sunRadius, 64, 64);
  sunGlow.geometry.dispose();
  sunGlow.geometry = new THREE.SphereGeometry(cfg.sunRadius * 1.7, 32, 32);

  // 更新行星：设置 modeScale（动画循环中 planet.mesh.scale = radius * modeScale * planetScaleMul）
  for (var i = 0; i < planets.length; i++) {
    var planet = planets[i];
    var targetRadius = cfg.planetRadius[planet.data.eng];
    planet.modeScale = targetRadius / planet.data.radius;

    // 重建环几何体（环基于 baseRadius 创建，需按 modeScale 缩放）
    if (planet.ring && RING_CONFIG[planet.data.eng]) {
      var rcfg = RING_CONFIG[planet.data.eng];
      var newRing = createRingGeometry(
        planet.data.radius * rcfg.inner, planet.data.radius * rcfg.outer,
        rcfg.segments, rcfg.colors, rcfg.opacity, planet.data.eng
      );
      newRing.rotation.x = Math.PI / 2;
      planet.mesh.remove(planet.ring);
      planet.ring.geometry.dispose();
      planet.ring.material.dispose();
      planet.mesh.add(newRing);
      planet.ring = newRing;
    }

    // 重建轨道线
    var orbitDist = cfg.orbitDist[planet.data.eng];
    var positions = orbitLines[i].geometry.attributes.position.array;
    for (var j = 0; j <= 128; j++) {
      var angle = (j / 128) * Math.PI * 2;
      positions[j * 3]     = orbitDist * Math.cos(angle);
      positions[j * 3 + 1] = 0;
      positions[j * 3 + 2] = orbitDist * Math.sin(angle);
    }
    orbitLines[i].geometry.attributes.position.needsUpdate = true;
    planet.orbitDist = orbitDist;
  }

  // 同步 planetScaleMul
  planetScaleMul = cfg.planetScaleMul;
  getEl('slPltS').value = cfg.planetScaleMul;
  getEl('vlPltS').textContent = cfg.planetScaleMul.toFixed(1);

  // 缩放小行星带和柯伊伯带
  var beltScale = cfg.beltInner / BELT_INNER;
  asteroidBelt.scale.setScalar(beltScale);
  var kuiperScale = cfg.kuiperInner / KUIPER_INNER;
  kuiperBelt.scale.setScalar(kuiperScale);

  // 不对 InstancedMesh 做 scale.setScalar，否则会同时缩放 instance position 导致位置偏移
  // 小行星大小由 createAsteroidBelt 中的 instance scale 控制，真实比例下通过 group scale 自然缩小

  // 更新四大主带小行星轨道和大小
  var isReal = (mode === 'real');
  for (var ai = 0; ai < majorAsteroidObjs.length; ai++) {
    var a = majorAsteroidObjs[ai];
    a.orbitDist = isReal ? a.data.realDist : a.data.visualDist;
    a.modeScale = isReal ? (a.data.realRadius / a.data.visualRadius) : 1;
  }

  // 更新月球轨道（示意图压缩，真实比例用 60.4 倍地球半径）
  var moonEntry = allMoons.find(function (m) { return m.data.eng === 'Moon'; });
  if (moonEntry) {
    moonEntry.orbitDist = isReal ? moonEntry.realOrbitDist : moonEntry.visualOrbitDist;
  }

  // 更新按钮文字
  getEl('btnMode').textContent = mode === 'visual' ? '示意图' : '真实比例';

  // 比例尺只在真实比例模式显示
  document.getElementById('scaleBar').style.display = isReal ? 'block' : 'none';

  // 强制重绘
  requestAnimationFrame(function () { renderer.render(scene, camera); });
}

  switchViewMode(viewMode === 'visual' ? 'real' : 'visual');
});

/* ── 点击行星查看信息 + 双击聚焦 ── */
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
const infoBox = getEl('info');
const infoName = getEl('infoName');
const infoType = getEl('infoType');
const infoSubtitle = getEl('infoSubtitle');
const infoDiam = getEl('infoDiam');
const infoMass = getEl('infoMass');
const infoDensity = getEl('infoDensity');
const infoGravity = getEl('infoGravity');
const infoEscape = getEl('infoEscape');
const infoDist = getEl('infoDist');
const infoOrbVel = getEl('infoOrbVel');
const infoEcc = getEl('infoEcc');
const infoTilt = getEl('infoTilt');
const infoTemp = getEl('infoTemp');
const infoDay = getEl('infoDay');
const infoYear = getEl('infoYear');
const infoMoons = getEl('infoMoons');
const infoAtm = getEl('infoAtm');
const infoFact = getEl('infoFact');
const infoFeatures = getEl('infoFeatures');
let infoTimer = null;

function getClickedPlanet(event) {
  mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObjects(rayTargets);
  if (hits.length > 0) {
    const hitObj = hits[0].object;
    const planet = planets.find(function (p) { return p.mesh === hitObj; });
    if (planet) return planet;
    // 检查是否命中卫星
    const moonHit = allMoons.find(function (m) { return m.mesh === hitObj; });
    if (moonHit) return moonHit;
    // 检查是否命中四大主带小行星
    const majorHit = majorAsteroidObjs.find(function (a) { return a.mesh === hitObj; });
    if (majorHit) return majorHit;
    if (hitObj === sunMesh) return sunObj;
    if (asteroidBelt.children.includes(hitObj) || hitObj.parent === asteroidBelt) return beltObj;
    if (kuiperBelt.children.includes(hitObj) || hitObj.parent === kuiperBelt) return kuiperObj;
  }
  return null;
}

function showInfo(data) {
  const d = data.detail;
  // 避免重复显示英文名
  infoName.textContent = data.name.includes(data.eng) ? data.name : data.name + ' ' + (data.eng || '');
  infoType.textContent = d.type;
  infoSubtitle.textContent = d.subtitle || '';

  // 设置字段值，并隐藏无数据的字段
  var fields = [
    {el: infoDiam, val: d.diam},
    {el: infoMass, val: d.mass},
    {el: infoDensity, val: d.density},
    {el: infoGravity, val: d.gravity},
    {el: infoEscape, val: d.escape},
    {el: infoTilt, val: data.tilt != null ? data.tilt + '°' : null},
    {el: infoDist, val: d.dist},
    {el: infoOrbVel, val: d.orbVel},
    {el: infoEcc, val: d.ecc},
    {el: infoDay, val: d.day},
    {el: infoYear, val: d.year},
    {el: infoTemp, val: d.temp},
    {el: infoMoons, val: d.moons},
    {el: infoAtm, val: d.atm}
  ];
  fields.forEach(function(f) {
    var item = f.el.closest('.info-item');
    if (f.val && f.val !== '—') {
      f.el.textContent = f.val;
      if (item) item.style.display = '';
    } else {
      if (item) item.style.display = 'none';
    }
  });

  infoFact.textContent = d.fact || '';

  // 生成特色功能区域（紧凑标签样式）
  infoFeatures.innerHTML = '';
  if (d.features && d.features.length > 0) {
    d.features.forEach(function(f) {
      var div = document.createElement('div');
      div.className = 'feature-item';
      div.innerHTML = '<span class="feature-icon">' + f.icon + '</span>' +
        '<span class="feature-label">' + f.label + '</span>' +
        '<span class="feature-value">' + f.value + '</span>';
      infoFeatures.appendChild(div);
    });
  }
  infoBox.classList.add('show');
  clearTimeout(infoTimer);
  infoTimer = setTimeout(function () { infoBox.classList.remove('show'); }, 8000);
}

    var dist = Math.max(bodyRadius * 6 + 2, minDist);

/* ── 动画循环 ── */
const clock = new THREE.Clock();
let simDays = 0; // 模拟经过的天数（以地球日为单位）

function animate() {
  requestAnimationFrame(animate);

  const delta = clock.getDelta();
  const elapsed = clock.getElapsedTime();

  if (!paused) {
    // 累计模拟时间（地球日）
    // 1 real second = 4.65 sim days (at orbitSpeedMul=1)
    var simDaysDelta = delta * orbitSpeedMul * 4.65;
    simDays += simDaysDelta;
    if (Math.floor(simDays * 10) % 5 === 0) {
      var years = Math.floor(simDays / 365.25);
      var days = Math.floor(simDays % 365.25);
      document.getElementById('simTime').textContent =
        years > 0 ? years + ' 年 ' + days + ' 天' : days + ' 天';
    }

    // 太阳自转 (赤道约25天) + 脉动
    sunMesh.rotation.y += (2 * Math.PI / 25) * simDaysDelta;
    var pulse = 1 + Math.sin(elapsed * 2) * 0.012;
    sunMesh.scale.setScalar(pulse);
    sunGlow.scale.setScalar(pulse * 1.1);

    // 小行星带缓慢旋转 — 从北极上方看逆时针
    asteroidBelt.rotation.y += delta * 0.006;
    kuiperBelt.rotation.y += delta * 0.001;

    // 行星运动
    for (var i = 0; i < planets.length; i++) {
      var planet = planets[i];

      // 公转 (外行星更慢) — 从北极上方看逆时针
      // 轨道周期 = year * 365.25 天，角速度 = 2π / 周期
      var orbitalPeriodDays = planet.data.year * 365.25;
      planet.angle -= (2 * Math.PI / orbitalPeriodDays) * simDaysDelta;

      var dist = planet.orbitDist * orbitScaleMul;
      var x = dist * Math.cos(planet.angle);
      var z = dist * Math.sin(planet.angle);
      planet.mesh.position.set(x, 0, z);

      // 自转（spinPeriodDays 为负表示逆行自转）
      var spinRate = (2 * Math.PI / Math.abs(planet.data.spinPeriodDays)) * Math.sign(planet.data.spinPeriodDays);
      planet.mesh.rotation.order = 'ZYX';
      planet.mesh.rotation.y += spinRate * simDaysDelta;

      // 轴倾斜（真实角度）— ZYX顺序下先倾斜再自转
      planet.mesh.rotation.z = THREE.MathUtils.degToRad(planet.data.tilt);

      // 行星大小
      var scale = planet.data.radius * planet.modeScale * planetScaleMul;
      planet.mesh.scale.setScalar(scale);

      // 环已是行星子对象，自动继承位置、旋转和缩放

      // 光晕跟随
      if (planet.glow) {
        planet.glow.position.copy(planet.mesh.position);
        planet.glow.scale.setScalar(scale * 1.25);
        planet.glow.visible = showGlow;
      }

      // 标签跟随 — 始终高于行星，但不穿透太阳
      planet.label.position.set(x, scale + 1.2, z);
      var distToSun = Math.sqrt(x * x + z * z);
      var cfgLabel = MODE_CONFIG[viewMode];
      var labelVisible = showLabel && distToSun > cfgLabel.sunRadius * 2;
      planet.label.material.opacity = labelVisible ? 0.8 : 0;
      // 标签大小随行星视觉大小缩放
      var labelSz = Math.max(scale * 3, 1.2);
      planet.label.scale.set(labelSz, labelSz * 0.25, 1);
    }

    // 所有卫星公转
    for (var mi = 0; mi < allMoons.length; mi++) {
      var m = allMoons[mi];
      var parentPlanet = m.parent;
      var parentPos = parentPlanet.mesh.position;

      // 公转 — 卫星 year 以地球年为单位，转换为天
      var moonOrbitalPeriodDays = m.data.year * 365.25;
      var moonDirection = m.data.retrograde ? 1 : -1; // 逆行轨道反向
      m.angle += moonDirection * (2 * Math.PI / moonOrbitalPeriodDays) * simDaysDelta;

      // 卫星轨道半径（缩放，随行星模式缩放）
      var mDist = m.orbitDist * orbitScaleMul * parentPlanet.modeScale;

      // 计算卫星位置（考虑行星轴倾角）
      var rawX = mDist * Math.cos(m.angle);
      var rawZ = mDist * Math.sin(m.angle);
      var tiltRad = THREE.MathUtils.degToRad(parentPlanet.data.tilt);
      var tiltedX = rawX;
      var tiltedY = rawZ * Math.sin(tiltRad);
      var tiltedZ = rawZ * Math.cos(tiltRad);
      var moonWorldX = parentPos.x + tiltedX;
      var moonWorldY = parentPos.y + tiltedY;
      var moonWorldZ = parentPos.z + tiltedZ;
      m.mesh.position.set(moonWorldX, moonWorldY, moonWorldZ);

      // 自转（大多数卫星潮汐锁定，自转=公转）
      m.mesh.rotation.y += (2 * Math.PI / moonOrbitalPeriodDays) * simDaysDelta;

      // 大小
      var moonScale = m.data.radius * m.parent.modeScale * planetScaleMul;
      m.mesh.scale.setScalar(moonScale);

      // 标签
      m.label.position.set(moonWorldX, moonWorldY + moonScale + 0.8, moonWorldZ);
      m.label.material.opacity = showLabel ? 0.75 : 0;
      var moonLabelSz = Math.max(moonScale * 3, 0.8);
      m.label.scale.set(moonLabelSz, moonLabelSz * 0.25, 1);
    }

    // 四大主带小行星公转
    for (var ai = 0; ai < majorAsteroidObjs.length; ai++) {
      var a = majorAsteroidObjs[ai];
      var aOrbitalPeriodDays = a.data.year * 365.25;
      a.angle -= (2 * Math.PI / aOrbitalPeriodDays) * simDaysDelta;
      var aDist = a.orbitDist * orbitScaleMul;
      var ax = aDist * Math.cos(a.angle);
      var az = aDist * Math.sin(a.angle);
      a.mesh.position.set(ax, 0, az);
      // 小行星自转较快，约5-10小时
      a.mesh.rotation.y += (2 * Math.PI / 0.3) * simDaysDelta;
      var aScale = a.data.visualRadius * a.modeScale * planetScaleMul;
      a.mesh.scale.setScalar(aScale);
      a.label.position.set(ax, aScale + 1.2, az);
      a.label.material.opacity = showLabel ? 0.8 : 0;
      var aLabelSz = Math.max(aScale * 3, 1.2);
      a.label.scale.set(aLabelSz, aLabelSz * 0.25, 1);
    }

    // 更新比例尺（仅真实比例模式）
    var scaleBar = document.getElementById('scaleBar');
    if (viewMode === 'real') {
      scaleBar.style.display = 'block';
      var kmPerAU = 149597870.7;
      var cameraDistance = camera.position.length();
      var fovRad = THREE.MathUtils.degToRad(camera.fov);
      // 1 场景单位对应的像素数
      var pixelsPerUnit = (window.innerHeight / 2) / (cameraDistance * Math.tan(fovRad / 2));

      // 尝试所有可能的尺度，找到最合适的
      var scales = [
        // km步长 [km值, 场景单位]
        [10, 10/kmPerAU], [20, 20/kmPerAU], [50, 50/kmPerAU],
        [100, 100/kmPerAU], [200, 200/kmPerAU], [500, 500/kmPerAU],
        [1000, 1000/kmPerAU], [2000, 2000/kmPerAU], [5000, 5000/kmPerAU],
        [10000, 10000/kmPerAU], [20000, 20000/kmPerAU], [50000, 50000/kmPerAU],
        [100000, 100000/kmPerAU], [200000, 200000/kmPerAU], [500000, 500000/kmPerAU],
        [1000000, 1000000/kmPerAU],
        // AU步长 [AU值, 场景单位]
        [0.01, 0.01*13.5], [0.02, 0.02*13.5], [0.05, 0.05*13.5],
        [0.1, 0.1*13.5], [0.2, 0.2*13.5], [0.5, 0.5*13.5],
        [1, 13.5], [2, 27], [5, 67.5], [10, 135],
        [20, 270], [50, 675], [100, 1350], [200, 2700]
      ];

      var bestScale = scales[scales.length - 1];
      for (var si = 0; si < scales.length; si++) {
        var pixelWidth = scales[si][1] * pixelsPerUnit;
        if (pixelWidth >= 30) {
          bestScale = scales[si];
          break;
        }
      }

      var scaleBarPixels = bestScale[1] * pixelsPerUnit;
      scaleBarPixels = Math.max(30, Math.min(250, scaleBarPixels));
      document.getElementById('scaleBarLine').style.width = scaleBarPixels + 'px';
      // 格式化显示文本
      var val = bestScale[0];
      var text;
      if (val >= 1000000) text = (val/1000000) + 'M km';
      else if (val >= 1000) text = (val/1000) + '千km';
      else if (val >= 1) text = val + ' km';
      else text = val + ' AU';
      document.getElementById('scaleBarText').textContent = text;
    } else {
      scaleBar.style.display = 'none';
    }
  }

  // 聚焦模式：相机跟随天体
  if (focusedPlanet) {
    var target = focusedPlanet.mesh.position;
    controls.target.lerp(target, 0.08);
  }

  controls.update();
  renderer.render(scene, camera);
}

animate();

/* ── 窗口自适应 ── */
window.addEventListener('resize', function () {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

</script>
</body>
